<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MockTest Pro - Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #0f172a; }
        .test-frame { width: 100%; height: 100vh; height: 100dvh; border: none; display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .bottom-buttons { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 10px; pointer-events: none; 
        }
        .bottom-buttons > * { pointer-events: auto; }
        .btn { 
            padding: 10px 22px; border-radius: 12px; border: none; font-size: 13px; 
            font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; 
            letter-spacing: 0.3px; transition: all 0.2s ease; 
            display: flex; align-items: center; justify-content: center; gap: 6px; 
            white-space: nowrap; color: white; 
            background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); 
        }
        .btn:active { transform: scale(0.94); background: rgba(30, 41, 59, 0.95); }
        .btn i { font-size: 13px; }
        .btn-submit { 
            background: rgba(99, 102, 241, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3); 
        }
        .btn-submit:active { background: rgba(99, 102, 241, 0.95); }
        .loading-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); z-index: 2000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .loading-overlay.show { display: flex; }
        .loader-ring { 
            width: 44px; height: 44px; border: 3px solid rgba(255, 255, 255, 0.1); 
            border-top: 3px solid white; border-radius: 50%; animation: spin 0.7s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: rgba(255, 255, 255, 0.9); margin-top: 14px; font-size: 13px; font-weight: 500; }
        /* Top info bar hidden - removed from UI */
        .top-info-bar {
            display: none; /* Hidden as requested */
        }
        ::-webkit-scrollbar { display: none; }
        @media (max-height: 400px) { 
            .bottom-buttons { bottom: 8px; gap: 6px; } 
            .btn { padding: 7px 16px; font-size: 11px; border-radius: 10px; } 
            .btn i { font-size: 11px; } 
        }
        @media (min-width: 768px) { 
            .btn { padding: 12px 28px; font-size: 14px; border-radius: 14px; gap: 8px; } 
            .btn i { font-size: 14px; } 
            .bottom-buttons { gap: 12px; } 
        }
    </style>
</head>
<body>
    <!-- Top info bar hidden - removed from HTML structure -->
    <!-- <div class="top-info-bar">
        <span class="info-pill" id="testNamePill">📝 Test</span>
        <span class="info-pill" id="progressPill">0/0</span>
    </div> -->
    <iframe id="testFrame" class="test-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title="Test"></iframe>
    <div class="bottom-buttons">
        <button class="btn" onclick="confirmExit()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        <button class="btn btn-submit" id="submitBtn" onclick="submitTest()"><i class="fas fa-check-double"></i> Submit</button>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-ring"></div>
        <div class="loader-text">Submitting your test...</div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbya3ER-Cb71xpak-gm1-wLREfPajBxaPBG8TPKLlLgXcwn_P89vBIN_hptN4LFFqe8X4Q/exec';
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'index.html';

        const urlParams = new URLSearchParams(window.location.search);
        const mockFile = urlParams.get('file');
        const testCode = urlParams.get('testCode');
        const examType = localStorage.getItem('current_exam') || '';

        if (!mockFile || !testCode) {
            Swal.fire({ icon: 'error', title: 'Invalid Test', confirmButtonColor: '#6366f1' })
                .then(() => window.location.href = 'dashboard.html');
        }

        const testFrame = document.getElementById('testFrame');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Test name pill hidden - functionality kept in backend
        // document.getElementById('testNamePill').textContent = `📋 ${testCode}`;

        let timeLeft = 30 * 60;
        let timerInterval = null;
        let testSubmitted = false;
        let lastAnswers = {};

        testFrame.src = mockFile;

        function startTimer() {
            timerInterval = setInterval(() => {
                if (testSubmitted) return clearInterval(timerInterval);
                timeLeft--;
                if (timeLeft <= 0) { clearInterval(timerInterval); autoSubmit(); }
                syncTimerToIframe();
            }, 1000);
        }

        function syncTimerToIframe() {
            try { 
                testFrame.contentWindow?.postMessage({ type: 'TIMER_SYNC', timeLeft }, '*'); 
            } catch (e) {}
        }

        function autoSubmit() {
            navigator.vibrate?.([200, 100, 200]);
            Swal.fire({ 
                icon: 'warning', title: 'Time\'s Up!', 
                text: 'Submitting automatically...', 
                confirmButtonColor: '#ef4444', 
                allowOutsideClick: false, 
                timer: 2000, 
                timerProgressBar: true 
            }).then(() => performSubmission());
        }

        window.addEventListener('message', (e) => {
            if (!e.data?.type) return;
            if (e.data.type === 'TEST_SUBMITTED') handleSubmission(e.data);
            if (e.data.type === 'TIMER_SYNC' && e.data.timeLeft < timeLeft) {
                timeLeft = e.data.timeLeft;
            }
            if (e.data.type === 'PROGRESS_UPDATE') {
                // Progress pill hidden - functionality kept in backend
                // document.getElementById('progressPill').textContent = `${e.data.answered}/${e.data.total}`;
                console.log('Progress update (hidden):', e.data.answered, '/', e.data.total);
            }
            if (e.data.type === 'ANSWERS_UPDATE') {
                lastAnswers = e.data.answers || {};
            }
        });

        function submitTest() {
            if (testSubmitted) return;
            Swal.fire({ 
                title: 'Submit Test?', 
                text: 'No changes allowed after submission.', 
                icon: 'question', 
                showCancelButton: true, 
                confirmButtonText: 'Submit', 
                cancelButtonText: 'Cancel', 
                confirmButtonColor: '#6366f1', 
                cancelButtonColor: '#64748b', 
                reverseButtons: true 
            }).then(r => { if (r.isConfirmed) performSubmission(); });
        }

        function performSubmission() {
            if (testSubmitted) return;
            testSubmitted = true;
            clearInterval(timerInterval);
            loadingOverlay.classList.add('show');
            submitBtn.style.pointerEvents = 'none';
            submitBtn.style.opacity = '0.5';
            navigator.vibrate?.(100);
            
            try {
                const iw = testFrame.contentWindow;
                if (iw?.calculateScore) { 
                    const result = iw.calculateScore();
                    // Get answers if available
                    if (iw.state?.answers) {
                        lastAnswers = iw.state.answers;
                    }
                    processResult(result); 
                } else { 
                    testFrame.contentWindow?.postMessage({ type: 'REQUEST_SUBMIT' }, '*'); 
                }
                setTimeout(() => {
                    if (loadingOverlay.classList.contains('show')) {
                        loadingOverlay.classList.remove('show');
                        testSubmitted = false;
                        submitBtn.style.pointerEvents = 'auto';
                        submitBtn.style.opacity = '1';
                        Swal.fire({ 
                            icon: 'error', title: 'Retry', 
                            text: 'Please try again.', 
                            confirmButtonColor: '#6366f1' 
                        });
                    }
                }, 8000);
            } catch (e) {
                loadingOverlay.classList.remove('show');
                testSubmitted = false;
                submitBtn.style.pointerEvents = 'auto';
                submitBtn.style.opacity = '1';
            }
        }

        function handleSubmission(data) { 
            if (data.answers) lastAnswers = data.answers;
            processResult(data); 
        }

        async function processResult(result) {
            const score = result.score || 0;
            const total = result.total || 100;
            const correct = result.correct || 0;
            const wrong = result.wrong || 0;
            const attempted = result.attempted || (correct + wrong);
            const unanswered = result.unanswered || 0;
            const accuracy = total > 0 ? ((score / total) * 100).toFixed(2) : 0;
            const date = new Date().toISOString().split('T')[0];
            const timeTaken = (30 * 60) - timeLeft;
            
            // Save to localStorage for review
            const results = JSON.parse(localStorage.getItem('test_results') || '[]');
            results.push({ 
                testCode, score, total, accuracy, date, timeTaken, 
                correct, wrong, attempted, unanswered,
                userName: user.name,
                examType: examType
            });
            if (results.length > 50) results.shift();
            localStorage.setItem('test_results', JSON.stringify(results));
            
            // Save answers for review
            localStorage.setItem('last_answers', JSON.stringify(lastAnswers));
            
            // Submit to Google Sheets
            try { 
                const params = new URLSearchParams({
                    action: 'submitResult',
                    username: user.username,
                    name: user.name,
                    testCode: testCode,
                    score: score,
                    totalMarks: total,
                    accuracy: accuracy,
                    correct: correct,
                    wrong: wrong,
                    attempted: attempted,
                    unanswered: unanswered,
                    timeTaken: timeTaken,
                    date: date,
                    examType: examType
                });
                await fetch(API_URL + '?' + params.toString()); 
            } catch (e) {
                console.warn('Result submission failed:', e);
            }
            
            setTimeout(() => {
                window.location.href = `result.html?score=${score}&total=${total}&accuracy=${accuracy}&testCode=${encodeURIComponent(testCode)}&timeTaken=${timeTaken}&correct=${correct}&wrong=${wrong}&attempted=${attempted}&unanswered=${unanswered}&examType=${encodeURIComponent(examType)}`;
            }, 500);
        }

        function confirmExit() {
            if (testSubmitted) { window.location.href = 'dashboard.html'; return; }
            Swal.fire({ 
                title: 'Exit Test?', 
                text: 'All progress will be lost.', 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonText: 'Exit', 
                cancelButtonText: 'Stay', 
                confirmButtonColor: '#ef4444', 
                cancelButtonColor: '#6366f1', 
                reverseButtons: true 
            }).then(r => { if (r.isConfirmed) window.location.href = 'dashboard.html'; });
        }

        window.addEventListener('beforeunload', e => { 
            if (!testSubmitted && timeLeft > 0) { 
                e.preventDefault(); 
                e.returnValue = ''; 
            } 
        });
        window.addEventListener('popstate', e => { 
            if (!testSubmitted && timeLeft > 0) { 
                e.preventDefault(); 
                history.pushState(null, '', window.location.href); 
                confirmExit(); 
            } 
        });
        history.pushState(null, '', window.location.href);
        document.addEventListener('keydown', e => { 
            if (e.key === 'Escape' && !testSubmitted) { 
                e.preventDefault(); 
                confirmExit(); 
            } 
        });
        document.addEventListener('visibilitychange', () => { 
            document.title = document.hidden ? '⚠️ Return to Test' : 'MockTest Pro'; 
        });
        testFrame.onload = () => { 
            setTimeout(() => {
                syncTimerToIframe();
                // Request answers sync
                testFrame.contentWindow?.postMessage({ type: 'REQUEST_ANSWERS' }, '*');
            }, 1500); 
        };
        setInterval(() => { 
            if (!testSubmitted) {
                syncTimerToIframe();
                testFrame.contentWindow?.postMessage({ type: 'REQUEST_ANSWERS' }, '*');
            }
        }, 10000);
        startTimer();
    </script>
</body>
</html>
