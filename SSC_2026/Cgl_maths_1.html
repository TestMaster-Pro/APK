<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SSC CGL • Advanced Mathematics Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f97316;
            --primary-light: #fb923c;
            --primary-glow: #f97316;
            --accent: #0ea5e9;
            --accent-glow: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #94a3b8;
            --light: #f1f5f9;
            --bg: #0f172a;
            --bg2: #1e1b4b;
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --option-bg: rgba(255, 255, 255, 0.04);
            --hover-bg: rgba(249, 115, 22, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --glow-sm: 0 0 12px rgba(249, 115, 22, 0.25);
            --glow-md: 0 0 20px rgba(249, 115, 22, 0.35);
            --glow-lg: 0 0 30px rgba(14, 165, 233, 0.3);
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg2: #fff7ed;
            --card: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --hover-bg: #fff7ed;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --glow-sm: 0 0 12px rgba(249, 115, 22, 0.15);
            --glow-md: 0 0 20px rgba(249, 115, 22, 0.2);
            --glow-lg: 0 0 30px rgba(14, 165, 233, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #2e1065 40%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.6s ease-in-out;
            transition: background 0.5s ease, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc 0%, #fff7ed 40%, #f0f9ff 100%);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mock-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 20s ease-in-out infinite;
            opacity: 0.5;
        }
        .blob-1 { width: 350px; height: 350px; background: rgba(249, 115, 22, 0.2); top: -100px; right: -80px; animation-delay: 0s; }
        .blob-2 { width: 280px; height: 280px; background: rgba(14, 165, 233, 0.18); bottom: -80px; left: -60px; animation-delay: -7s; }
        .blob-3 { width: 220px; height: 220px; background: rgba(16, 185, 129, 0.16); top: 50%; left: 50%; animation-delay: -14s; }
        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.1); }
            50% { transform: translate(-30px, -20px) scale(0.9); }
            75% { transform: translate(20px, 40px) scale(1.05); }
        }

        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.2), rgba(14, 165, 233, 0.06));
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.12);
            animation: floatUp linear infinite;
        }
        body.light-mode .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.15), rgba(14, 165, 233, 0.04));
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.08);
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0.5; }
            25% { transform: translateY(-250px) translateX(30px) scale(0.8); opacity: 0.7; }
            50% { transform: translateY(-500px) translateX(-20px) scale(1); opacity: 0.6; }
            75% { transform: translateY(-750px) translateX(15px) scale(0.9); opacity: 0.35; }
            100% { transform: translateY(-1000px) translateX(-10px) scale(0.3); opacity: 0; }
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        .top-bar:hover { box-shadow: var(--glow-sm); }
        .test-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }
        .test-title .icon-dna { font-size: 20px; animation: pulseIcon 2s ease-in-out infinite; }
        @keyframes pulseIcon { 0%,100%{ transform:scale(1);opacity:1; } 50%{ transform:scale(1.15);opacity:0.75; } }
        .top-actions { display: flex; align-items: center; gap: 8px; }
        .lang-btn {
            padding: 8px 16px; border-radius: 25px; border: 2px solid #f97316;
            background: var(--card); color: #f97316; cursor: pointer; font-weight: 700; font-size: 12px;
            display: flex; align-items: center; gap: 6px; transition: all 0.3s ease; backdrop-filter: blur(8px);
        }
        .lang-btn:hover { box-shadow: 0 0 14px rgba(249,115,22,0.35); transform: translateY(-1px); }
        .lang-btn.active { background: linear-gradient(135deg,#f97316,#ea580c); color: white; border-color: transparent; box-shadow: 0 0 16px rgba(249,115,22,0.4); }
        .theme-toggle {
            width: 40px; height: 40px; border-radius: 12px; border: 1.5px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
            box-shadow: var(--shadow); backdrop-filter: blur(8px);
        }
        .theme-toggle:hover { border-color: var(--accent); box-shadow: var(--glow-sm); transform: translateY(-1px); }
        .theme-toggle:active { transform: scale(0.92); }
        .timer-pill {
            background: var(--glass-bg); backdrop-filter: blur(16px); border: 1.5px solid var(--glass-border);
            color: var(--text); padding: 8px 16px; border-radius: 12px; font-family: 'Courier New', monospace;
            font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 7px;
            box-shadow: var(--shadow); transition: all 0.3s;
        }
        .timer-pill.warning { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5; animation: pulse 0.8s infinite; box-shadow: 0 0 18px rgba(239,68,68,0.3); }
        body.light-mode .timer-pill.warning { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
        @keyframes pulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.04); } }

        .info-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
        .info-chip {
            display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px;
            border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--glass-bg);
            backdrop-filter: blur(8px); border: 1px solid var(--glass-border); color: var(--text-secondary); transition: all 0.3s ease;
        }
        .info-chip i { font-size: 11px; }
        .info-chip.exam { color: #fb923c; } .info-chip.subject { color: #0ea5e9; } .info-chip.marks { color: #fbbf24; }
        body.light-mode .info-chip.exam { color: #c2410c; } body.light-mode .info-chip.subject { color: #0369a1; } body.light-mode .info-chip.marks { color: #d97706; }

        .progress-card { background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); transition: all 0.3s ease; }
        .progress-card:hover { box-shadow: var(--glow-sm); }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f97316, #0ea5e9); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(249,115,22,0.5); }

        .question-card { background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 24px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); animation: slideIn 0.35s ease; transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s; }
        .question-card:hover { box-shadow: var(--glow-md); transform: translateY(-2px); }
        @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
        .question-card.swiping { transition: none; }

        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .q-badge { background: linear-gradient(135deg,#f97316,#ea580c); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 12px; box-shadow: 0 0 14px rgba(249,115,22,0.35); }
        .q-marks { font-weight: 600; font-size: 12px; color: #fbbf24; background: rgba(251,191,36,0.1); padding: 6px 14px; border-radius: 15px; border: 1px solid rgba(251,191,36,0.25); }
        body.light-mode .q-marks { color: #d97706; background: #fffbeb; border-color: #fde68a; }

        .question-text { font-size: 15px; font-weight: 500; line-height: 1.7; color: var(--text); background: var(--option-bg); padding: 18px; border-radius: 12px; border-left: 4px solid #f97316; margin-bottom: 18px; transition: all 0.3s ease; }
        .question-text .hindi-block { color: #fbbf24; font-size: 14px; line-height: 1.8; }
        body.light-mode .question-text .hindi-block { color: #d97706; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--option-bg); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.25s; font-size: 13px; font-weight: 500; color: var(--text); backdrop-filter: blur(4px); }
        .option-card:hover { border-color: #fb923c; background: var(--hover-bg); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(249,115,22,0.2); }
        .option-card.selected { background: linear-gradient(135deg,#f97316,#ea580c); color: white; border-color: transparent; transform: scale(1.02); box-shadow: 0 6px 22px rgba(249,115,22,0.4); }
        .option-card.correct { background: #10b981 !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 16px rgba(16,185,129,0.4) !important; }
        .option-card.wrong { background: #ef4444 !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 16px rgba(239,68,68,0.4) !important; animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-4px); } 75%{ transform:translateX(4px); } }
        .option-letter { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); border-radius: 8px; font-weight: 800; font-size: 13px; color: #fb923c; flex-shrink: 0; transition: all 0.25s; }
        .option-card.selected .option-letter { background: rgba(255,255,255,0.2); color: white; }
        .option-card.correct .option-letter, .option-card.wrong .option-letter { background: rgba(255,255,255,0.25); color: white; }

        .action-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border-radius: 10px; border: 1.5px solid var(--border); font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 5px; background: var(--glass-bg); backdrop-filter: blur(8px); color: var(--text); flex: 1; justify-content: center; min-width: 60px; }
        .btn:hover { box-shadow: var(--glow-sm); transform: translateY(-2px); border-color: #fb923c; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .btn-mark { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #fbbf24; }
        .btn-mark:hover { box-shadow: 0 0 14px rgba(245,158,11,0.3); }
        .btn-clear { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #4ade80; }
        .btn-clear:hover { box-shadow: 0 0 14px rgba(16,185,129,0.3); }
        body.light-mode .btn-mark { background: #fef3c7; border-color: #fde68a; color: #92400e; }
        body.light-mode .btn-clear { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }

        .palette-card { background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); margin-top: 12px; transition: all 0.3s; }
        .palette-card:hover { box-shadow: var(--glow-sm); }
        .palette-title { font-weight: 700; margin-bottom: 12px; color: var(--text); font-size: 14px; display: flex; align-items: center; gap: 7px; }
        .palette-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 7px; margin-bottom: 12px; }
        .palette-num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--option-bg); border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; transition: all 0.25s; border: 2px solid transparent; color: var(--text); }
        .palette-num:hover { background: var(--hover-bg); transform: scale(1.1); box-shadow: var(--glow-sm); }
        .palette-num.answered { background: linear-gradient(135deg,#10b981,#059669); color: white; box-shadow: 0 0 10px rgba(16,185,129,0.4); }
        .palette-num.marked { background: linear-gradient(135deg,#f59e0b,#d97706); color: white; box-shadow: 0 0 10px rgba(245,158,11,0.4); }
        .palette-num.current { border-color: #f97316; background: rgba(249,115,22,0.2); transform: scale(1.08); box-shadow: 0 0 14px rgba(249,115,22,0.4); }
        .palette-num.wrong-num { background: linear-gradient(135deg,#ef4444,#dc2626); color: white; box-shadow: 0 0 10px rgba(239,68,68,0.4); }

        .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 10px; color: var(--text-secondary); }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

        .review-panel { display: none; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 20px; margin-top: 12px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); }
        .review-panel.show { display: block; animation: fadeIn 0.5s ease; }

        .result-summary { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
        .result-item { background: var(--option-bg); padding: 14px; border-radius: 12px; text-align: center; border: 1px solid var(--border); transition: all 0.3s; }
        .result-item:hover { box-shadow: var(--glow-sm); }
        .result-item .value { font-size: 26px; font-weight: 800; background: linear-gradient(135deg,#f97316,#0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .result-item .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .explanation-box { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); border-radius: 10px; padding: 14px; margin-top: 12px; display: none; transition: all 0.3s; }
        body.light-mode .explanation-box { background: #fef3c7; border-color: #fde68a; color: #92400e; }
        .explanation-box.show { display: block; animation: fadeIn 0.3s ease; }
        .explanation-box .exp-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #fbbf24; }
        body.light-mode .explanation-box .exp-title { color: #92400e; }

        .swipe-hint { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 8px; opacity: 0.7; letter-spacing: 0.5px; }

        .review-mode-card { background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: var(--radius); padding: 20px; margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); transition: all 0.3s; }
        .review-mode-card:hover { box-shadow: var(--glow-sm); transform: translateY(-1px); }
        .review-mode-card.correct-answer { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
        .review-mode-card.wrong-answer { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }
        .review-mode-card.unanswered-q { background: var(--glass-bg); border-color: var(--glass-border); }
        .review-mode-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
        .review-mode-status { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 15px; }
        .status-correct { background: rgba(16,185,129,0.2); color: #4ade80; } .status-wrong { background: rgba(239,68,68,0.2); color: #fca5a5; } .status-unanswered { background: rgba(148,163,184,0.2); color: #94a3b8; }
        body.light-mode .status-correct { background: #d1fae5; color: #065f46; } body.light-mode .status-wrong { background: #fee2e2; color: #991b1b; } body.light-mode .status-unanswered { background: #e2e8f0; color: #475569; }

        .toast { position: fixed; top: 16px; right: 16px; background: var(--glass-bg); backdrop-filter: blur(20px); padding: 12px 18px; border-radius: 10px; box-shadow: var(--glow-md); z-index: 1000; font-weight: 600; font-size: 13px; display: none; border: 1px solid var(--glass-border); color: var(--text); animation: toastIn 0.35s ease; }
        @keyframes toastIn { from { opacity:0; transform:translateX(50px); } to { opacity:1; transform:translateX(0); } }

        .review-mode-badge { display: inline-block; background: linear-gradient(135deg,#f97316,#0ea5e9); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 16px; box-shadow: 0 0 14px rgba(249,115,22,0.35); }

        .avatar-circle { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#f97316,#ea580c); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; overflow: hidden; box-shadow: 0 0 12px rgba(249,115,22,0.3); flex-shrink: 0; }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            .palette-grid { grid-template-columns: repeat(5,1fr); }
            .test-title { font-size: 15px; }
            .question-text { font-size: 14px; padding: 14px; }
            .result-summary { grid-template-columns: 1fr 1fr; }
            .blob { display: none; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="bubbles-container" id="bubblesContainer"></div>

    <div class="mock-container">
        <div class="top-bar">
            <div class="test-title">
                <div class="avatar-circle" id="avatarCircle">📐</div>
                SSC CGL • Advanced Mathematics Mock
            </div>
            <div class="top-actions">
                <button class="lang-btn" id="langBtn" onclick="toggleLanguage()"><span>🇮🇳</span> <span id="langText">हिंदी</span></button>
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></button>
                <div class="timer-pill" id="timerPill"><i class="fas fa-hourglass-half"></i> <span id="timerText">60:00</span></div>
            </div>
        </div>

        <div class="info-row" id="infoRow">
            <span class="info-chip exam"><i class="fas fa-graduation-cap"></i> SSC CGL</span>
            <span class="info-chip subject"><i class="fas fa-calculator"></i> Mathematics</span>
            <span class="info-chip"><i class="fas fa-chart-line"></i> Tier 1 & 2</span>
            <span class="info-chip marks"><i class="fas fa-star"></i> +2 / -0.5</span>
            <span class="info-chip"><i class="fas fa-list"></i> 50 Questions</span>
        </div>

        <div class="progress-card" id="progressCard">
            <div class="progress-header"><span>📊 Progress</span><span id="progressText">0/50 answered</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>

        <div class="question-card" id="questionCard">
            <div class="q-header">
                <span class="q-badge" id="qNumber">Q 1/50</span>
                <span class="q-marks">⭐ +2 / -0.5</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="explanation-box" id="explanationBox">

    <script>
        // ========== BUBBLES ==========
        (function createBubbles() {
            const container = document.getElementById('bubblesContainer');
            const colors = [
                'radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.22), rgba(14, 165, 233, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(16, 185, 129, 0.2), rgba(52, 211, 153, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(245, 158, 11, 0.2), rgba(252, 211, 77, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(239, 68, 68, 0.16), rgba(248, 113, 113, 0.04))',
                'radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.2), rgba(234, 88, 12, 0.06))'
            ];
            for (let i = 0; i < 22; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.floor(Math.random() * 60) + 25;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                bubble.style.animationDelay = (Math.random() * 8) + 's';
                bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(bubble);
            }
            setInterval(() => {
                const bubbles = container.querySelectorAll('.bubble');
                if (bubbles.length < 28) {
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    const size = Math.floor(Math.random() * 50) + 25;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    bubble.style.left = Math.random() * 100 + '%';
                    bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                    bubble.style.animationDelay = '0s';
                    bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(bubble);
                }
            }, 4000);
        })();

        // ========== AVATAR ==========
        function setAvatarWithPic(elementId, userObj) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (userObj && userObj.avatarUrl) {
                el.innerHTML = `<img src="${userObj.avatarUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius: inherit;">`;
            } else if (userObj && userObj.profilePicUrl) {
                el.innerHTML = `<img src="${userObj.profilePicUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius: inherit;">`;
            } else {
                el.textContent = (userObj && userObj.name) ? userObj.name.charAt(0).toUpperCase() : '📐';
            }
        }
        setAvatarWithPic('avatarCircle', { name: 'SSC' });

        // ========== REVIEW MODE DETECTION ==========
        const urlParams = new URLSearchParams(window.location.search);
        const IS_REVIEW_MODE = urlParams.get('review') === 'true';

        // ========== 50 SSC CGL MATHS QUESTIONS ==========
        const QUESTIONS = [{
            id: 0,
            en: "If an 11-digit number 543247x968y is completely divisible by 90, what is the value of (4x+5y)?",
            hi: "यदि 11-अंकीय संख्या 543247x968y, 90 से पूरी तरह विभाज्य है, तो (4x + 5y) का मान क्या होगा?",
            oEn: ["24", "16", "20", "22"],
            oHi: ["24", "16", "20", "22"],
            c: 0,
            exp: "Divisible by 90 ⇒ divisible by 10 and 9. y = 0. Sum of digits = 48 + x. For divisibility by 9, 48+x must be multiple of 9 ⇒ x = 6. 4x+5y = 24."
        }, {
            id: 1,
            en: "When a positive number n is divided by 12, remainder is 7. What is the remainder when (9n²+7n+5) is divided by 12?",

            oEn: ["5", "8", "3", "10"],
            oHi: ["5", "8", "3", "10"],
            c: 2,
            exp: "n ≡ 7 mod 12. Substitute n=7: 9×49 + 7×7 + 5 = 495. 495 ÷ 12 leaves remainder 3."
        }, {
            id: 2,
            en: "Find the value of 1/(1×4) + 1/(4×7) + 1/(7×10) + ... + 1/(22×25).",
            hi: "1/(1×4) + 1/(4×7) + 1/(7×10) + ... + 1/(22×25) का मान ज्ञात कीजिए।",
            oEn: ["8/25", "24/25", "7/25", "12/25"],
            oHi: ["8/25", "24/25", "7/25", "12/25"],
            c: 0,
            exp: "Using 1/d(1/first - 1/last) = 1/3(1 - 1/25) = 8/25."
        }, {
            id: 3,
            en: "An article is sold at a profit of 13¼%. If sold for ₹76.70 more, profit would be 16⅕%. Find the cost price.",
            hi: "एक वस्तु को 13¼% के लाभ पर बेचा जाता है। यदि इसे ₹76.70 अधिक में बेचा जाता, तो लाभ 16⅕% होता। वस्तु का लागत मूल्य ज्ञात कीजिए।",
            oEn: ["₹2,600", "₹2,800", "₹3,200", "₹3,400"],
            oHi: ["₹2,600", "₹2,800", "₹3,200", "₹3,400"],
            c: 0,
            exp: "Difference in profit % = 16.2 - 13.25 = 2.95% = ₹76.70 ⇒ CP = 100% = ₹2,600."
        }, {
            id: 4,
            en: "A dishonest shopkeeper buys at ₹20/kg and sells at ₹24/kg, giving 850 g instead of 1 kg. Find total profit %.",
            hi: "एक बेईमान दुकानदार ₹20/किग्रा पर खरीदे गए आमों को ₹24/किग्रा पर बेचता है और 1 किग्रा के स्थान पर केवल 850 ग्राम देता है। कुल लाभ % कितना है?",
            oEn: ["41.17%", "38.25%", "44.11%", "35.50%"],
            oHi: ["41.17%", "38.25%", "44.11%", "35.50%"],
            c: 0,
            exp: "Effective SP/CP = (24/20)×(1000/850) = 24/17. Profit % = (7/17)×100 ≈ 41.17%."
        }, {
            id: 5,

            c: 0,
            exp: "Increased price = (960 × 20)/(100 × 4) = ₹48/kg."
        }, {
            id: 6,

            hi: "12% वार्षिक दर से 3 वर्ष का साधारण ब्याज, 10% वार्षिक दर से 4 वर्ष के साधारण ब्याज से ₹1,200 कम है। धनराशि ज्ञात कीजिए।",
            oEn: ["₹24,000", "₹30,000", "₹40,000", "₹45,000"],

        // ========== STATE ==========
        const TOTAL = 50;
        const state = {
            currentIndex: 0,
            answers: {},
            markedQuestions: new Set(),
            timeLeft: 60 * 60, // 60 minutes
            timerInterval: null,
            testSubmitted: false,
            darkMode: true,
            lang: 'en',
            score: null
        };

        function toggleTheme() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('light-mode', !state.darkMode);
            document.getElementById('themeIcon').className = state.darkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('ssc_math_theme', state.darkMode ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('ssc_math_theme');
        if (savedTheme === 'light') {
            state.darkMode = false;
            document.body.classList.add('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'hi' : 'en';
            document.getElementById('langText').textContent = state.lang === 'hi' ? 'English' : 'हिंदी';
            document.getElementById('langBtn').classList.toggle('active', state.lang === 'hi');
            if (IS_REVIEW_MODE) renderReviewMode();
            else renderQuestion();
            localStorage.setItem('ssc_math_lang', state.lang);
            showToast(state.lang === 'hi' ? '🇮🇳 हिंदी में बदला' : '🇬🇧 Changed to English');
        }

        function calculateScore() {
            let correct = 0, wrong = 0, score = 0;
            Object.keys(state.answers).forEach(idx => {
                const q = QUESTIONS[parseInt(idx)];
                if (state.answers[idx] === q.c) { correct++; score += 2; }
                else { wrong++; score -= 0.5; }
            });
            return { score: Math.max(0, score), total: TOTAL * 2, correct, wrong, attempted: correct + wrong, unanswered: TOTAL - (correct + wrong) };
        }

        function renderQuestion() {
            if (IS_REVIEW_MODE) return;
            const q = QUESTIONS[state.currentIndex];
            document.getElementById('qNumber').textContent = `Q ${state.currentIndex + 1}/${TOTAL}`;
            const qt = document.getElementById('questionText');
            qt.innerHTML = state.lang === 'hi' ? `<div style="font-weight:600;white-space:pre-line;">${q.hi}</div>` : `<div style="font-weight:600;white-space:pre-line;">${q.en}</div>`;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const opts = state.lang === 'hi' ? q.oHi : q.oEn;
            const letters = ['A','B','C','D'];
            opts.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                if (state.testSubmitted) {
                    if (i === q.c) card.classList.add('correct');
                    else if (state.answers[state.currentIndex] === i) card.classList.add('wrong');
                    card.style.pointerEvents = 'none';
                } else {
                    if (state.answers[state.currentIndex] === i) card.classList.add('selected');
                    card.onclick = () => selectOption(i);
                }
                card.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
                grid.appendChild(card);
            });

            const expBox = document.getElementById('explanationBox');
            if (state.testSubmitted) {
                expBox.classList.add('show');
                document.getElementById('explanationText').textContent = q.exp;
            } else expBox.classList.remove('show');

            document.getElementById('prevBtn').disabled = state.currentIndex === 0;
            document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
            document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
            document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';
            renderPalette();
            updateProgress();
        }

        function selectOption(i) {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            state.answers[state.currentIndex] = i;
            state.markedQuestions.delete(state.currentIndex);
            renderQuestion();
            showToast('✅ Answer saved!');
        }

        function navigate(dir) {
            if (IS_REVIEW_MODE) return;
            const idx = state.currentIndex + dir;
            if (idx >= 0 && idx < TOTAL) {
                state.currentIndex = idx;
                renderQuestion();
                document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function toggleMark() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            const idx = state.currentIndex;
            if (state.markedQuestions.has(idx)) { state.markedQuestions.delete(idx); showToast('🏷️ Unmarked'); }
            else { state.markedQuestions.add(idx); showToast('🚩 Marked for review'); }
            renderPalette();
        }

        function clearAnswer() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            if (state.answers[state.currentIndex] !== undefined) { delete state.answers[state.currentIndex]; renderQuestion(); showToast('🧹 Answer cleared'); }
        }

        function renderPalette() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const num = document.createElement('div');
                num.className = 'palette-num';
                num.textContent = i + 1;
                if (state.testSubmitted) {
                    const q = QUESTIONS[i];
                    if (state.answers[i] === q.c) num.classList.add('answered');
                    else if (state.answers[i] !== undefined) num.classList.add('wrong-num');
                } else {
                    if (state.answers[i] !== undefined) num.classList.add('answered');
                    if (state.markedQuestions.has(i)) num.classList.add('marked');
                }
                if (i === state.currentIndex) num.classList.add('current');
                num.onclick = () => { if (!IS_REVIEW_MODE) { state.currentIndex = i; renderQuestion(); document.getElementById('questionCard').scrollIntoView({ behavior:'smooth' }); } };
                grid.appendChild(num);
            }
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            document.getElementById('progressFill').style.width = (answered / TOTAL * 100) + '%';
            document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
        }

        function startTimer() {
            if (IS_REVIEW_MODE) return;
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                if (state.testSubmitted) { clearInterval(state.timerInterval); return; }
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) { clearInterval(state.timerInterval); autoSubmit(); }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(state.timeLeft / 60), s = state.timeLeft % 60;
            document.getElementById('timerText').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (state.timeLeft < 600 && state.timeLeft > 0) document.getElementById('timerPill').classList.add('warning');
            else document.getElementById('timerPill').classList.remove('warning');
            if (!state.testSubmitted) document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} - SSC Maths Mock`;
        }

        function autoSubmit() { showToast('⏰ Time\'s up! Submitting...'); setTimeout(() => submitTest(true), 1500); }

        function submitTest(skipConfirm = false) {
            if (state.testSubmitted) return;
            const answered = Object.keys(state.answers).length;
            if (!skipConfirm && answered < TOTAL && !confirm(`${TOTAL - answered} unanswered. Submit anyway?`)) return;
            state.testSubmitted = true;
            clearInterval(state.timerInterval);
            state.score = calculateScore();
            localStorage.setItem('ssc_math_answers', JSON.stringify(state.answers));
            localStorage.setItem('ssc_math_result', JSON.stringify(state.score));
            if (window.parent !== window) window.parent.postMessage({ type:'TEST_SUBMITTED', ...state.score, answers: state.answers }, '*');
            showReview();
            renderQuestion();
            renderPalette();
            showToast('✅ Test Submitted!');
            setTimeout(() => document.getElementById('reviewPanel').scrollIntoView({ behavior:'smooth' }), 300);
            document.title = 'Submitted - SSC Maths Mock';
            document.getElementById('swipeHint').style.display = 'none';
            document.getElementById('actionRow').style.display = 'none';
            document.getElementById('progressCard').style.display = 'none';
            document.getElementById('paletteCard').style.display = 'none';
        }

        function showReview() {
            const panel = document.getElementById('reviewPanel');
            panel.classList.add('show');
            const r = state.score;
            document.getElementById('resultSummary').innerHTML = `
            <div class="result-item"><div class="value">${r.score}/${r.total}</div><div class="label">Score</div></div>
            <div class="result-item"><div class="value" style="color:#10b981;">${r.correct}</div><div class="label">✅ Correct (+2)</div></div>
            <div class="result-item"><div class="value" style="color:#ef4444;">${r.wrong}</div><div class="label">❌ Wrong (-0.5)</div></div>
            <div class="result-item"><div class="value">${r.unanswered}</div><div class="label">⬜ Unanswered</div></div>`;
            const rq = document.getElementById('reviewQuestions');
            rq.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                const opts = state.lang === 'hi' ? q.oHi : q.oEn;
                const userAnsText = isUnanswered ? 'Not answered' : opts[userAns];
                const correctAnsText = opts[q.c];
                const qDisplay = state.lang === 'hi' ? q.hi : q.en;
                const div = document.createElement('div');
                div.style.cssText = 'padding:12px;margin:8px 0;border-radius:10px;border:1px solid var(--border);background:var(--option-bg);';
                div.innerHTML = `<strong>Q${i+1}.</strong> ${isCorrect ? '✅' : isUnanswered ? '⬜' : '❌'}
                <div style="white-space:pre-line;font-size:13px;">${qDisplay}</div>
                <div style="font-size:11px;">Your: <b>${userAnsText}</b> | Correct: <b style="color:#10b981;">${correctAnsText}</b></div>
                <div style="background:rgba(245,158,11,0.1);padding:6px;border-radius:6px;margin-top:4px;">💡 ${q.exp}</div>
                <button onclick="jumpToQuestion(${i})" style="margin-top:4px;padding:2px 10px;font-size:11px;">Jump to Q${i+1}</button>`;
                rq.appendChild(div);
            });
        }

        function jumpToQuestion(i) {
            state.currentIndex = i;
            ['questionCard','progressCard','paletteCard','swipeHint','actionRow'].forEach(id => document.getElementById(id).style.display = id==='swipeHint'?'block':id==='actionRow'?'flex':'block');
            renderQuestion();
            document.getElementById('questionCard').scrollIntoView({ behavior:'smooth' });
        }

        function closeReview() { document.getElementById('reviewPanel').classList.remove('show'); }

        function renderReviewMode() {
            const container = document.getElementById('reviewModeContainer');
            const letters = ['A','B','C','D'];
            const optsKey = state.lang === 'hi' ? 'oHi' : 'oEn';
            let html = '<div class="review-mode-badge">📝 Review Mode — All 50 Questions</div>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let cardClass = 'review-mode-card';
                let statusHTML = '';
                if (isUnanswered) { cardClass += ' unanswered-q'; statusHTML = '<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>'; }
                else if (isCorrect) { cardClass += ' correct-answer'; statusHTML = '<span class="review-mode-status status-correct">✅ Correct (+2)</span>'; }
                else { cardClass += ' wrong-answer'; statusHTML = '<span class="review-mode-status status-wrong">❌ Wrong (-0.5)</span>'; }
                const opts = q[optsKey];
                const qDisplay = state.lang === 'hi' ? q.hi : q.en;
                const optionsHTML = opts.map((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = ''; if (j === q.c) label = ' ✅'; if (j === userAns && !isCorrect) label = ' ❌ (Your answer)'; if (j === userAns && isCorrect) label = ' ✅ (Your answer)';
                    return `<div class="${optClass}" style="pointer-events:none;"><div class="option-letter">${letters[j]}</div><span>${opt}${label}</span></div>`;
                }).join('');
                html += `<div class="${cardClass}"><div class="review-mode-header"><span class="q-badge">Q ${i+1}/${TOTAL}</span>${statusHTML}</div><div class="question-text"><div style="white-space:pre-line;font-weight:600;">${qDisplay}</div></div><div class="options-grid">${optionsHTML}</div><div class="explanation-box show" style="margin-top:10px;"><div class="exp-title">💡 Explanation</div><div>${q.exp}</div></div></div>`;
            });
            container.innerHTML = html;
            container.style.display = 'block';
        }

        let touchStartX=0, touchStartY=0, touchMoved=false, swipeHandled=false;
        const card = document.getElementById('questionCard');
        card.addEventListener('touchstart', e => { if (IS_REVIEW_MODE) return; touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchMoved=false; swipeHandled=false; }, {passive:true});
        card.addEventListener('touchmove', e => { if (IS_REVIEW_MODE||swipeHandled) return; const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY; if (Math.abs(dx)>15 && Math.abs(dx)>Math.abs(dy)) { touchMoved=true; card.style.transform=`translateX(${dx*0.5}px)`; card.style.opacity=Math.max(0.5, 1-Math.abs(dx)/800); card.classList.add('swiping'); e.preventDefault(); } }, {passive:false});
        card.addEventListener('touchend', e => { if (IS_REVIEW_MODE) return; card.classList.remove('swiping'); card.style.transform=''; card.style.opacity=''; if (!touchMoved) return; const dx=(e.changedTouches[0]?.clientX||touchStartX)-touchStartX; if (Math.abs(dx)>80) { swipeHandled=true; navigate(dx>0?-1:1); } });

        document.addEventListener('keydown', e => {
            if (IS_REVIEW_MODE) return;
            if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
            switch(e.key.toLowerCase()) {
                case 'arrowleft': e.preventDefault(); navigate(-1); break;
                case 'arrowright': e.preventDefault(); navigate(1); break;
                case 'a': case '1': e.preventDefault(); selectOption(0); break;
                case 'b': case '2': e.preventDefault(); selectOption(1); break;
                case 'c': case '3': e.preventDefault(); selectOption(2); break;
                case 'd': case '4': e.preventDefault(); selectOption(3); break;
                case 'm': e.preventDefault(); toggleMark(); break;
                case 'backspace': e.preventDefault(); clearAnswer(); break;
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent=msg; t.style.display='flex';
            clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none', 2000);
        }

        window.addEventListener('beforeunload', e => {
            if (!state.testSubmitted && state.timeLeft>0 && Object.keys(state.answers).length>0 && !IS_REVIEW_MODE) { e.preventDefault(); e.returnValue=''; }
        });

        function init() {
            localStorage.setItem('ssc_math_last_mock', window.location.href.split('?')[0]);
            if (IS_REVIEW_MODE) {
                ['questionCard','progressCard','paletteCard','swipeHint','infoRow','timerPill','actionRow'].forEach(id => document.getElementById(id).style.display='none');
                document.getElementById('reviewPanel').style.display='none';
                document.title='Review - SSC Maths Mock';
                state.answers = JSON.parse(localStorage.getItem('ssc_math_answers')||'{}');
                state.testSubmitted = true;
                state.lang = localStorage.getItem('ssc_math_lang')||'en';
                if (state.lang==='hi') { document.getElementById('langBtn').classList.add('active'); document.getElementById('langText').textContent='English'; }
                renderReviewMode();
            } else {
                state.lang = localStorage.getItem('ssc_math_lang')||'en';
                if (state.lang==='hi') { document.getElementById('langBtn').classList.add('active'); document.getElementById('langText').textContent='English'; }
                startTimer();
                renderQuestion();
                renderPalette();
            }
        }
        init();
    </script>
</body>
</html>
