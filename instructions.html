<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1E3A5F">
    <title>Test Instructions · TestMaster Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-dark: #152a45;
            --primary-light: #E8EDF2;
            --secondary: #1f3140;
            --blue: #0066ff;
            --blue-light: #e6f0ff;
            --green: #10B981;
            --green-light: #D1FAE5;
            --red: #ff4d5a;
            --red-light: #fff0f1;
            --light: #F4F7FB;
            --white: #FFFFFF;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --accent: #FBBF24;
            --accent-hover: #F59E0B;
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-light: rgba(255, 255, 255, 0.85);
            --border-light: rgba(255, 255, 255, 0.06);
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-md: 18px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --radius-full: 50%;
            --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 48px rgba(0, 0, 0, 0.16);
            --font: 'Poppins', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --premium-gold: #D97706;
            --premium-gold-light: #FEF3C7;
            --premium-gradient: linear-gradient(135deg, #FBBF24 0%, #F59E0B 50%, #D97706 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font);
            background: var(--light);
            min-height: 100vh;
            color: var(--gray-800);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 10px 18px;
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-700);
            text-decoration: none;
            transition: var(--transition-fast);
            box-shadow: var(--shadow-xs);
        }
        .back-link:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
            transform: translateX(-2px);
            box-shadow: var(--shadow-sm);
        }
        .back-link:active { transform: scale(0.97); }
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-text i {
            font-size: 20px;
            width: 34px;
            height: 34px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            border: 1px solid rgba(30,58,95,0.1);
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(0,0,0,0.03);
            padding: 32px 28px;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            animation: fadeSlideIn 0.5s ease-out;
            border: 1px solid var(--gray-200);
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .test-title {
            font-size: 30px;
            font-weight: 800;
            text-align: center;
            color: var(--gray-900);
            line-height: 1.3;
            word-break: break-word;
            letter-spacing: -0.4px;
        }

        /* Info grid – premium version */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
        }
        .info-card {
            background: var(--light);
            border-radius: var(--radius);
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--gray-200);
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-xs);
        }
        .info-card:hover {
            background: var(--white);
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
            border-color: rgba(30,58,95,0.2);
        }
        .info-icon {
            width: 46px;
            height: 46px;
            border-radius: var(--radius);
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            transition: var(--transition-fast);
        }
        .info-card:hover .info-icon {
            background: var(--primary);
            color: #fff;
            transform: rotate(5deg) scale(1.05);
        }
        .info-content h4 {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
        }
        .info-content .val {
            font-size: 19px;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1.2;
        }

        /* Breakdown tables – premium */
        .breakdown-section {
            background: var(--light);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-xs);
            transition: var(--transition-smooth);
        }
        .breakdown-section:hover {
            box-shadow: var(--shadow-sm);
            border-color: rgba(30,58,95,0.15);
        }
        .breakdown-section h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray-800);
            letter-spacing: -0.2px;
        }
        .breakdown-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .breakdown-table th {
            text-align: left;
            padding: 12px 10px;
            background: var(--primary-light);
            font-weight: 700;
            color: var(--primary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-radius: 8px;
        }
        .breakdown-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 500;
            color: var(--gray-700);
        }
        .breakdown-table tr:last-child td { border-bottom: none; }
        .col-no { width: 50px; text-align: center; font-weight: 600; }
        .col-name { font-weight: 600; color: var(--gray-800); }
        .col-count { text-align: center; font-weight: 700; color: var(--primary); }

        /* Instructions list */
        .instructions-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .instructions-list {
            font-size: 15px;
            line-height: 1.9;
            color: var(--gray-700);
            padding-left: 24px;
            list-style-type: decimal;
        }
        .instructions-list li {
            margin-bottom: 12px;
            font-weight: 500;
        }
        .instructions-list li strong {
            color: var(--primary);
        }

        /* Language selector – premium with all option first */
        .lang-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            background: var(--light);
            padding: 16px 18px;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            transition: var(--transition-fast);
        }
        .lang-row label {
            font-weight: 600;
            color: var(--gray-700);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .lang-select {
            height: 48px;
            padding: 10px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            background: var(--white);
            color: var(--gray-800);
            cursor: pointer;
            outline: none;
            transition: var(--transition);
            min-width: 200px;
            font-family: var(--font);
            box-shadow: var(--shadow-xs);
        }
        .lang-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(30,58,95,0.08);
        }

        .warning-note {
            color: #b91c1c;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--red-light);
            padding: 14px 18px;
            border-radius: var(--radius);
            border-left: 4px solid var(--red);
            transition: var(--transition-fast);
        }
        .warning-note i { font-size: 18px; }

        /* Declaration */
        .declaration-box {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-700);
            cursor: pointer;
            user-select: none;
            background: var(--light);
            padding: 16px 18px;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            transition: var(--transition-fast);
        }
        .declaration-box:hover {
            background: #fff;
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .declaration-box input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* Buttons – premium gradient */
        .btn-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-prev {
            background: var(--gray-300);
            color: var(--gray-700);
            border: none;
            border-radius: var(--radius);
            height: 52px;
            padding: 0 28px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: var(--shadow-xs);
        }
        .btn-prev:hover {
            background: var(--gray-400);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .btn-start {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius);
            height: 52px;
            padding: 0 36px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.5;
            pointer-events: none;
            box-shadow: 0 6px 16px rgba(30,58,95,0.25);
        }
        .btn-start.active {
            opacity: 1;
            pointer-events: auto;
            background: var(--primary);
            box-shadow: 0 8px 24px rgba(30,58,95,0.35);
        }
        .btn-start.active:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(30,58,95,0.4);
        }
        .btn-start:active { transform: scale(0.97); }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .card { padding: 20px 16px; }
            .test-title { font-size: 26px; }
            .info-grid { grid-template-columns: 1fr 1fr; }
            .btn-row { flex-direction: column; align-items: stretch; }
            .btn-prev, .btn-start { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p>Loading test details…</p>
    </div>

    <div class="top-bar">
        <a href="javascript:history.back()" class="back-link">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <div class="logo-text">
            <i class="fas fa-graduation-cap"></i> TestMaster Pro
        </div>
    </div>

    <main class="card" id="mainCard" style="visibility:hidden;">
        <h1 class="test-title" id="testTitle"></h1>

        <div class="info-grid">
            <div class="info-card">
                <div class="info-icon"><i class="fas fa-clock"></i></div>
                <div class="info-content">
                    <h4>Duration</h4>
                    <div class="val"><span id="durationVal">--</span> min</div>
                </div>
            </div>
            <div class="info-card">
                <div class="info-icon"><i class="fas fa-question-circle"></i></div>
                <div class="info-content">
                    <h4>Questions</h4>
                    <div class="val" id="totalQVal">--</div>
                </div>
            </div>
            <div class="info-card">
                <div class="info-icon"><i class="fas fa-trophy"></i></div>
                <div class="info-content">
                    <h4>Max Marks</h4>
                    <div class="val" id="maxMarksVal">--</div>
                </div>
            </div>
            <div class="info-card">
                <div class="info-icon"><i class="fas fa-minus-circle"></i></div>
                <div class="info-content">
                    <h4>Negative</h4>
                    <div class="val" id="negVal">--</div>
                </div>
            </div>
        </div>

        <div class="breakdown-section" id="subjectBreakdownArea" style="display:none;">
            <h3><i class="fas fa-book"></i> Subject Breakdown</h3>
            <table class="breakdown-table">
                <thead><tr><th class="col-no">No.</th><th>Subject</th><th class="col-count">Questions</th></tr></thead>
                <tbody id="subjectTableBody"></tbody>
            </table>
        </div>

        <div class="breakdown-section" id="chapterBreakdownArea" style="display:none;">
            <h3><i class="fas fa-layer-group"></i> Chapter Breakdown</h3>
            <table class="breakdown-table">
                <thead><tr><th class="col-no">No.</th><th>Chapter</th><th class="col-count">Questions</th></tr></thead>
                <tbody id="chapterTableBody"></tbody>
            </table>
        </div>

        <div>
            <h2 class="instructions-heading">📋 Instructions</h2>
            <ol class="instructions-list" id="instructionsList"></ol>
        </div>

        <div class="lang-row">
            <label for="langSelect"><i class="fas fa-language"></i> Language:</label>
            <select id="langSelect" class="lang-select">
                <!-- Options will be populated dynamically with All Languages first -->
            </select>
        </div>

        <div class="warning-note">
            <i class="fas fa-exclamation-triangle"></i>
            <span>All questions will be displayed in your chosen language.</span>
        </div>

        <label class="declaration-box" for="agreeCheck">
            <input type="checkbox" id="agreeCheck" onchange="toggleStartButton()">
            <span>I have read and understood all instructions. I agree to take the test honestly.</span>
        </label>

        <div class="btn-row">
            <button class="btn-prev" onclick="history.back()"><i class="fas fa-arrow-left"></i> Previous</button>
            <button id="startBtn" class="btn-start" disabled onclick="startTest()">
                <i class="fas fa-play"></i> Start Test
            </button>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxWm6fuSZcoWDBbSG2n-gpfzteRLgE7FpS9kIvOm-lKrparJ_4dd38vRg3cL8zs-lAn/exec';
        const urlParams = new URLSearchParams(window.location.search);
        const testCode = urlParams.get('testCode');

        if (!testCode) {
            Swal.fire({
                icon: 'error',
                title: 'Test code missing',
                text: 'No test specified. Please select a test first.',
                confirmButtonColor: '#1E3A5F'
            }).then(() => { window.location.href = 'exam.html'; });
        }

        let testData = null;
        let questions = [];

        async function fetchTestData() {
            try {
                const resp = await fetch(`${API_URL}?action=getMockTest&testCode=${encodeURIComponent(testCode)}`);
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || 'Test not found');
                testData = data.test;
                questions = Array.isArray(testData.questions) ? testData.questions : [];
                buildUI();
            } catch (error) {
                document.getElementById('loadingOverlay').style.display = 'none';
                Swal.fire({
                    icon: 'error',
                    title: 'Failed to load test',
                    text: error.message || 'Please check your connection.',
                    confirmButtonColor: '#1E3A5F'
                }).then(() => { window.location.href = 'exam2.html'; });
            }
        }

        function buildUI() {
            document.getElementById('loadingOverlay').style.display = 'none';
            const mainCard = document.getElementById('mainCard');
            mainCard.style.visibility = 'visible';

            // Title
            document.getElementById('testTitle').textContent =
                `${testData.exam || 'Exam'} – ${testData.testName || 'Mock Test'}`;

            // Stats
            const totalQ = questions.length || testData.totalQuestions || 0;
            const duration = testData.duration || 60;
            const marksPerQ = testData.marksPerQuestion || 1;
            const totalMarks = totalQ * marksPerQ;
            const negative = testData.negativeMarking || 0;

            document.getElementById('durationVal').textContent = duration;
            document.getElementById('totalQVal').textContent = totalQ;
            document.getElementById('maxMarksVal').textContent = totalMarks;
            document.getElementById('negVal').textContent = negative.toFixed(2);

            buildBreakdowns();

            // Instructions
            const list = document.getElementById('instructionsList');
            list.innerHTML = `
                <li>This test contains <strong>${totalQ} questions</strong>.</li>
                <li>Each question has <strong>4 options</strong>.</li>
                <li>You must complete the test in <strong>${duration} minutes</strong>.</li>
                <li><strong>${marksPerQ} mark(s)</strong> for each correct answer.</li>
                <li><strong>${negative} mark(s)</strong> will be deducted for each wrong answer.</li>
                <li>No marks for unattempted questions.</li>
                <li>Do not refresh the page during the test.</li>
            `;

            // Language dropdown – "All Languages" at the very top
            const langSelect = document.getElementById('langSelect');
            const hasHindi = testData.language && testData.language.toLowerCase().includes('hindi');

            // Build options array with All Languages first
            let optionsHTML = '<option value="all">🌐 All Languages</option>';
            optionsHTML += '<option value="en">English</option>';
            if (hasHindi) {
                optionsHTML += '<option value="hi">हिन्दी (Hindi)</option>';
            }
            langSelect.innerHTML = optionsHTML;

            // Restore saved preference (if valid)
            const savedLang = localStorage.getItem('mock_lang');
            if (savedLang && [...langSelect.options].some(opt => opt.value === savedLang)) {
                langSelect.value = savedLang;
            }
        }

        function buildBreakdowns() {
            // Subject breakdown
            let subjectData = null;
            if (testData.subjectDetails && typeof testData.subjectDetails === 'object' && Object.keys(testData.subjectDetails).length > 0) {
                const vals = Object.values(testData.subjectDetails);
                if (vals.every(v => !isNaN(parseFloat(v)) && isFinite(v))) {
                    subjectData = testData.subjectDetails;
                }
            }
            if (!subjectData) {
                subjectData = new Map();
                questions.forEach(q => {
                    if (q.subject) {
                        const s = q.subject.trim();
                        subjectData.set(s, (subjectData.get(s) || 0) + 1);
                    }
                });
            }

            const subjectArea = document.getElementById('subjectBreakdownArea');
            const subjectBody = document.getElementById('subjectTableBody');
            const subjectEntries = subjectData instanceof Map ? Array.from(subjectData.entries()) : Object.entries(subjectData);
            if (subjectEntries.length > 0) {
                subjectArea.style.display = 'block';
                subjectBody.innerHTML = '';
                subjectEntries.forEach(([name, count], idx) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td class="col-no">${idx + 1}</td>
                                     <td class="col-name">${name}</td>
                                     <td class="col-count">${count}</td>`;
                    subjectBody.appendChild(row);
                });
            } else {
                subjectArea.style.display = 'none';
            }

            // Chapter breakdown
            let chapterData = null;
            if (testData.chapterDetails && typeof testData.chapterDetails === 'object' && Object.keys(testData.chapterDetails).length > 0) {
                const vals = Object.values(testData.chapterDetails);
                if (vals.every(v => !isNaN(parseFloat(v)) && isFinite(v))) {
                    chapterData = testData.chapterDetails;
                }
            }
            if (!chapterData) {
                chapterData = new Map();
                questions.forEach(q => {
                    if (q.chapter) {
                        const c = q.chapter.trim();
                        chapterData.set(c, (chapterData.get(c) || 0) + 1);
                    }
                });
            }

            const chapterArea = document.getElementById('chapterBreakdownArea');
            const chapterBody = document.getElementById('chapterTableBody');
            const chapterEntries = chapterData instanceof Map ? Array.from(chapterData.entries()) : Object.entries(chapterData);
            if (chapterEntries.length > 0) {
                chapterArea.style.display = 'block';
                chapterBody.innerHTML = '';
                chapterEntries.forEach(([name, count], idx) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td class="col-no">${idx + 1}</td>
                                     <td class="col-name">${name}</td>
                                     <td class="col-count">${count}</td>`;
                    chapterBody.appendChild(row);
                });
            } else {
                chapterArea.style.display = 'none';
            }
        }

        function toggleStartButton() {
            const btn = document.getElementById('startBtn');
            const checked = document.getElementById('agreeCheck').checked;
            if (checked) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        function startTest() {
            if (!document.getElementById('agreeCheck').checked) return;
            const lang = document.getElementById('langSelect').value;
            localStorage.setItem('mock_lang', lang);
            const params = new URLSearchParams();
            params.set('testCode', testCode);
            if (lang !== 'en') params.set('lang', lang);
            window.location.href = `test2.html?${params.toString()}`;
        }

        window.addEventListener('load', () => {
            document.getElementById('loadingOverlay').style.display = 'flex';
            fetchTestData();
        });
    </script>
</body>
</html>
