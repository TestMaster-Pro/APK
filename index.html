<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MockTest Pro - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #a78bfa;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            padding: 40px 35px;
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 10px 50px rgba(99, 102, 241, 0.7); }
        }

        .logo-icon i {
            font-size: 30px;
            color: white;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-section p {
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
            margin-top: 4px;
        }

        .tabs-container {
            display: flex;
            background: #f1f5f9;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 25px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #64748b;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            border: none;
            background: transparent;
        }

        .tab-btn.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .form-section {
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 12px;
            color: var(--dark);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            font-size: 15px;
            transition: color 0.3s;
            z-index: 1;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 13px;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: var(--dark);
        }

        .input-wrapper select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .input-wrapper input:focus, .input-wrapper select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper input.error {
            border-color: var(--danger);
            background: #fff5f5;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 15px;
            z-index: 1;
            background: none;
            border: none;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .forgot-link {
            text-align: right;
            margin-bottom: 18px;
        }

        .forgot-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-submit.loading .spinner {
            display: inline-block;
        }

        .validation-message {
            color: var(--danger);
            font-size: 11px;
            margin-top: 4px;
            display: none;
            font-weight: 500;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 13px;
            margin-top: 16px;
            font-size: 12px;
            font-weight: 500;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 420px;
            animation: modalIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-content h2 {
            margin-bottom: 18px;
            color: var(--dark);
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 25px 20px;
                border-radius: 25px;
            }
            .logo-section h1 {
                font-size: 20px;
            }
            .logo-icon {
                width: 50px;
                height: 50px;
            }
            .logo-icon i {
                font-size: 24px;
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>

    <div class="auth-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>MockTest Pro</h1>
            <p>Practice • Learn • Succeed</p>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button class="tab-btn" onclick="switchTab('register')">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </div>

        <!-- Login Form -->
        <div class="form-section active" id="loginSection">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="forgot-link">
                    <a onclick="openForgotModal()">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Login to Continue</span>
                </button>
            </form>
        </div>

        <!-- Register Form -->
        <div class="form-section" id="registerSection">
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Full Name *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Username * <small style="color:#64748b;">(Must start with alphabet)</small></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regUsername" placeholder="Choose a unique username" required 
                               pattern="^[a-zA-Z][a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':&quot;\\|,.<>\/?]*$"
                               title="Username must start with an alphabet character"
                               oninput="validateField(this, 'username')">
                    </div>
                    <div class="validation-message" id="regUsernameError"></div>
                </div>
                <div class="input-group">
                    <label>Mobile Number *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="regMobile" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                    </div>
                </div>
                <div class="row-2">
                    <div class="input-group">
                        <label>State</label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <select id="regState">
                                <option value="">Select State</option>
                                <option value="Andhra Pradesh">Andhra Pradesh</option>
                                <option value="Bihar">Bihar</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Gujarat">Gujarat</option>
                                <option value="Haryana">Haryana</option>
                                <option value="Karnataka">Karnataka</option>
                                <option value="Kerala">Kerala</option>
                                <option value="Madhya Pradesh">Madhya Pradesh</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Punjab">Punjab</option>
                                <option value="Rajasthan">Rajasthan</option>
                                <option value="Tamil Nadu">Tamil Nadu</option>
                                <option value="Telangana">Telangana</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="West Bengal">West Bengal</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Education</label>
                        <div class="input-wrapper">
                            <i class="fas fa-graduation-cap"></i>
                            <select id="regEducation">
                                <option value="">Select</option>
                                <option value="10th Pass">10th Pass</option>
                                <option value="12th Pass">12th Pass</option>
                                <option value="Graduate">Graduate</option>
                                <option value="Post Graduate">Post Graduate</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Preparing For</label>
                    <div class="input-wrapper">
                        <i class="fas fa-bullseye"></i>
                        <select id="regPreparingFor">
                            <option value="">Select</option>
                            <option value="SSC">SSC</option>
                            <option value="UPSC">UPSC</option>
                            <option value="Banking">Banking</option>
                            <option value="Railway">Railway</option>
                            <option value="CUET">CUET</option>
                            <option value="JEE">JEE</option>
                            <option value="NEET">NEET</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password * <small style="color:#64748b;">(Min 6 chars, start with alphabet)</small></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Min 6 characters" minlength="6" required
                               pattern="^[a-zA-Z][a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':&quot;\\|,.<>\/?]*$"
                               title="Password must start with an alphabet character"
                               oninput="validateField(this, 'password')">
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="validation-message" id="regPasswordError"></div>
                </div>
                <button type="submit" class="btn-submit" id="registerBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Create Account</span>
                </button>
            </form>
        </div>

        <div class="alert" id="alertMessage"></div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-content">
            <h2><i class="fas fa-key"></i> Forgot Password</h2>
            <div class="input-group">
                <label>Enter Username or Mobile</label>
                <div class="input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="forgotInput" placeholder="Username or mobile number" required>
                </div>
            </div>
            <button class="btn-submit" onclick="handleForgotPassword()" style="margin-bottom: 10px;">
                <i class="fas fa-paper-plane"></i> Recover Password
            </button>
            <button class="btn-submit" onclick="closeForgotModal()" style="background: #64748b;">
                <i class="fas fa-times"></i> Cancel
            </button>
            <div class="alert" id="forgotAlert" style="margin-top: 14px;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbya3ER-Cb71xpak-gm1-wLREfPajBxaPBG8TPKLlLgXcwn_P89vBIN_hptN4LFFqe8X4Q/exec';

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 60 + 20;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        function switchTab(tab) {
            const loginSection = document.getElementById('loginSection');
            const registerSection = document.getElementById('registerSection');
            const tabs = document.querySelectorAll('.tab-btn');
            const alert = document.getElementById('alertMessage');
            
            tabs.forEach(t => t.classList.remove('active'));
            alert.style.display = 'none';
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginSection.classList.add('active');
                registerSection.classList.remove('active');
            } else {
                tabs[1].classList.add('active');
                registerSection.classList.add('active');
                loginSection.classList.remove('active');
            }
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // FIXED: Client-side validation function
        function validateField(input, type) {
            const value = input.value;
            const errorDiv = document.getElementById(input.id + 'Error');
            
            if (!value) {
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return true;
            }
            
            // Check first character is alphabet
            const firstChar = value.charAt(0);
            const isFirstCharAlpha = /^[a-zA-Z]/.test(firstChar);
            
            if (!isFirstCharAlpha) {
                errorDiv.textContent = type === 'username' ? 
                    'Username must start with an alphabet character (a-z or A-Z)' : 
                    'Password must start with an alphabet character (a-z or A-Z)';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            }
            
            // Check valid characters
            const validPattern = /^[a-zA-Z][a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]*$/;
            if (!validPattern.test(value)) {
                errorDiv.textContent = 'Contains invalid characters';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            }
            
            // Check minimum length
            if (type === 'password' && value.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            }
            
            if (type === 'username' && value.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            }
            
            // All validations passed
            errorDiv.style.display = 'none';
            input.classList.remove('error');
            return true;
        }

        function showAlert(type, message) {
            const alert = document.getElementById('alertMessage');
            alert.className = 'alert ' + type;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alert.style.display = 'flex';
            setTimeout(() => { alert.style.display = 'none'; }, 5000);
        }

        function showForgotAlert(type, message) {
            const alert = document.getElementById('forgotAlert');
            alert.className = 'alert ' + type;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alert.style.display = 'flex';
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
                btn.querySelector('.btn-text').textContent = 'Processing...';
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
                const isLogin = btn.id === 'loginBtn';
                btn.querySelector('.btn-text').textContent = isLogin ? 'Login to Continue' : 'Create Account';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showAlert('error', 'Please fill all fields');
                return;
            }

            setLoading(btn, true);

            try {
                const response = await fetch(`${API_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('success', 'Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showAlert('error', data.error || 'Invalid credentials');
                }
            } catch (error) {
                showAlert('error', 'Connection error. Please try again.');
                console.error('Login error:', error);
            } finally {
                setLoading(btn, false);
            }
        }

        // FIXED: Registration with client-side validation
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const mobile = document.getElementById('regMobile').value.trim();
            const password = document.getElementById('regPassword').value;
            const state = document.getElementById('regState').value;
            const education = document.getElementById('regEducation').value;
            const preparingFor = document.getElementById('regPreparingFor').value;

            // Clear previous errors
            document.getElementById('regUsernameError').style.display = 'none';
            document.getElementById('regPasswordError').style.display = 'none';
            document.getElementById('regUsername').classList.remove('error');
            document.getElementById('regPassword').classList.remove('error');

            if (!name || !username || !mobile || !password) {
                showAlert('error', 'Please fill all required fields');
                return;
            }

            // Client-side username validation
            if (!/^[a-zA-Z]/.test(username)) {
                showAlert('error', 'Username must start with an alphabet character');
                document.getElementById('regUsername').classList.add('error');
                document.getElementById('regUsernameError').textContent = 'Username must start with an alphabet character';
                document.getElementById('regUsernameError').style.display = 'block';
                return;
            }

            if (!/^[a-zA-Z][a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]*$/.test(username)) {
                showAlert('error', 'Username contains invalid characters');
                document.getElementById('regUsername').classList.add('error');
                return;
            }

            if (username.length < 3) {
                showAlert('error', 'Username must be at least 3 characters');
                document.getElementById('regUsername').classList.add('error');
                return;
            }

            // Client-side password validation
            if (!/^[a-zA-Z]/.test(password)) {
                showAlert('error', 'Password must start with an alphabet character');
                document.getElementById('regPassword').classList.add('error');
                document.getElementById('regPasswordError').textContent = 'Password must start with an alphabet character';
                document.getElementById('regPasswordError').style.display = 'block';
                return;
            }

            if (!/^[a-zA-Z][a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]*$/.test(password)) {
                showAlert('error', 'Password contains invalid characters');
                document.getElementById('regPassword').classList.add('error');
                return;
            }

            if (password.length < 6) {
                showAlert('error', 'Password must be at least 6 characters');
                document.getElementById('regPassword').classList.add('error');
                return;
            }

            // Mobile validation
            if (mobile.length !== 10 || !/^\d+$/.test(mobile)) {
                showAlert('error', 'Enter valid 10-digit mobile number');
                return;
            }

            setLoading(btn, true);

            try {
                const params = new URLSearchParams({
                    action: 'register',
                    name: name,
                    username: username,
                    mobile: mobile,
                    password: password,
                    state: state,
                    education: education,
                    preparingFor: preparingFor
                });
                
                const response = await fetch(API_URL + '?' + params.toString());
                const data = await response.json();

                if (data.success) {
                    showAlert('success', 'Registration successful! Please login.');
                    switchTab('login');
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                    // Clear register form
                    document.getElementById('registerForm').reset();
                } else {
                    showAlert('error', data.error || 'Registration failed. Please try again.');
                }
            } catch (error) {
                showAlert('error', 'Connection error. Please try again.');
                console.error('Registration error:', error);
            } finally {
                setLoading(btn, false);
            }
        }

        function openForgotModal() {
            document.getElementById('forgotModal').classList.add('show');
            document.getElementById('forgotAlert').style.display = 'none';
            document.getElementById('forgotInput').value = '';
        }

        function closeForgotModal() {
            document.getElementById('forgotModal').classList.remove('show');
        }

        async function handleForgotPassword() {
            const input = document.getElementById('forgotInput').value.trim();
            
            if (!input) {
                showForgotAlert('error', 'Please enter username or mobile');
                return;
            }

            try {
                const response = await fetch(`${API_URL}?action=forgotPassword&input=${encodeURIComponent(input)}`);
                const data = await response.json();

                if (data.success) {
                    showForgotAlert('success', `Your password is: <strong>${data.password}</strong>`);
                } else {
                    showForgotAlert('error', data.error || 'Account not found');
                }
            } catch (error) {
                showForgotAlert('error', 'Connection error. Please try again.');
                console.error('Forgot password error:', error);
            }
        }

        // Check if user is already logged in
        if (localStorage.getItem('user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
