<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TestMaster Pro • My Favorites</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-50: #eef2ff;
            --primary-100: #e0e7ff;
            --primary-200: #c7d2fe;
            --primary-300: #a5b4fc;
            --primary-400: #818cf8;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --primary-800: #3730a3;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-amber: #f59e0b;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-sky: #0ea5e9;
            --slate-0: #ffffff;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --bg-body: #f0f4ff;
            --bg-card: rgba(255, 255, 255, 0.82);
            --bg-elevated: rgba(255, 255, 255, 0.94);
            --border-glass: rgba(255, 255, 255, 0.6);
            --text-primary: var(--slate-900);
            --text-secondary: var(--slate-600);
            --text-tertiary: var(--slate-400);
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px -4px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 16px 40px -8px rgba(15, 23, 42, 0.12);
            --shadow-glow-primary: 0 8px 24px -4px rgba(99, 102, 241, 0.35);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 150ms;
            --duration-base: 250ms;
            --duration-slow: 350ms;
            --header-height: 64px;
            --max-width: 1000px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { height:100%; font-size:16px; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
        }

        .ambient-bg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
        .ambient-mesh {
            position:absolute; inset:0;
            background: radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse 60% 60% at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%);
            filter: blur(60px);
        }

        .app-header {
            position:sticky; top:0; z-index:100; height:var(--header-height);
            background:rgba(255,255,255,0.75); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.6); box-shadow:0 1px 12px rgba(15,23,42,0.04);
            display:flex; align-items:center; justify-content:space-between; padding:0 var(--space-3); gap:var(--space-2);
        }
        .header-left { display:flex; align-items:center; gap:var(--space-2); flex-shrink:0; }
        .back-btn { width:40px; height:40px; border-radius:var(--radius-md); background:var(--slate-100); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--slate-600); font-size:18px; transition:all var(--duration-fast) var(--ease-out); }
        .back-btn:hover { background:var(--slate-200); color:var(--slate-800); }
        .brand-mark { display:flex; align-items:center; gap:8px; font-weight:800; font-size:clamp(14px,3.5vw,17px); background:linear-gradient(135deg,var(--primary-600),var(--accent-purple),var(--accent-cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer; }
        .brand-mark i { font-size:clamp(18px,4vw,22px); -webkit-text-fill-color:var(--primary-500); }
        .avatar-btn { width:36px; height:36px; border-radius:var(--radius-md); background:linear-gradient(135deg,var(--primary-100),var(--primary-200)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--primary-700); flex-shrink:0; box-shadow:var(--shadow-sm); overflow:hidden; border:none; }
        .avatar-btn img { width:100%; height:100%; object-fit:cover; }

        .main-wrapper { max-width:var(--max-width); margin:0 auto; padding:var(--space-4) var(--space-3) var(--space-10); width:100%; position:relative; z-index:2; display:flex; flex-direction:column; gap:var(--space-5); }
        .page-title { font-size:clamp(22px,5vw,28px); font-weight:800; display:flex; align-items:center; gap:var(--space-3); letter-spacing:-0.5px; }
        .page-title i { color:#db2777; }

        .fav-grid { display:flex; flex-direction:column; gap:var(--space-4); }
        .fav-card {
            background:var(--bg-card); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
            border-radius:var(--radius-xl); padding:var(--space-4); border:1px solid var(--border-glass);
            box-shadow:var(--shadow-sm); transition:all var(--duration-base) var(--ease-out);
            display:flex; align-items:center; justify-content:space-between; gap:var(--space-4);
            flex-wrap:wrap;
        }
        .fav-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
        .fav-info { flex:1; min-width:200px; }
        .fav-info h3 { font-size:16px; font-weight:800; margin-bottom:var(--space-2); color:var(--slate-800); }
        .fav-meta { display:flex; flex-wrap:wrap; gap:var(--space-2); margin-bottom:var(--space-2); }
        .fav-meta span { background:var(--slate-100); padding:4px 10px; border-radius:8px; font-size:10px; font-weight:600; color:var(--slate-600); display:inline-flex; align-items:center; gap:4px; border:1px solid var(--slate-200); }
        .fav-badge { background:var(--primary-50); color:var(--primary-700); border-color:var(--primary-200); }
        .fav-actions { display:flex; gap:var(--space-2); flex-shrink:0; }
        .btn-attempt { background:linear-gradient(135deg,var(--primary-500),var(--primary-600)); color:white; border:none; padding:10px 18px; border-radius:var(--radius-md); font-weight:700; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all var(--duration-fast) var(--ease-out); white-space:nowrap; box-shadow:0 4px 12px rgba(99,102,241,0.25); font-family:inherit; }
        .btn-attempt:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(99,102,241,0.35); }
        .btn-remove { background:#fef2f2; color:#dc2626; border:1.5px solid #fecaca; padding:10px 16px; border-radius:var(--radius-md); font-weight:700; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all var(--duration-fast); font-family:inherit; white-space:nowrap; }
        .btn-remove:hover { background:#fee2e2; }

        .empty-state { text-align:center; padding:var(--space-10) var(--space-5); color:var(--slate-400); animation:fadeIn var(--duration-base) ease-out; }
        .empty-state i { font-size:48px; margin-bottom:var(--space-3); display:block; opacity:0.4; color:var(--slate-300); }
        .empty-state p { font-size:16px; font-weight:600; }
        .empty-state a { color:var(--primary-500); font-weight:700; text-decoration:none; }

        .loading-spinner { display:flex; justify-content:center; padding:var(--space-10); }
        .spinner { width:40px; height:40px; border:4px solid var(--slate-200); border-top-color:var(--primary-500); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div class="ambient-bg"><div class="ambient-mesh"></div></div>

    <header class="app-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <div class="brand-mark" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-graduation-cap"></i>
                <span>TestMaster Pro</span>
            </div>
        </div>
        <button class="avatar-btn" id="userInitial">S</button>
    </header>

    <main class="main-wrapper">
        <h1 class="page-title"><i class="fas fa-heart"></i> My Favorites</h1>
        <div id="favContainer">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxDGnZ29sutkoDz_EeJEK0KqrfDhDQD0fpJUO0iYUCHCPo0Uv5qeWpUV4YOpSWlaPdqFg/exec';
        let allMocks = [];
        let favorites = [];

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'index.html';

        // Set avatar initial
        const avatarEl = document.getElementById('userInitial');
        if (user?.avatarUrl) {
            avatarEl.innerHTML = `<img src="${user.avatarUrl}" alt="avatar">`;
        } else if (user?.profilePicUrl) {
            avatarEl.innerHTML = `<img src="${user.profilePicUrl}" alt="avatar">`;
        } else {
            avatarEl.textContent = user.name ? user.name.charAt(0).toUpperCase() : 'S';
        }

        async function loadMocks() {
            try {
                const r = await fetch('mocks.json');
                allMocks = await r.json();
            } catch (e) {
                console.error('Failed to load mocks', e);
                allMocks = [];
            }
        }

        async function loadFavorites() {
            const container = document.getElementById('favContainer');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
            try {
                const r = await fetch(`${API_URL}?action=getFavorites&username=${encodeURIComponent(user.username)}`);
                const d = await r.json();
                if (d.success && d.favorites) {
                    favorites = d.favorites.filter(f => f.type === 'test');
                } else {
                    favorites = [];
                }
                renderFavorites();
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load favorites</p></div>`;
            }
        }

        function getTestByCode(code) {
            return allMocks.find(m => m.testCode === code);
        }

        function renderFavorites() {
            const container = document.getElementById('favContainer');
            if (!favorites.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-heart-broken"></i>
                        <p>No favorites yet!</p>
                        <small>Tap the heart icon on any test to save it here.</small>
                        <br><a href="dashboard.html">Browse Tests</a>
                    </div>`;
                return;
            }

            container.innerHTML = `<div class="fav-grid" id="favGrid"></div>`;
            const grid = document.getElementById('favGrid');
            favorites.forEach(fav => {
                const test = getTestByCode(fav.itemId);
                if (!test) return;
                const card = document.createElement('div');
                card.className = 'fav-card';
                card.innerHTML = `
                    <div class="fav-info">
                        <h3>${test.testName}</h3>
                        <div class="fav-meta">
                            <span class="fav-badge"><i class="fas fa-file-alt"></i> ${test.exam}</span>
                            <span><i class="fas fa-bookmark"></i> ${test.subject}</span>
                            ${test.chapter ? `<span><i class="fas fa-layer-group"></i> ${test.chapter}</span>` : ''}
                            <span><i class="fas fa-clock"></i> ${test.duration || 30}m</span>
                            <span>${test.totalQuestions} Qs</span>
                        </div>
                    </div>
                    <div class="fav-actions">
                        <button class="btn-attempt" onclick="openTest('${test.file.replace(/'/g, "\\'")}', '${test.testCode.replace(/'/g, "\\'")}', '${test.exam.replace(/'/g, "\\'")}')"><i class="fas fa-play-circle"></i> Attempt</button>
                        <button class="btn-remove" onclick="removeFavorite('${test.testCode.replace(/'/g, "\\'")}', this.closest('.fav-card'))"><i class="fas fa-trash-alt"></i> Remove</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        async function removeFavorite(testCode, cardElement) {
            const result = await Swal.fire({
                title: 'Remove from favorites?',
                text: 'You can always add it back later.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Yes, remove',
                cancelButtonText: 'Cancel',
                confirmButtonColor: '#dc2626',
            });
            if (!result.isConfirmed) return;

            try {
                const r = await fetch(`${API_URL}?action=removeFavorite&username=${encodeURIComponent(user.username)}&type=test&itemId=${encodeURIComponent(testCode)}`);
                const d = await r.json();
                if (d.success) {
                    cardElement.style.opacity = '0';
                    cardElement.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        cardElement.remove();
                        // update favorites array locally
                        favorites = favorites.filter(f => f.itemId !== testCode);
                        if (favorites.length === 0) {
                            renderFavorites();
                        }
                    }, 300);
                } else {
                    Swal.fire('Error', d.error || 'Could not remove', 'error');
                }
            } catch (e) {
                Swal.fire('Network Error', 'Please try again', 'error');
            }
        }

        function openTest(file, code, exam) {
            localStorage.setItem('last_mock_file', file);
            localStorage.setItem('current_exam', exam);
            window.location.href = `test.html?file=${encodeURIComponent(file)}&testCode=${encodeURIComponent(code)}`;
        }

        (async function init() {
            await loadMocks();
            await loadFavorites();
        })();
    </script>
</body>
</html>
