<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#5b4cf0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Test Details · TestMaster Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* ===================================================
           Full CSS – identical to your exam.html library
           =================================================== */
        :root {
            --primary: #5b4cf0;
            --primary-dark: #4338ca;
            --primary-light: #eef0ff;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --gray-900: #0f172a;
            --gray-800: #1e293b;
            --gray-700: #334155;
            --gray-600: #475569;
            --gray-500: #64748b;
            --gray-400: #94a3b8;
            --gray-300: #cbd5e1;
            --gray-200: #e2e8f0;
            --gray-100: #f1f5f9;
            --gray-50: #f8fafc;
            --light: #ffffff;
            --radius-xs: 8px;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-md: 18px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 8px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 24px -6px rgba(0,0,0,0.10);
            --shadow-xl: 0 20px 40px -12px rgba(0,0,0,0.14);
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --bottom-nav-height: 68px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --max-content-width: 680px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; height: 100%; }
        body {
            font-family: var(--font-body);
            background: #f7f9fc;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            max-width: 100vw;
            padding-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 12px);
        }
        body.sidebar-open, body.sheet-open { overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* Toast */
        .toast-container {
            position: fixed; top: calc(12px + var(--safe-top)); left: 50%; transform: translateX(-50%) translateY(-150%);
            z-index: 1000; display: flex; flex-direction: column; gap: 8px; width: 92%; max-width: 380px; pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast-container.show { transform: translateX(-50%) translateY(0); }
        .toast-item {
            background: var(--gray-800); color: white; padding: 12px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-xl); animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: all; border-left: 3px solid var(--primary);
        }
        .toast-item.success { border-left-color: var(--success); }
        .toast-item.error { border-left-color: var(--danger); }
        .toast-item.warning { border-left-color: var(--warning); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Offline banner */
        .offline-banner {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--danger); color: white; text-align: center;
            padding: 6px; font-size: 11px; font-weight: 700; z-index: 999; transform: translateY(-100%); transition: transform 0.3s ease;
        }
        .offline-banner.show { transform: translateY(0); }

        /* Sidebar – identical to exam.html */
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 250; opacity: 0; visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s; backdrop-filter: blur(8px);
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar {
            position: fixed; top: 0; left: 0; height: 100%; height: 100dvh; width: 300px; max-width: 85vw;
            background: rgba(255,255,255,0.97); z-index: 251; transform: translateX(-110%);
            transition: transform 0.4s cubic-bezier(0.32,0.72,0,1); display: flex; flex-direction: column;
            box-shadow: 8px 0 40px rgba(0,0,0,0.14); border-radius: 0 24px 24px 0; overflow: hidden;
            border-right: 1px solid var(--glass-border);
        }
        .sidebar-overlay.active .sidebar { transform: translateX(0); }
        .sidebar-brand {
            background: linear-gradient(135deg, #5b4cf0, #7c3aed); padding: 20px 18px 18px; display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; position: relative;
        }
        .sidebar-logo {
            width: 42px; height: 42px; background: rgba(255,255,255,0.2); border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; flex-shrink: 0;
        }
        .sidebar-brand-text { color: #fff; font-weight: 800; font-size: 15px; letter-spacing: -0.3px; line-height: 1.2; font-family: var(--font-display); }
        .sidebar-brand-text small { display: block; font-weight: 500; font-size: 10px; opacity: 0.85; letter-spacing: 0.3px; }
        .sidebar-close-btn {
            position: absolute; top: 16px; right: 14px; width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; transition: var(--transition-fast);
        }
        .sidebar-close-btn:hover { background: rgba(255,255,255,0.3); transform: rotate(90deg) scale(1.1); }
        .sidebar-user-card {
            padding: 16px 18px; background: linear-gradient(135deg, #fafbff, #f8f6ff); border-bottom: 1px solid rgba(91,76,240,0.08);
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .sidebar-avatar {
            width: 46px; height: 46px; border-radius: 16px; background: linear-gradient(135deg, #eef0ff, #ddd6fe);
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: var(--primary);
            flex-shrink: 0; overflow: hidden; border: 2px solid white;
        }
        .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
        .sidebar-user-info { overflow: hidden; flex: 1; }
        .sidebar-user-info .name { font-weight: 700; font-size: 14px; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-display); }
        .sidebar-user-info .tag { font-size: 10px; color: var(--primary); font-weight: 700; background: var(--primary-light); padding: 3px 10px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; -webkit-overflow-scrolling: touch; }
        .sidebar-nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gray-400); font-weight: 800; padding: 14px 8px 6px; font-family: var(--font-display); }
        .sidebar-nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; cursor: pointer; font-weight: 600;
            font-size: 13px; color: var(--gray-600); transition: var(--transition-fast); text-decoration: none; border: none;
            background: transparent; width: 100%; text-align: left; font-family: var(--font-body);
        }
        .sidebar-nav-item:hover { background: var(--gray-50); color: var(--gray-800); transform: translateX(4px); }
        .sidebar-nav-item:active { transform: scale(0.97); background: var(--gray-100); }
        .sidebar-nav-item.active-nav { background: linear-gradient(135deg, var(--primary-light), #f5f3ff); color: var(--primary); font-weight: 700; }
        .nav-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .sidebar-nav-item:hover .nav-icon { transform: scale(1.1); }
        .nav-icon-tests { background: #eef0ff; color: var(--primary); }
        .nav-icon-mocks { background: #eef0ff; color: var(--primary); }
        .nav-icon-books { background: #fff7ed; color: #f97316; }
        .nav-icon-results { background: #ecfdf5; color: var(--success); }
        .nav-icon-chat { background: #f0f9ff; color: var(--accent); }
        .nav-icon-premium { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #d97706; }
        .nav-icon-profile { background: #fdf2f8; color: #db2777; }
        .nav-icon-logout { background: #fef2f2; color: #dc2626; }
        .sidebar-nav-item.logout-item:hover { background: #fef2f2; color: #dc2626; }
        .sidebar-contact { padding: 14px 16px 18px; background: linear-gradient(135deg, #fafbff, #f8f6ff); border-top: 1px solid rgba(91,76,240,0.06); flex-shrink: 0; }
        .sidebar-contact-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.1px; color: var(--gray-400); font-weight: 800; margin-bottom: 10px; font-family: var(--font-display); }
        .sidebar-contact-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; font-size: 11px; color: var(--gray-600); text-decoration: none; transition: var(--transition-fast); font-weight: 500; cursor: pointer; }
        .sidebar-contact-item:hover { background: var(--gray-100); color: var(--gray-800); }
        .sidebar-version { text-align: center; font-size: 10px; color: var(--gray-300); padding: 8px; flex-shrink: 0; font-weight: 500; }

        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 1px 16px rgba(0,0,0,0.04); border-bottom: 1px solid rgba(0,0,0,0.04); gap: 8px; flex-wrap: nowrap; min-height: 56px;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .hamburger-btn {
            width: 38px; height: 38px; border-radius: 12px; background: var(--gray-100); border: none; cursor: pointer; font-size: 16px;
            color: var(--gray-600); display: flex; align-items: center; justify-content: center; transition: var(--transition-fast);
        }
        .hamburger-btn:hover { background: var(--gray-200); color: var(--gray-800); transform: scale(1.05); }
        .nav-brand {
            display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer; white-space: nowrap; letter-spacing: -0.4px; font-family: var(--font-display);
        }
        .nav-brand i { font-size: 18px; -webkit-text-fill-color: var(--primary); }
        .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 12px; background: linear-gradient(135deg, #eef0ff, #ddd6fe);
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--primary);
            overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(91,76,240,0.12); flex-shrink: 0;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .user-avatar:hover { transform: scale(1.08); }
        .category-badge-nav {
            background: linear-gradient(135deg, var(--primary), #6d5df7); color: #fff; padding: 6px 12px; border-radius: 24px;
            font-size: 11px; font-weight: 700; white-space: nowrap; box-shadow: 0 2px 10px rgba(91,76,240,0.2);
        }
        .btn-premium { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #1e293b; box-shadow: 0 2px 10px rgba(245,158,11,0.25); font-weight: 700; }
        .btn-logout { background: #fef2f2; color: #dc2626; padding: 6px 10px; }

        /* Main container */
        .container { max-width: var(--max-content-width); margin: 0 auto; padding: 14px 14px calc(20px + var(--bottom-nav-height)); position: relative; z-index: 5; width: 100%; flex: 1; }

        /* Filter accordion (same as exam.html) */
        .filter-accordion { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; animation: fadeSlideIn 0.5s ease-out; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .filter-accordion-item { border-radius: var(--radius-lg); background: #fff; border: 1.5px solid var(--gray-200); overflow: hidden; transition: var(--transition-smooth); box-shadow: var(--shadow-xs); }
        .filter-accordion-item.open { border-color: #c7d2fe; box-shadow: 0 6px 24px rgba(91,76,240,0.12); }
        .filter-accordion-header {
            width: 100%; padding: 14px 18px; background: transparent; border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: space-between; gap: 12px; font-family: var(--font-body); font-weight: 700;
            font-size: 14px; color: var(--gray-700); transition: var(--transition-fast); text-align: left; user-select: none;
        }
        .filter-accordion-header:active { background: var(--gray-50); }
        .filter-accordion-header > span:first-child { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .filter-accordion-header > span:first-child i {
            width: 36px; height: 36px; border-radius: 10px; background: var(--gray-100); display: flex; align-items: center;
            justify-content: center; font-size: 14px; color: var(--primary); flex-shrink: 0;
        }
        .filter-accordion-item.open .filter-accordion-header > span:first-child i { background: var(--primary-light); transform: scale(1.1); }
        .accordion-badge {
            font-size: 11px; font-weight: 700; background: var(--gray-100); color: var(--gray-500); padding: 4px 12px;
            border-radius: 20px; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
        }
        .accordion-badge.active-badge { background: var(--primary-light); color: var(--primary); }
        .accordion-arrow { font-size: 13px; color: var(--gray-400); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; }
        .filter-accordion-item.open .accordion-arrow { transform: rotate(180deg); color: var(--primary); }
        .filter-accordion-body { max-height: 0; overflow-y: auto; overflow-x: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); border-top: 0px solid transparent; }
        .filter-accordion-item.open .filter-accordion-body { max-height: 400px; border-top: 1px solid var(--gray-100); }
        .vertical-chip-list { display: flex; flex-direction: column; gap: 3px; padding: 8px 12px 12px; }
        @media (min-width: 640px) { .vertical-chip-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; } }
        .vertical-chip {
            width: 100%; padding: 12px 16px; border-radius: 12px; background: var(--gray-50); border: 2px solid transparent;
            cursor: pointer; font-weight: 600; font-size: 13px; color: var(--gray-600); transition: var(--transition-fast);
            text-align: left; font-family: var(--font-body); display: flex; align-items: center; gap: 10px;
        }
        .vertical-chip:hover { background: var(--gray-100); color: var(--gray-800); transform: translateX(4px); }
        .vertical-chip:active { transform: scale(0.97); background: var(--primary-light); }
        .vertical-chip.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); font-weight: 700; }
        .vertical-chip .vc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300); flex-shrink: 0; }
        .vertical-chip.active .vc-dot { background: var(--primary); box-shadow: 0 0 0 4px rgba(91,76,240,0.12); }
        .search-row-vertical { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .search-chip-vertical {
            padding: 12px 16px; border-radius: var(--radius-lg); background: white; border: 2px solid var(--gray-200);
            font-weight: 600; font-size: 13px; cursor: text; color: var(--gray-700); transition: var(--transition);
            display: flex; align-items: center; gap: 10px; flex: 1;
        }
        .search-chip-vertical input { border: none; outline: none; font-family: inherit; font-weight: 600; font-size: 13px; color: var(--gray-700); width: 100%; background: transparent; }
        .search-chip-vertical input::placeholder { color: var(--gray-400); }
        .search-chip-vertical:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(91,76,240,0.08); }
        .clear-chip-vertical {
            padding: 12px 18px; border-radius: var(--radius-lg); background: #fef2f2; border: 2px solid #fecaca;
            font-weight: 700; font-size: 12px; cursor: pointer; color: #dc2626; transition: var(--transition); white-space: nowrap;
            display: flex; align-items: center; gap: 6px;
        }
        .clear-chip-vertical:hover { background: #fee2e2; transform: translateY(-1px); }

        /* Test card */
        .test-list { display: flex; flex-direction: column; gap: 12px; }
        .test-card {
            background: #fff; border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-xs);
            transition: var(--transition-smooth); border: 1px solid var(--gray-200); display: flex; flex-direction: column;
            position: relative; overflow: hidden; animation: cardSlideIn 0.45s ease-out; animation-fill-mode: both;
        }
        @keyframes cardSlideIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .test-card:hover { border-color: rgba(91,76,240,0.25); box-shadow: var(--shadow-md); transform: translateY(-3px); }
        .test-card:active { transform: scale(0.985) translateY(-1px); }
        .badge-exam { background: var(--primary-light); color: var(--primary-dark); padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .test-card h4 { font-size: 15px; font-weight: 800; margin-bottom: 10px; line-height: 1.35; color: var(--gray-900); font-family: var(--font-display); }
        .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .meta-item {
            background: var(--gray-50); padding: 8px 10px; border-radius: var(--radius-sm); text-align: center;
            border: 1px solid var(--gray-100);
        }
        .meta-item i { font-size: 12px; color: var(--gray-400); margin-bottom: 3px; display: block; }
        .meta-item span { font-size: 11px; font-weight: 700; color: var(--gray-700); display: block; }
        .card-tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tag-chip {
            background: var(--gray-50); padding: 4px 10px; border-radius: 8px; font-size: 11px; color: var(--gray-600);
            display: inline-flex; align-items: center; gap: 4px; font-weight: 600;
        }
        .action-buttons { display: flex; gap: 8px; }
        .attempt-btn {
            flex: 2; background: linear-gradient(135deg, var(--primary), #6d5df7); color: white; border: none;
            padding: 10px 14px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer;
            transition: var(--transition-smooth); display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .attempt-btn:hover { background: linear-gradient(135deg, #4a3dd4, var(--primary)); transform: translateY(-2px); }
        .coming-soon-btn {
            flex: 2; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; padding: 10px 14px; border-radius: 12px;
            font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: default;
        }

        .empty-selection {
            text-align: center; padding: 60px 20px; background: var(--glass-bg); backdrop-filter: blur(16px);
            border-radius: var(--radius-xl); border: 1px solid var(--glass-border); box-shadow: var(--shadow-md);
        }
        .icon-pulse {
            width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), #ddd6fe);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 28px; color: var(--primary);
            animation: softPulse 2.5s infinite;
        }
        @keyframes softPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(91,76,240,0.3); transform: scale(1); } 50% { box-shadow: 0 0 0 20px rgba(91,76,240,0); transform: scale(1.04); } }

        .pro-footer {
            margin-top: 24px; background: linear-gradient(135deg, var(--gray-800), var(--gray-900)); color: rgba(255,255,255,0.55);
            padding: 24px 16px; text-align: center; font-size: 11px; border-radius: 24px 24px 0 0;
            margin-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom));
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--bottom-nav-height) + var(--safe-bottom));
            background: rgba(255,255,255,0.95); backdrop-filter: blur(24px);
            border-top: 1px solid rgba(0,0,0,0.06); z-index: 95; display: flex; justify-content: space-around; align-items: flex-start;
            padding-top: 8px; padding-bottom: var(--safe-bottom); box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }
        .bottom-nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px; border: none;
            background: transparent; cursor: pointer; color: var(--gray-400); transition: var(--transition-fast);
            font-family: var(--font-body); text-decoration: none;
        }
        .bottom-nav-item.active { color: var(--primary); }
        .bottom-nav-item.active::before { content: ''; position: absolute; top: -8px; width: 24px; height: 3px; background: var(--primary); border-radius: 2px; }

        .hidden { display: none !important; }

        @media (min-width: 600px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
            .pro-footer { margin-bottom: var(--safe-bottom); }
        }
    </style>
</head>
<body>
    <div class="offline-banner" id="offlineBanner"><i class="fas fa-wifi" style="margin-right:6px;"></i> You're offline. Some features may be limited.</div>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Sidebar -->
    <div class="sidebar-overlay hidden" id="sidebarOverlay" onclick="closeSidebar(event)">
        <aside class="sidebar" id="sidebar" onclick="event.stopPropagation()">
            <div class="sidebar-brand">
                <div class="sidebar-logo"><i class="fas fa-graduation-cap"></i></div>
                <div class="sidebar-brand-text">TestMaster Pro<small>Smart Learning Platform</small></div>
                <button class="sidebar-close-btn" onclick="closeSidebarDirect()"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-user-card">
                <div class="sidebar-avatar" id="sidebarAvatar">S</div>
                <div class="sidebar-user-info">
                    <div class="name" id="sidebarUserName">Student</div>
                    <span class="tag" id="sidebarUserTag">Learner</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="sidebar-nav-item" onclick="navigate('dashboard.html')"><span class="nav-icon nav-icon-tests"><i class="fas fa-book-open"></i></span><span>Dashboard</span></button>
                <button class="sidebar-nav-item active-nav" onclick="navigate('exam.html')"><span class="nav-icon nav-icon-mocks"><i class="fas fa-file-alt"></i></span><span>Mock Tests</span></button>
                <button class="sidebar-nav-item" onclick="navigate('allresult.html')"><span class="nav-icon nav-icon-results"><i class="fas fa-chart-bar"></i></span><span>My Results</span></button>
                <button class="sidebar-nav-item" onclick="navigate('profile.html')"><span class="nav-icon nav-icon-profile"><i class="fas fa-user-circle"></i></span><span>Profile</span></button>
                <button class="sidebar-nav-item logout-item" onclick="logout()"><span class="nav-icon nav-icon-logout"><i class="fas fa-sign-out-alt"></i></span><span>Logout</span></button>
            </nav>
            <div class="sidebar-version">TestMaster Pro v3.1 · © 2026</div>
        </aside>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <button class="hamburger-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
            <div class="nav-brand" onclick="navigate('dashboard.html')"><i class="fas fa-graduation-cap"></i> TestMaster Pro</div>
        </div>
        <div class="nav-right">
            <span class="category-badge-nav" id="navCategoryBadge">📂 Category</span>
            <div class="user-avatar" id="userInitial" onclick="openSidebar()">S</div>
            <a href="payment.html" class="nav-btn btn-premium"><i class="fas fa-crown"></i> Premium</a>
            <button class="nav-btn btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="container">
        <div class="filter-accordion" id="filterAccordion">
            <div class="filter-accordion-item" id="examAccordionItem">
                <button class="filter-accordion-header" onclick="toggleAccordion('examAccordionBody','examArrow','examAccordionItem')">
                    <span><i class="fas fa-file-alt"></i> Exam</span>
                    <span class="accordion-badge" id="examBadge">All</span>
                    <i class="fas fa-chevron-down accordion-arrow" id="examArrow"></i>
                </button>
                <div class="filter-accordion-body" id="examAccordionBody">
                    <div class="vertical-chip-list" id="examChips"></div>
                </div>
            </div>
            <div class="filter-accordion-item" id="subjectAccordionItem">
                <button class="filter-accordion-header" onclick="toggleAccordion('subjectAccordionBody','subjectArrow','subjectAccordionItem')">
                    <span><i class="fas fa-book"></i> Subject</span>
                    <span class="accordion-badge" id="subjectBadge">All</span>
                    <i class="fas fa-chevron-down accordion-arrow" id="subjectArrow"></i>
                </button>
                <div class="filter-accordion-body" id="subjectAccordionBody">
                    <div class="vertical-chip-list" id="subjectChips"></div>
                </div>
            </div>
            <div class="filter-accordion-item" id="chapterAccordionItem">
                <button class="filter-accordion-header" onclick="toggleAccordion('chapterAccordionBody','chapterArrow','chapterAccordionItem')">
                    <span><i class="fas fa-layer-group"></i> Chapter</span>
                    <span class="accordion-badge" id="chapterBadge">All</span>
                    <i class="fas fa-chevron-down accordion-arrow" id="chapterArrow"></i>
                </button>
                <div class="filter-accordion-body" id="chapterAccordionBody">
                    <div class="vertical-chip-list" id="chapterChips"></div>
                </div>
            </div>
            <div class="search-row-vertical">
                <div class="search-chip-vertical">
                    <i class="fas fa-search" style="color:var(--primary);"></i>
                    <input type="text" id="searchInput" placeholder="Search tests by name or code...">
                </div>
                <button class="clear-chip-vertical" onclick="clearAllFilters()"><i class="fas fa-undo-alt"></i> Reset</button>
            </div>
        </div>

        <div class="test-list" id="testList">
            <div class="empty-selection">
                <div class="icon-pulse"><i class="fas fa-spinner fa-pulse"></i></div>
                <h2>Loading tests...</h2>
            </div>
        </div>
    </div>

    <footer class="pro-footer">
        <p>© 2026 TestMaster Pro. All Rights Reserved.</p>
    </footer>

    <nav class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-item" onclick="navigate('dashboard.html')"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="bottom-nav-item active" onclick="navigate('exam.html')"><i class="fas fa-file-alt"></i><span>Tests</span></button>
        <button class="bottom-nav-item" onclick="navigate('allresult.html')"><i class="fas fa-chart-bar"></i><span>Results</span></button>
        <button class="bottom-nav-item" onclick="navigate('profile.html')"><i class="fas fa-user"></i><span>Profile</span></button>
    </nav>

    <script>
        // --- Configuration ---
        const JSON_PATHS = {
            mocks: './mocks.json',
            popular: './popular.json',
            upcoming: './upcoming.json'
        };

        // 🚀 EXPANDED FALLBACK DATA – now contains multiple tests per exam/category
        const FALLBACK_MOCKS = [
            { file:'sbi_po.html', exam:'SBI PO', subject:'Quantitative Aptitude', chapter:'Full Syllabus', testName:'SBI PO Mock 1', testCode:'SBI-PO-01', duration:60, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.25, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'Bank' },
            { file:'ibps_clerk.html', exam:'IBPS Clerk', subject:'Reasoning', chapter:'Full Syllabus', testName:'IBPS Clerk Mock 1', testCode:'IBPS-CLK-01', duration:60, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.25, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'Bank' },
            { file:'rbi_grade_b.html', exam:'RBI Grade B', subject:'General Awareness', chapter:'Full Syllabus', testName:'RBI Grade B Mock 1', testCode:'RBI-GB-01', duration:120, totalQuestions:200, marksPerQuestion:1, negativeMarking:0.25, type:'free', difficulty:'Hard', language:'English & Hindi', category:'Bank' },
            { file:'ssc_cgl_tier1.html', exam:'SSC CGL', subject:'General Intelligence', chapter:'Full Syllabus', testName:'SSC CGL Tier-I Mock 1', testCode:'SSC-CGL-T1-01', duration:60, totalQuestions:100, marksPerQuestion:2, negativeMarking:0.5, type:'free', difficulty:'Hard', language:'English & Hindi', category:'SSC' },
            { file:'ssc_cgl_tier2.html', exam:'SSC CGL', subject:'Mathematics', chapter:'Full Syllabus', testName:'SSC CGL Tier-II Math Mock 1', testCode:'SSC-CGL-T2-MATH-01', duration:120, totalQuestions:100, marksPerQuestion:3, negativeMarking:1, type:'free', difficulty:'Hard', language:'English & Hindi', category:'SSC' },
            { file:'ssc_chsl.html', exam:'SSC CHSL', subject:'English Language', chapter:'Full Syllabus', testName:'SSC CHSL Mock 1', testCode:'SSC-CHSL-01', duration:60, totalQuestions:100, marksPerQuestion:2, negativeMarking:0.5, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'SSC' },
            { file:'rrb_ntpc.html', exam:'RRB NTPC', subject:'General Awareness', chapter:'Full Syllabus', testName:'RRB NTPC CBT-1 Mock 1', testCode:'RRB-NTPC-01', duration:90, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.33, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'Railway' },
            { file:'rrb_group_d.html', exam:'RRB Group D', subject:'Mathematics', chapter:'Full Syllabus', testName:'RRB Group D Mock 1', testCode:'RRB-GD-01', duration:90, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.33, type:'free', difficulty:'Easy', language:'English & Hindi', category:'Railway' },
            { file:'cuet_gat.html', exam:'CUET GAT', subject:'General Test', chapter:'Full Syllabus', testName:'CUET General Test Mock 1', testCode:'CUET-GAT-01', duration:60, totalQuestions:50, marksPerQuestion:5, negativeMarking:1, type:'free', difficulty:'Hard', language:'English & Hindi', category:'CUET' },
            { file:'cuet_english.html', exam:'CUET English', subject:'English', chapter:'Full Syllabus', testName:'CUET English Mock 1', testCode:'CUET-ENG-01', duration:45, totalQuestions:40, marksPerQuestion:5, negativeMarking:1, type:'free', difficulty:'Hard', language:'English', category:'CUET' },
            { file:'', exam:'SSC CGL', subject:'General Awareness', chapter:'Full Syllabus', testName:'SSC CGL GA Mock (Coming Soon)', testCode:'SSC-CGL-GA-01', duration:30, totalQuestions:25, marksPerQuestion:2, negativeMarking:0.5, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'SSC' }
        ];

        const FALLBACK_POPULAR = [
            { file:'cuet_pyp.html', exam:'CUET GAT', subject:'General Test', chapter:'Full Syllabus', testName:'CUET General Aptitude Test PYP', testCode:'CUET-GAT-PYP', duration:60, totalQuestions:50, marksPerQuestion:5, negativeMarking:1, type:'free', difficulty:'Hard', language:'English & Hindi', category:'CUET', attempts:'2296 Attempts', badge:'NEW' },
            { file:'ssc_cgl_full.html', exam:'SSC CGL', subject:'General Intelligence', chapter:'Full Syllabus', testName:'SSC CGL Tier-I Full Mock 2026', testCode:'SSC-CGL-FULL', duration:60, totalQuestions:100, marksPerQuestion:2, negativeMarking:0.5, type:'free', difficulty:'Hard', language:'English & Hindi', category:'SSC', attempts:'4512 Attempts', badge:'HOT' },
            { file:'ibps_po.html', exam:'IBPS PO', subject:'Quantitative Aptitude', chapter:'Full Syllabus', testName:'IBPS PO Prelims Mock', testCode:'IBPS-PO-PRE', duration:60, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.25, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'Bank', attempts:'3187 Attempts', badge:'TRENDING' }
        ];

        const FALLBACK_UPCOMING = [
            { file:'ssc_cgl_2026.html', exam:'SSC CGL', subject:'General Intelligence', chapter:'Full Syllabus', testName:'SSC CGL 2026 Reasoning Mock', testCode:'SSC-CGL-2026-01', duration:60, totalQuestions:50, marksPerQuestion:2, negativeMarking:0.5, type:'free', difficulty:'Hard', language:'English & Hindi', category:'SSC 2026', date:'12 June 2026' },
            { file:'', exam:'IBPS PO', subject:'Quantitative Aptitude', chapter:'Full Syllabus', testName:'IBPS PO 2026 Mock', testCode:'IBPS-PO-2026', duration:60, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.25, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'Bank', date:'18 Aug 2026' },
            { file:'rrb_ntpc_2026.html', exam:'RRB NTPC', subject:'General Awareness', chapter:'Full Syllabus', testName:'RRB NTPC 2026 Mock', testCode:'RRB-NTPC-2026', duration:90, totalQuestions:100, marksPerQuestion:1, negativeMarking:0.33, type:'free', difficulty:'Moderate', language:'English & Hindi', category:'Railway', date:'25 July 2026' }
        ];

        const user = JSON.parse(localStorage.getItem('user'));
        let allMocks = [], selectedSubject = '', selectedChapter = '', fixedCategory = '', fixedExam = '';
        let isOffline = false;

        // --- Utility functions ---
        function showToast(msg, type='info', dur=3000) {
            const c = document.getElementById('toastContainer'), o = document.createElement('div');
            o.className = `toast-item ${type}`;
            const icons = { success:'fa-check-circle', error:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
            o.innerHTML = `<i class="fas ${icons[type]}"></i> ${msg}`;
            c.appendChild(o); c.classList.add('show');
            setTimeout(() => { o.style.opacity='0'; o.style.transform='translateY(-8px)'; o.style.transition='0.3s'; setTimeout(() => { o.remove(); if(!c.children.length) c.classList.remove('show'); },300); }, dur);
        }

        function updateOnlineStatus() {
            isOffline = !navigator.onLine;
            document.getElementById('offlineBanner').classList.toggle('show', isOffline);
            if(isOffline) showToast("You're offline. Some features may be limited.", 'warning', 4000);
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        function navigate(url) { window.location.href = url; }
        function openSidebar() { const o = document.getElementById('sidebarOverlay'); o.classList.remove('hidden'); requestAnimationFrame(() => o.classList.add('active')); document.body.classList.add('sidebar-open'); }
        function closeSidebar(e) { if(e.target === document.getElementById('sidebarOverlay')) closeSidebarDirect(); }
        function closeSidebarDirect() { const o = document.getElementById('sidebarOverlay'); o.classList.remove('active'); document.body.classList.remove('sidebar-open'); setTimeout(() => { if(!o.classList.contains('active')) o.classList.add('hidden'); }, 400); }
        function logout() {
            Swal.fire({
                title: 'Logout?', text: 'Are you sure you want to leave?', icon: 'question',
                showCancelButton: true, confirmButtonText: 'Yes, Logout', cancelButtonText: 'Stay',
                confirmButtonColor: '#ef4444', cancelButtonColor: '#5b4cf0'
            }).then(r => { if(r.isConfirmed) { localStorage.removeItem('user'); showToast('Logged out', 'success'); setTimeout(() => window.location.href='index.html',800); } });
        }

        function setAvatar(eid, u) {
            const el = document.getElementById(eid);
            if(!el) return;
            if(u?.avatarUrl) el.innerHTML = `<img src="${u.avatarUrl}">`;
            else if(u?.profilePicUrl) el.innerHTML = `<img src="${u.profilePicUrl}">`;
            else el.textContent = (u?.name) ? u.name.charAt(0).toUpperCase() : 'S';
        }

        async function fetchJSON(path, fallback) {
            try {
                const r = await fetch(path, { cache: 'no-store' });
                if(!r.ok) throw new Error(`HTTP ${r.status}`);
                const d = await r.json();
                return Array.isArray(d) ? d : [];
            } catch(e) {
                console.warn(`Using fallback for ${path}`);
                return fallback || [];
            }
        }

        async function loadAllData() {
            const [mocks, popular, upcoming] = await Promise.all([
                fetchJSON(JSON_PATHS.mocks, FALLBACK_MOCKS),
                fetchJSON(JSON_PATHS.popular, FALLBACK_POPULAR),
                fetchJSON(JSON_PATHS.upcoming, FALLBACK_UPCOMING)
            ]);
            return [...mocks, ...popular, ...upcoming];
        }

        function parseURLParams() {
            const p = new URLSearchParams(window.location.search);
            return {
                testCode: p.get('testCode')?.trim(),
                exam: p.get('exam')?.trim(),
                category: p.get('category')?.trim()
            };
        }

        function renderFilters(baseData) {
            // Exam chips – locked
            const examChipsContainer = document.getElementById('examChips');
            const exams = [...new Set(baseData.map(t => t.exam).filter(Boolean))].sort();
            examChipsContainer.innerHTML = `<button class="vertical-chip ${fixedExam === '' ? 'active' : ''}" style="pointer-events:none; opacity:0.6;">📋 All Exams</button>` +
                exams.map(ex => `<button class="vertical-chip ${fixedExam === ex ? 'active' : ''}" style="pointer-events:none; opacity:0.6;">${ex}</button>`).join('');
            document.getElementById('examBadge').textContent = fixedExam || 'All';
            document.getElementById('examBadge').className = fixedExam ? 'accordion-badge active-badge' : 'accordion-badge';

            let filtered = fixedExam ? baseData.filter(t => t.exam === fixedExam) : baseData;
            // Subject chips
            const subjects = [...new Set(filtered.map(t => t.subject).filter(Boolean))].sort();
            const subjContainer = document.getElementById('subjectChips');
            subjContainer.innerHTML = `<button class="vertical-chip ${selectedSubject === '' ? 'active' : ''}" onclick="selectSubjectFilter('')">📖 All Subjects</button>` +
                subjects.map(s => `<button class="vertical-chip ${selectedSubject === s ? 'active' : ''}" onclick="selectSubjectFilter('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
            document.getElementById('subjectBadge').textContent = selectedSubject || 'All';
            document.getElementById('subjectBadge').className = selectedSubject ? 'accordion-badge active-badge' : 'accordion-badge';

            let subFiltered = filtered;
            if(selectedSubject) subFiltered = subFiltered.filter(t => t.subject === selectedSubject);
            const chapters = [...new Set(subFiltered.map(t => t.chapter).filter(Boolean))].sort();
            const chapterContainer = document.getElementById('chapterChips');
            if(chapters.length) {
                chapterContainer.innerHTML = `<button class="vertical-chip ${selectedChapter === '' ? 'active' : ''}" onclick="selectChapterFilter('')">📑 All Chapters</button>` +
                    chapters.map(ch => `<button class="vertical-chip ${selectedChapter === ch ? 'active' : ''}" onclick="selectChapterFilter('${ch.replace(/'/g,"\\'")}')">${ch}</button>`).join('');
                document.getElementById('chapterAccordionItem').style.display = '';
            } else {
                chapterContainer.innerHTML = '<div style="padding:12px;color:var(--gray-400);font-size:12px;text-align:center;">No chapters available</div>';
                document.getElementById('chapterAccordionItem').style.display = '';
            }
            document.getElementById('chapterBadge').textContent = selectedChapter || 'All';
            document.getElementById('chapterBadge').className = selectedChapter ? 'accordion-badge active-badge' : 'accordion-badge';
        }

        function selectSubjectFilter(subject) {
            selectedSubject = (selectedSubject === subject) ? '' : subject;
            if(selectedSubject && selectedChapter) {
                const valid = allMocks.some(m => m.subject === selectedSubject && m.chapter === selectedChapter);
                if(!valid) selectedChapter = '';
            }
            applyFilters();
        }
        function selectChapterFilter(chapter) { selectedChapter = (selectedChapter === chapter) ? '' : chapter; applyFilters(); }
        function clearAllFilters() {
            selectedSubject = ''; selectedChapter = '';
            document.getElementById('searchInput').value = '';
            applyFilters();
            showToast('Filters reset', 'info');
        }

        function applyFilters() {
            let filtered = allMocks;
            if(fixedCategory) filtered = filtered.filter(t => (t.category||'') === fixedCategory);
            if(fixedExam) filtered = filtered.filter(t => t.exam === fixedExam);
            if(selectedSubject) filtered = filtered.filter(t => t.subject === selectedSubject);
            if(selectedChapter) filtered = filtered.filter(t => t.chapter === selectedChapter);
            const search = document.getElementById('searchInput')?.value.toLowerCase().trim();
            if(search) filtered = filtered.filter(t => (t.testName||'').toLowerCase().includes(search) || (t.testCode||'').toLowerCase().includes(search));

            // Deduplicate by testCode
            const seen = new Set();
            const unique = filtered.filter(t => { const k = t.testCode; if(seen.has(k)) return false; seen.add(k); return true; });
            displayTests(unique);
        }

        function displayTests(tests) {
            const list = document.getElementById('testList');
            if(!tests.length) {
                list.innerHTML = `<div class="empty-selection"><div class="icon-pulse"><i class="fas fa-search"></i></div><h2>No Tests Found</h2><p>Try adjusting filters or search.</p></div>`;
                return;
            }
            list.innerHTML = tests.map((test, idx) => {
                const hasFile = test.file && test.file.trim() !== '';
                const btn = hasFile
                    ? `<button class="attempt-btn" onclick="startTest('${test.file.replace(/'/g,"\\'")}','${(test.testCode||'').replace(/'/g,"\\'")}')"><i class="fas fa-play-circle"></i> Attempt Now</button>`
                    : `<button class="coming-soon-btn" disabled><i class="fas fa-hourglass-half"></i> Coming Soon – Stay Tuned!</button>`;
                return `
                    <div class="test-card" style="animation-delay:${idx*0.04}s">
                        <span class="badge-exam">${test.exam || 'General'}</span>
                        <h4>${test.testName || 'Untitled Test'}</h4>
                        <div class="meta-grid">
                            <div class="meta-item"><i class="fas fa-clock"></i><span>${test.duration||'?'}m</span></div>
                            <div class="meta-item"><i class="fas fa-list-ol"></i><span>${test.totalQuestions||'?'}</span></div>
                            <div class="meta-item"><i class="fas fa-star"></i><span>+${test.marksPerQuestion||'?'}</span></div>
                        </div>
                        <div class="card-tags-row">
                            <span class="tag-chip"><i class="fas fa-bookmark"></i> ${test.subject||'General'}</span>
                            ${test.chapter ? `<span class="tag-chip"><i class="fas fa-layer-group"></i> ${test.chapter}</span>` : ''}
                            ${test.language ? `<span class="tag-chip"><i class="fas fa-globe"></i> ${test.language}</span>` : ''}
                        </div>
                        <div class="action-buttons">${btn}</div>
                    </div>
                `;
            }).join('');
        }

        function startTest(file, code) {
            if(!file) return showToast('Test file not available yet.', 'warning');
            localStorage.setItem('last_mock_file', file);
            window.location.href = `test.html?file=${encodeURIComponent(file)}&testCode=${encodeURIComponent(code)}`;
        }

        function toggleAccordion(bodyId, arrowId, itemId) {
            if(itemId === 'examAccordionItem') return; // locked
            const item = document.getElementById(itemId);
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.filter-accordion-item.open').forEach(el => el.classList.remove('open'));
            if(!isOpen) {
                item.classList.add('open');
                setTimeout(() => item.scrollIntoView({ behavior:'smooth', block:'nearest' }), 150);
            }
        }
        document.addEventListener('click', function(e) {
            if(!e.target.closest('.filter-accordion-item') && !e.target.closest('.filter-accordion-header')) {
                document.querySelectorAll('.filter-accordion-item.open').forEach(el => el.classList.remove('open'));
            }
        });

        // --- Init ---
        async function init() {
            updateOnlineStatus();
            if(user) {
                setAvatar('userInitial', user);
                setAvatar('sidebarAvatar', user);
                document.getElementById('sidebarUserName').textContent = user.name || 'Student';
                document.getElementById('sidebarUserTag').textContent = user.preparingFor || 'Learner';
            } else {
                document.getElementById('userInitial').textContent = 'G';
                document.getElementById('sidebarAvatar').textContent = 'G';
                document.getElementById('sidebarUserName').textContent = 'Guest';
                document.getElementById('sidebarUserTag').textContent = 'Visitor';
            }

            const params = parseURLParams();
            allMocks = await loadAllData();

            if(params.testCode) {
                const test = allMocks.find(t => t.testCode === params.testCode);
                if(test) {
                    document.getElementById('filterAccordion').style.display = 'none';
                    displayTests([test]);
                    document.getElementById('navCategoryBadge').textContent = test.exam || 'Test';
                } else {
                    document.getElementById('testList').innerHTML = '<div class="empty-selection"><h2>Test not found</h2></div>';
                }
                return;
            }

            fixedCategory = params.category || '';
            fixedExam = params.exam || '';
            const badge = document.getElementById('navCategoryBadge');
            badge.textContent = fixedExam || fixedCategory || 'Category';
            badge.classList.remove('empty');

            renderFilters(allMocks);
            document.getElementById('examAccordionItem').classList.add('open');
            applyFilters();
        }

        document.addEventListener('keydown', e => {
            if(e.key === 'Escape' && document.getElementById('sidebarOverlay').classList.contains('active')) closeSidebarDirect();
        });
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
