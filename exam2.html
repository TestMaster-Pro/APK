<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F7FB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mock Tests · TestMasterPro.space</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-dark: #152a45;
            --primary-light: #E8EDF2;
            --secondary: #1f3140;
            --blue: #0066ff;
            --blue-light: #e6f0ff;
            --green: #10B981;
            --green-light: #D1FAE5;
            --red: #ff4d5a;
            --red-light: #fff0f1;
            --light: #F4F7FB;
            --white: #FFFFFF;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --accent: #FBBF24;
            --accent-hover: #F59E0B;
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-light: rgba(255, 255, 255, 0.85);
            --border-light: rgba(255, 255, 255, 0.06);
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-md: 18px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --radius-full: 50%;
            --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 48px rgba(0, 0, 0, 0.16);
            --font: 'Poppins', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --bottom-nav-height: 68px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --max-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
            height: 100%;
        }
        body {
            font-family: var(--font);
            background: var(--light);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--gray-800);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            max-width: 100vw;
            padding-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 12px);
        }
        body.sidebar-open,
        body.sheet-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .toast-container {
            position: fixed;
            top: calc(12px + var(--safe-top));
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 92%;
            max-width: 400px;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast-container.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast-item {
            background: var(--gray-800);
            color: #fff;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: all;
            border-left: 3px solid var(--blue);
        }
        .toast-item.success {
            border-left-color: var(--green);
        }
        .toast-item.error {
            border-left-color: var(--red);
        }
        .toast-item.warning {
            border-left-color: #f59e0b;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-16px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .offline-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--red);
            color: #fff;
            text-align: center;
            padding: 6px;
            font-size: 11px;
            font-weight: 700;
            z-index: 999;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }
        .offline-banner.show {
            transform: translateY(0);
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 250;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            height: 100dvh;
            width: 290px;
            max-width: 82vw;
            background: #fff;
            z-index: 251;
            transform: translateX(-110%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 40px rgba(0, 0, 0, 0.18);
            border-radius: 0 22px 22px 0;
            overflow: hidden;
            border-right: 1px solid rgba(0, 0, 0, 0.04);
        }
        .sidebar-overlay.active .sidebar {
            transform: translateX(0);
        }
        .sidebar-brand {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 20px 16px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
        }
        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar-brand-text {
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: -0.3px;
        }
        .sidebar-brand-text small {
            display: block;
            font-weight: 400;
            font-size: 9px;
            opacity: 0.8;
        }
        .sidebar-close-btn {
            position: absolute;
            top: 14px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
        }
        .sidebar-close-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(90deg) scale(1.1);
        }
        .sidebar-user-card {
            padding: 14px 16px;
            background: #fafbfc;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .sidebar-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sidebar-user-info .name {
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-800);
        }
        .sidebar-user-info .tag {
            font-size: 10px;
            color: var(--primary);
            font-weight: 600;
            background: var(--primary-light);
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 2px;
        }
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            -webkit-overflow-scrolling: touch;
        }
        .sidebar-nav-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--gray-400);
            font-weight: 700;
            padding: 14px 8px 6px;
            font-family: var(--font);
        }
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            color: var(--gray-600);
            transition: var(--transition-fast);
            text-decoration: none;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: var(--font);
        }
        .sidebar-nav-item:hover {
            background: var(--gray-100);
            color: var(--gray-800);
            transform: translateX(3px);
        }
        .sidebar-nav-item:active {
            transform: scale(0.97);
        }
        .sidebar-nav-item.active-nav {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
        }
        .sidebar-nav-item i {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            background: var(--gray-100);
            color: var(--gray-500);
        }
        .sidebar-nav-item.active-nav i {
            background: var(--primary);
            color: #fff;
        }
        .sidebar-nav-item.logout-item:hover {
            background: var(--red-light);
            color: var(--red);
        }
        .sidebar-version {
            text-align: center;
            font-size: 10px;
            color: var(--gray-300);
            padding: 10px;
            flex-shrink: 0;
        }

        .navbar {
            background: var(--white);
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 16px rgba(0, 0, 0, 0.04);
            gap: 8px;
            flex-wrap: nowrap;
            min-height: 54px;
            border-bottom: 1px solid var(--gray-200);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .hamburger-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gray-100);
            border: none;
            cursor: pointer;
            font-size: 15px;
            color: var(--gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            flex-shrink: 0;
        }
        .hamburger-btn:hover {
            background: var(--gray-200);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
            color: var(--primary);
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .nav-brand i {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--primary);
            background: rgba(30, 58, 95, 0.08);
            border: 1px solid rgba(30, 58, 95, 0.1);
            box-shadow: 0 2px 8px rgba(30, 58, 95, 0.06);
            transition: var(--transition-fast);
        }
        .nav-brand i:hover {
            background: rgba(30, 58, 95, 0.15);
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            transition: var(--transition-fast);
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-avatar:hover {
            transform: scale(1.08);
        }
        .btn-premium-nav {
            background: var(--accent);
            color: #1e293b;
            border: none;
            padding: 7px 14px;
            border-radius: 22px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font);
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(251, 191, 36, 0.2);
        }
        .btn-premium-nav:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(251, 191, 36, 0.3);
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 14px 14px calc(20px + var(--bottom-nav-height));
            position: relative;
            z-index: 5;
            width: 100%;
            flex: 1;
        }

        .filter-accordion {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
            animation: fadeSlideIn 0.5s ease-out;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .filter-accordion-item {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-xs);
        }
        .filter-accordion-item.open {
            border-color: #c4d0dc;
            box-shadow: var(--shadow-sm);
        }
        .filter-accordion-header {
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-700);
            transition: var(--transition-fast);
            text-align: left;
            user-select: none;
        }
        .filter-accordion-header:active {
            background: var(--gray-100);
        }
        .filter-accordion-header .fa-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .filter-accordion-header .fa-count {
            font-size: 11px;
            color: var(--gray-400);
            font-weight: 500;
            background: var(--gray-100);
            padding: 3px 10px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .filter-accordion-header .fa-arrow {
            font-size: 12px;
            color: var(--gray-400);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .filter-accordion-item.open .fa-arrow {
            transform: rotate(180deg);
            color: var(--primary);
        }
        .filter-accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-accordion-item.open .filter-accordion-body {
            max-height: 800px;
        }
        .vertical-chip-list {
            padding: 4px 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .vertical-chip {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            background: var(--gray-100);
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            color: var(--gray-600);
            transition: var(--transition-fast);
            text-align: left;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .vertical-chip:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: rgba(30, 58, 95, 0.1);
            transform: translateX(3px);
        }
        .vertical-chip:active {
            transform: scale(0.98);
        }
        .vertical-chip.active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 700;
        }
        .vertical-chip .vc-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-300);
            flex-shrink: 0;
        }
        .vertical-chip.active .vc-dot {
            background: var(--primary);
            box-shadow: 0 0 0 4px rgba(30, 58, 95, 0.12);
        }

        .search-row-vertical {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            padding: 0 14px 10px;
        }
        .search-chip-vertical {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius);
            background: var(--white);
            border: 2px solid var(--gray-200);
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }
        .search-chip-vertical input {
            border: none;
            outline: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-700);
            width: 100%;
            background: transparent;
        }
        .search-chip-vertical input::placeholder {
            color: var(--gray-400);
        }
        .search-chip-vertical:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(30, 58, 95, 0.08);
        }
        .clear-chip-vertical {
            padding: 12px 18px;
            border-radius: var(--radius);
            background: var(--red-light);
            border: 2px solid #fecaca;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            color: var(--red);
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
        }
        .clear-chip-vertical:hover {
            background: #fee2e2;
            transform: translateY(-1px);
        }

        .test-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .test-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-xs);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            animation: cardSlideIn 0.45s ease-out;
            animation-fill-mode: both;
        }
        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .test-card:hover {
            border-color: rgba(30, 58, 95, 0.2);
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
        }
        .test-card:active {
            transform: scale(0.985) translateY(-1px);
        }

        .card-header-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }
        .card-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid var(--gray-200);
            background: var(--gray-100);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: var(--transition-fast);
        }
        .test-card:hover .card-logo {
            border-color: rgba(30, 58, 95, 0.25);
            box-shadow: 0 4px 14px rgba(30, 58, 95, 0.12);
            transform: scale(1.05);
        }
        .card-logo-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 20px;
            border: 2px solid var(--gray-200);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: var(--transition-fast);
        }
        .test-card:hover .card-logo-placeholder {
            border-color: rgba(30, 58, 95, 0.25);
            box-shadow: 0 4px 14px rgba(30, 58, 95, 0.12);
            transform: scale(1.05);
        }
        .card-header-info {
            flex: 1;
            min-width: 0;
        }
        .card-header-info .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            margin-bottom: 4px;
        }
        .badge-exam {
            background: var(--gray-200);
            color: var(--gray-700);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            display: inline-block;
        }
        .badge-free {
            background: var(--green-light);
            color: #065f46;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
        }
        .badge-premium {
            background: #FDE68A;

        function setAvatar(eid, u) {
            const el = document.getElementById(eid); if (!el) return;
            if (u?.avatarUrl) el.innerHTML = `<img src="${u.avatarUrl}" alt="Avatar">`;
            else if (u?.profilePicUrl) el.innerHTML = `<img src="${u.profilePicUrl}" alt="Avatar">`;
            else el.textContent = (u?.name) ? u.name.charAt(0).toUpperCase() : 'S';
        }

        async function fetchJSON(p, fb) {
            try { const r = await fetch(p, { cache: 'no-store' }); if (!r.ok) throw new Error(`HTTP ${r.status}`); const d = await r.json(); if (!Array.isArray(d) || !d.length) throw new Error('Empty data'); return d; }
            catch (e) { console.warn(`Could not load ${p}, using fallback.`, e.message); return fb || [] }
        }

        // Load merged data from Google Sheets + local JSONs
        async function loadAllData() {
            let sheetTests = [];
            let localTests = [];

            // Fetch from Google Sheet
            try {
                const sheetResp = await fetch(`${TEST_API_URL}?action=getAllMockTests`, { cache: 'no-store' });
                if (sheetResp.ok) {
                    const sheetData = await sheetResp.json();
                    if (sheetData.success && Array.isArray(sheetData.tests)) {
                        sheetTests = sheetData.tests.map(t => ({ ...t, fromSheet: true }));
                    }
                }
            } catch (e) { console.warn('Sheet fetch failed', e); }

            // Fetch from local JSONs (mocks, popular, upcoming)
            const [localMocks, popular, upcoming] = await Promise.all([
                fetchJSON(JSON_PATHS.mocks, FALLBACK_MOCKS),
                fetchJSON(JSON_PATHS.popular, []),
                fetchJSON(JSON_PATHS.upcoming, [])
            ]);
            localTests = [...localMocks, ...popular, ...upcoming].map(t => ({ ...t, fromSheet: false }));

            // Merge: sheet tests take priority
            if (sheetTests.length === 0 && localTests.length === 0) {
                allMocks = FALLBACK_MOCKS.map(t => ({ ...t, fromSheet: false }));
                showToast('Using offline data.', 'warning');
            } else {
                const merged = [...sheetTests];
                const existingCodes = new Set(sheetTests.map(t => t.testCode));
                localTests.forEach(t => { if (!existingCodes.has(t.testCode)) merged.push(t); });
                allMocks = merged;
            }
        }

        async function loadPremium() {
            try {
                if (user?.premiumPlans) userPremiumPlans = user.premiumPlans;
                const r = await fetch(`${API_URL}?action=getUserPremiumStatus&username=${encodeURIComponent(user?.username||'')}`);
                const d = await r.json();
                if (d?.success && Array.isArray(d.premiumPlans)) {
                    userPremiumPlans = d.premiumPlans;
                    user.premiumPlans = d.premiumPlans;
                    localStorage.setItem('user', JSON.stringify(user));
                }
            } catch (e) {}
        }

        function hasAccess(test) {
            if (!test || test.type === 'free') return true;
            if (!Array.isArray(userPremiumPlans) || !userPremiumPlans.length) return false;
            if (test.requiredPlan) return userPremiumPlans.some(p => p?.planType === test.requiredPlan);
            return true;
        }

        function parseURLParams() {
            const p = new URLSearchParams(window.location.search);
            return { testCode: p.get('testCode')?.trim(), exam: p.get('exam')?.trim(), category: p.get('category')?.trim() };
        }

        function renderFilters(baseData) {
            let filtered = baseData;
            if (fixedCategory) filtered = filtered.filter(t => (t.category || '') === fixedCategory);
            if (fixedExam) filtered = filtered.filter(t => t.exam === fixedExam);

            const subjects = [...new Set(filtered.map(t => t.subject).filter(Boolean))].sort();
            document.getElementById('subjectChips').innerHTML =
                `<button class="vertical-chip ${selectedSubject===''?'active':''}" onclick="selectSubjectFilter('')">📖 All Subjects</button>` +
                subjects.map(s => `<button class="vertical-chip ${selectedSubject===s?'active':''}" onclick="selectSubjectFilter('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
            document.getElementById('subjectBadge').textContent = selectedSubject || 'All';

            let subFiltered = filtered;
            if (selectedSubject) subFiltered = subFiltered.filter(t => t.subject === selectedSubject);
            const chapters = [...new Set(subFiltered.map(t => t.chapter).filter(Boolean))].sort();
            const chapterContainer = document.getElementById('chapterChips');
            if (chapters.length) {
                chapterContainer.innerHTML =
                    `<button class="vertical-chip ${selectedChapter===''?'active':''}" onclick="selectChapterFilter('')">📑 All Chapters</button>` +
                    chapters.map(ch => `<button class="vertical-chip ${selectedChapter===ch?'active':''}" onclick="selectChapterFilter('${ch.replace(/'/g,"\\'")}')">${ch}</button>`).join('');
                document.getElementById('chapterAccordionItem').style.display = '';
            } else {
                chapterContainer.innerHTML = '<div style="padding:12px;color:var(--gray-400);font-size:12px;text-align:center;">No chapters available</div>';
                document.getElementById('chapterAccordionItem').style.display = '';
            }
            document.getElementById('chapterBadge').textContent = selectedChapter || 'All';
        }

        function selectSubjectFilter(subject) {
            selectedSubject = (selectedSubject === subject) ? '' : subject;
            if (selectedSubject && selectedChapter) {
                if (!allMocks.some(m => m.subject === selectedSubject && m.chapter === selectedChapter)) selectedChapter = '';
            }
            renderFilters(allMocks);
            applyFilters();
            if (selectedSubject) document.getElementById('chapterAccordionItem').classList.add('open');
        }
        function selectChapterFilter(chapter) { selectedChapter = (selectedChapter === chapter) ? '' : chapter; renderFilters(allMocks); applyFilters(); }
        function clearAllFilters() {
            selectedSubject = ''; selectedChapter = '';
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.filter-accordion-item.open').forEach(el => el.classList.remove('open'));
            renderFilters(allMocks);
            applyFilters();
            showToast('Filters reset', 'info');
        }

        function applyFilters() {
            let filtered = allMocks;
            if (fixedCategory) filtered = filtered.filter(t => (t.category || '') === fixedCategory);
            if (fixedExam) filtered = filtered.filter(t => t.exam === fixedExam);
            if (selectedSubject) filtered = filtered.filter(t => t.subject === selectedSubject);
            if (selectedChapter) filtered = filtered.filter(t => t.chapter === selectedChapter);
            const search = document.getElementById('searchInput')?.value.toLowerCase().trim();
            if (search) filtered = filtered.filter(t => (t.testName || '').toLowerCase().includes(search) || (t.testCode || '').toLowerCase().includes(search));
            const seen = new Set();
            const unique = filtered.filter(t => { const k = t.testCode; if (seen.has(k)) return false; seen.add(k); return true; });
            displayTests(unique);
        }

        function displayTests(tests) {
            const list = document.getElementById('testList');
            if (!tests.length) {
                list.innerHTML = '<div class="empty-selection"><div class="icon-pulse"><i class="fas fa-search"></i></div><h2>No Tests Found</h2><p>Try adjusting filters or search.</p></div>';
                return;
            }
            list.innerHTML = tests.map((test, idx) => {
                const hasFile = test.file && test.file.trim() !== '';
                const accessible = hasAccess(test);
                const isFree = test.type === 'free';
                const badgeHTML = isFree ? '<span class="badge-free"><i class="fas fa-unlock"></i> Free</span>' : '<span class="badge-premium"><i class="fas fa-crown"></i> Premium</span>';
                const attemptBtn = (hasFile || test.fromSheet) ?
                    (accessible ?
                        `<button class="attempt-btn" onclick="startTest('${(test.file||'').replace(/'/g,"\\'")}','${(test.testCode||'').replace(/'/g,"\\'")}','${test.fromSheet?'true':'false'}')"><i class="fas fa-play-circle"></i> Attempt Now</button>` :
                        `<button class="attempt-btn locked" onclick="handleLockedTest('${test.requiredPlan||'premium'}')"><i class="fas fa-lock"></i> Unlock</button>`
                    ) : `<button class="attempt-btn locked" disabled><i class="fas fa-hourglass-half"></i> Coming Soon</button>`;

                const imageHTML = test.imageurl ?
                    `<img src="${test.imageurl}" alt="${test.exam||'Exam'}" class="card-logo" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` +
                    `<div class="card-logo-placeholder" style="display:none;"><i class="fas fa-file-alt"></i></div>` :
                    `<div class="card-logo-placeholder"><i class="fas fa-file-alt"></i></div>`;

                return `
                <div class="test-card" style="animation-delay:${idx*0.04}s">
                    <div class="card-header-row">
                        ${imageHTML}
                        <div class="card-header-info">
                            <div class="badge-row">
                                <span class="badge-exam">${test.exam||'General'}</span>
                                ${badgeHTML}
                            </div>
                        </div>
                    </div>
                    <h4>${test.testName||'Untitled Test'}</h4>
                    <div class="meta-grid">
                        <div class="meta-item"><i class="fas fa-clock"></i><span>${test.duration||'?'}m</span></div>
                        <div class="meta-item"><i class="fas fa-list-ol"></i><span>${test.totalQuestions||'?'} Qs</span></div>
                        <div class="meta-item"><i class="fas fa-star"></i><span>+${test.marksPerQuestion||'?'} Marks</span></div>
                    </div>
                    <div class="card-tags-row">
                        <span class="tag-chip"><i class="fas fa-bookmark"></i> ${test.subject||'General'}</span>
                        ${test.chapter?`<span class="tag-chip"><i class="fas fa-layer-group"></i> ${test.chapter}</span>`:''}
                        ${test.language?`<span class="tag-chip"><i class="fas fa-globe"></i> ${test.language}</span>`:''}
                    </div>
                    <div class="action-buttons">
                        ${attemptBtn}
                        <button class="leaderboard-btn" onclick="viewLeaderboard('${(test.testCode||'').replace(/'/g,"\\'")}','${(test.exam||'').replace(/'/g,"\\'")}')"><i class="fas fa-trophy"></i> Rank</button>
                    </div>
                </div>`;
            }).join('');
        }

        function handleLockedTest(plan) {
            Swal.fire({
                title: '🔒 Premium Content',
                html: `<p>This test requires <b>${plan.replace(/_/g,' ')}</b> plan.</p>`,
                icon: 'info',
                confirmButtonText: 'View Plans',
                confirmButtonColor: '#FBBF24',
                showCancelButton: true,
                cancelButtonText: 'Maybe Later',
                cancelButtonColor: '#1E3A5F'
            }).then(r => { if (r.isConfirmed) window.location.href = 'payment.html'; });
        }

        function viewLeaderboard(code, exam) {
            localStorage.setItem('current_exam', exam || '');
            window.location.href = `leaderboard.html?testCode=${encodeURIComponent(code)}&exam=${encodeURIComponent(exam||'')}`;
        }

        function startTest(file, code, fromSheet) {
            if (!file && fromSheet !== 'true') return showToast('Test file not available yet.', 'warning');
            if (fromSheet === 'true') {
                window.location.href = `test2.html?testCode=${encodeURIComponent(code)}`;
            } else {
                localStorage.setItem('last_mock_file', file);
                window.location.href = `test.html?file=${encodeURIComponent(file)}&testCode=${encodeURIComponent(code)}`;
            }
        }

        function toggleAccordion(bodyId, arrowId, itemId) {
            const item = document.getElementById(itemId);
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.filter-accordion-item.open').forEach(el => el.classList.remove('open'));
            if (!isOpen) { item.classList.add('open'); setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150); }
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.filter-accordion-item') && !e.target.closest('.filter-accordion-header'))
                document.querySelectorAll('.filter-accordion-item.open').forEach(el => el.classList.remove('open'));
        });

        async function renderFooterExamCategories() {
            const c = document.getElementById('footerExamCategories');
            const data = await fetchJSON(JSON_PATHS.mocks, FALLBACK_MOCKS);
            const cats = new Map();
            data.forEach(item => { const cat = item.category || 'Other'; if (!cats.has(cat)) cats.set(cat, new Set()); cats.get(cat).add(item.exam); });
            let html = '';
            cats.forEach((exams, cat) => html += `<li><a onclick="navigate('exam2.html?category=${encodeURIComponent(cat)}&exam=${encodeURIComponent([...exams][0]||'')}')">${cat}</a></li>`);
            html += `<li><a onclick="navigate('referral.html')">Refer & Earn</a></li><li><a onclick="navigate('usecoin.html')">Coin Exchange</a></li>`;
            c.innerHTML = html;
        }

        async function renderFooterUpcoming() {
            const c = document.getElementById('footerUpcomingExams');
            const d = await fetchJSON(JSON_PATHS.upcomingfooter, []);
            if (!d.length) { c.innerHTML = '<li><a>No upcoming exams</a></li>'; return; }
            c.innerHTML = d.map(e => `<li><a onclick="showToast('${e.name} – Expected Date: ${e.date}','info',4000)">${e.name}</a></li>`).join('');
        }

        async function init() {
            updateOnlineStatus();
            if (user) { setAvatar('userInitial', user); setAvatar('sidebarAvatar', user); document.getElementById('sidebarUserName').textContent = user.name || 'Student'; document.getElementById('sidebarUserTag').textContent = user.preparingFor || 'Learner'; }
            else { document.getElementById('userInitial').textContent = 'G'; document.getElementById('sidebarAvatar').textContent = 'G'; document.getElementById('sidebarUserName').textContent = 'Guest'; document.getElementById('sidebarUserTag').textContent = 'Visitor'; }

            const params = parseURLParams();
            await loadAllData();
            await loadPremium();

            if (params.testCode) {
                const test = allMocks.find(t => t.testCode === params.testCode);
                if (test) {
                    document.getElementById('filterAccordion').style.display = 'none';
                    displayTests([test]);
                } else {
                    document.getElementById('testList').innerHTML = '<div class="empty-selection"><h2>Test not found</h2></div>';
                }
                return;
            }

            fixedCategory = params.category || '';
            fixedExam = params.exam || '';
            renderFilters(allMocks);
            document.getElementById('subjectAccordionItem').classList.add('open');
            applyFilters();
            renderFooterExamCategories();
            renderFooterUpcoming();
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('sidebarOverlay').classList.contains('active')) closeSidebarDirect(); });
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
