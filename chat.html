<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Community Chat - MockTest Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --dark: #1e293b;
            --light: #f8fafc;
            --success: #10b981;
            --admin: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f1f5f9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
            z-index: 10;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.3); }

        .chat-header-info h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .chat-header-info p {
            font-size: 11px;
            opacity: 0.8;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f8fafc;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.admin-msg {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        .own .msg-avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .admin-msg .msg-avatar {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
        }

        .msg-content {
            background: white;
            padding: 10px 14px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .own .msg-content {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .admin-msg .msg-content {
            background: #fef3c7;
            border: 1px solid #fde68a;
        }

        .msg-name {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .own .msg-name { color: #e0e7ff; }
        .admin-msg .msg-name { color: #92400e; }

        .msg-text {
            font-size: 13px;
            line-height: 1.4;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .chat-input-area {
            padding: 14px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #6366f1;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        .admin-badge {
            background: #f59e0b;
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 700;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-header-info">
            <h3>💬 Community Chat</h3>
            <p><span class="online-dot"></span> Live discussion</p>
        </div>
        <button style="margin-left:auto;background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;" onclick="refreshChat()">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div style="text-align:center;color:#94a3b8;padding:20px;">
            <i class="fas fa-comments" style="font-size:30px;display:block;margin-bottom:8px;"></i>
            Loading messages...
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbya3ER-Cb71xpak-gm1-wLREfPajBxaPBG8TPKLlLgXcwn_P89vBIN_hptN4LFFqe8X4Q/exec';
        const user = JSON.parse(localStorage.getItem('user'));

        if (!user) {
            window.location.href = 'index.html';
        }

        let chatRefreshInterval;

        async function loadChats() {
            try {
                const response = await fetch(`${API_URL}?action=getChats&limit=100`);
                const data = await response.json();
                
                if (data.success && data.chats) {
                    renderChats(data.chats);
                }
            } catch (e) {
                console.error('Chat load error:', e);
            }
        }

        function renderChats(chats) {
            const container = document.getElementById('chatMessages');
            
            if (chats.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;color:#94a3b8;padding:30px;">
                        <i class="fas fa-comment-dots" style="font-size:40px;display:block;margin-bottom:10px;"></i>
                        <p>No messages yet. Start the conversation!</p>
                    </div>`;
                return;
            }

            container.innerHTML = chats.map(chat => {
                const isOwn = chat.username === user.username;
                const isAdmin = chat.isAdmin === 'true';
                const time = new Date(chat.timestamp).toLocaleTimeString('en-IN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                });

                let msgClass = '';
                if (isAdmin) msgClass = 'admin-msg';
                else if (isOwn) msgClass = 'own';

                return `
                <div class="message ${msgClass}">
                    <div class="msg-avatar">
                        ${chat.name ? chat.name.charAt(0).toUpperCase() : '?'}
                    </div>
                    <div class="msg-content">
                        <div class="msg-name">
                            ${chat.name || 'User'}
                            ${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}
                            ${isOwn ? '<span style="font-size:10px;">(You)</span>' : ''}
                        </div>
                        <div class="msg-text">${escapeHtml(chat.message)}</div>
                        <div class="msg-time">${time}</div>
                    </div>
                </div>`;
            }).join('');

            // Auto scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            try {
                const params = new URLSearchParams({
                    action: 'sendChat',
                    username: user.username,
                    name: user.name,
                    message: message,
                    isAdmin: 'false'
                });
                
                await fetch(API_URL + '?' + params.toString());
                input.value = '';
                loadChats();
            } catch (e) {
                console.error('Send error:', e);
            }
        }

        function refreshChat() {
            loadChats();
        }

        // Auto refresh every 3 seconds
        chatRefreshInterval = setInterval(loadChats, 3000);
        
        // Initial load
        loadChats();

        // Cleanup on page leave
        window.addEventListener('beforeunload', () => {
            clearInterval(chatRefreshInterval);
        });
    </script>
</body>
</html>
