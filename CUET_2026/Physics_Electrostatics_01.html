<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUET Physics • Electrostatics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-glow: #8b5cf6;
            --accent: #ec4899;
            --accent-glow: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #94a3b8;
            --light: #f1f5f9;
            --bg: #0f172a;
            --bg2: #1e1b4b;
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --option-bg: rgba(255, 255, 255, 0.04);
            --hover-bg: rgba(139, 92, 246, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --glow-sm: 0 0 12px rgba(139, 92, 246, 0.25);
            --glow-md: 0 0 20px rgba(139, 92, 246, 0.35);
            --glow-lg: 0 0 30px rgba(236, 72, 153, 0.3);
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg2: #ede9fe;
            --card: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --hover-bg: #f3f0ff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --glow-sm: 0 0 12px rgba(139, 92, 246, 0.15);
            --glow-md: 0 0 20px rgba(139, 92, 246, 0.2);
            --glow-lg: 0 0 30px rgba(236, 72, 153, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #2e1065 40%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.6s ease-in-out;
            transition: background 0.5s ease, color 0.3s;
            z-index: 0;
            position: relative;
            overflow-x: hidden;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc 0%, #ede9fe 40%, #fdf2f8 100%);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mock-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Floating gradient blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 20s ease-in-out infinite;
            opacity: 0.5;
        }
        .blob-1 {
            width: 350px;
            height: 350px;
            background: rgba(139, 92, 246, 0.2);
            top: -100px;
            right: -80px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 280px;
            height: 280px;
            background: rgba(236, 72, 153, 0.18);
            bottom: -80px;
            left: -60px;
            animation-delay: -7s;
        }
        .blob-3 {
            width: 220px;
            height: 220px;
            background: rgba(168, 85, 247, 0.16);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }
        @keyframes blobFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(40px, -50px) scale(1.1);
            }
            50% {
                transform: translate(-30px, -20px) scale(0.9);
            }
            75% {
                transform: translate(20px, 40px) scale(1.05);
            }
        }

        /* BUBBLES BACKGROUND */
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.06));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.12);
            animation: floatUp linear infinite;
        }
        body.light-mode .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.04));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.08);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0.5;
            }
            25% {
                transform: translateY(-250px) translateX(30px) scale(0.8);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-500px) translateX(-20px) scale(1);
                opacity: 0.6;
            }
            75% {
                transform: translateY(-750px) translateX(15px) scale(0.9);
                opacity: 0.35;
            }
            100% {
                transform: translateY(-1000px) translateX(-10px) scale(0.3);
                opacity: 0;
            }
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        .top-bar:hover {
            box-shadow: var(--glow-sm);
        }
        .test-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }
        .test-title .icon-dna {
            font-size: 20px;
            animation: pulseIcon 2s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.75;
            }
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lang-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: 2px solid #f97316;
            background: var(--card);
            color: #f97316;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .lang-btn:hover {
            box-shadow: 0 0 14px rgba(249, 115, 22, 0.35);
            transform: translateY(-1px);
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 16px rgba(249, 115, 22, 0.4);
        }
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1.5px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-sm);
            transform: translateY(-1px);
        }
        .theme-toggle:active {
            transform: scale(0.92);
        }
        .timer-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .timer-pill.warning {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            animation: pulse 0.8s infinite;
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.3);
        }
        body.light-mode .timer-pill.warning {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }

        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        .info-chip i {
            font-size: 11px;
        }
        .info-chip.exam {
            color: #a78bfa;
        }
        .info-chip.subject {
            color: #ec4899;
        }
        .info-chip.marks {
            color: #fbbf24;
        }
        body.light-mode .info-chip.exam {
            color: #7c3aed;
        }
        body.light-mode .info-chip.subject {
            color: #be185d;
        }
        body.light-mode .info-chip.marks {
            color: #d97706;
        }

        .progress-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .progress-card:hover {
            box-shadow: var(--glow-sm);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            animation: slideIn 0.35s ease;
            transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
        }
        .question-card:hover {
            box-shadow: var(--glow-md);
            transform: translateY(-2px);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .question-card.swiping {
            transition: none;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .q-badge {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.35);
        }
        .q-marks {
            font-weight: 600;
            font-size: 12px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }
        body.light-mode .q-marks {
            color: #d97706;
            background: #fffbeb;
            border-color: #fde68a;
        }

        .question-text {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.7;
            color: var(--text);
            background: var(--option-bg);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #8b5cf6;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }
        .question-text .hindi-block {
            color: #fbbf24;
            font-size: 14px;
            line-height: 1.8;
        }
        body.light-mode .question-text .hindi-block {
            color: #d97706;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--option-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            backdrop-filter: blur(4px);
        }
        .option-card:hover {
            border-color: #a78bfa;
            background: var(--hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.2);
        }
        .option-card.selected {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 0 6px 22px rgba(139, 92, 246, 0.4);
        }
        .option-card.correct {
            background: #10b981 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4) !important;
        }
        .option-card.wrong {
            background: #ef4444 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4) !important;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-4px);
            }
            75% {
                transform: translateX(4px);
            }
        }
        .option-letter {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-weight: 800;
            font-size: 13px;
            color: #a78bfa;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        .option-card.selected .option-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .option-card.correct .option-letter,
        .option-card.wrong .option-letter {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            color: var(--text);
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .btn:hover {
            box-shadow: var(--glow-sm);
            transform: translateY(-2px);
            border-color: #a78bfa;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-mark {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }
        .btn-mark:hover {
            box-shadow: 0 0 14px rgba(245, 158, 11, 0.3);
        }
        .btn-clear {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.25);
            color: #4ade80;
        }
        .btn-clear:hover {
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.3);
        }
        body.light-mode .btn-mark {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        body.light-mode .btn-clear {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }

        .palette-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            margin-top: 12px;
            transition: all 0.3s ease;
        }
        .palette-card:hover {
            box-shadow: var(--glow-sm);
        }
        .palette-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 7px;
            margin-bottom: 12px;
        }
        .palette-num {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--option-bg);
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            color: var(--text);
        }
        .palette-num:hover {
            background: var(--hover-bg);
            transform: scale(1.1);
            box-shadow: var(--glow-sm);
        }
        .palette-num.answered {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .palette-num.marked {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .palette-num.current {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.2);
            transform: scale(1.08);
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.4);
        }
        .palette-num.wrong-num {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 10px;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
        }

        .review-panel {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }
        .review-panel.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .result-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .result-item {
            background: var(--option-bg);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .result-item:hover {
            box-shadow: var(--glow-sm);
        }
        .result-item .value {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-item .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .explanation-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            display: none;
            transition: all 0.3s ease;
        }
        body.light-mode .explanation-box {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        .explanation-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .explanation-box .exp-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
            color: #fbbf24;
        }
        body.light-mode .explanation-box .exp-title {
            color: #92400e;
        }

        .swipe-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .review-mode-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .review-mode-card:hover {
            box-shadow: var(--glow-sm);
            transform: translateY(-1px);
        }
        .review-mode-card.correct-answer {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .review-mode-card.wrong-answer {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .review-mode-card.unanswered-q {
            background: var(--glass-bg);
            border-color: var(--glass-border);
        }
        .review-mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .review-mode-status {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 15px;
        }
        .status-correct {
            background: rgba(16, 185, 129, 0.2);
            color: #4ade80;
        }
        .status-wrong {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .status-unanswered {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        body.light-mode .status-correct {
            background: #d1fae5;
            color: #065f46;
        }
        body.light-mode .status-wrong {
            background: #fee2e2;
            color: #991b1b;
        }
        body.light-mode .status-unanswered {
            background: #e2e8f0;
            color: #475569;
        }

        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: var(--glow-md);
            z-index: 1000;
            font-weight: 600;
            font-size: 13px;
            display: none;
            border: 1px solid var(--glass-border);
            color: var(--text);
            animation: toastIn 0.35s ease;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .review-mode-badge {
            display: inline-block;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 16px;
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.35);
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
            flex-shrink: 0;
        }

        @media (max-width: 500px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .palette-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            .test-title {
                font-size: 15px;
            }
            .question-text {
                font-size: 14px;
                padding: 14px;
            }
            .result-summary {
                grid-template-columns: 1fr 1fr;
            }
            .blob {
                display: none;
            }
        }
    </style>
</head>
<body>

            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ========== BUBBLES ANIMATION ==========
        (function createBubbles() {
            const container = document.getElementById('bubblesContainer');
            const colors = [
                'radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.22), rgba(236, 72, 153, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(16, 185, 129, 0.2), rgba(52, 211, 153, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(245, 158, 11, 0.2), rgba(252, 211, 77, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(239, 68, 68, 0.16), rgba(248, 113, 113, 0.04))',
                'radial-gradient(circle at 30% 30%, rgba(168, 85, 247, 0.2), rgba(139, 92, 246, 0.06))'
            ];
            for (let i = 0; i < 22; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.floor(Math.random() * 60) + 25;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                bubble.style.animationDelay = (Math.random() * 8) + 's';
                bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(bubble);
            }
            setInterval(() => {
                const bubbles = container.querySelectorAll('.bubble');
                if (bubbles.length < 28) {
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    const size = Math.floor(Math.random() * 50) + 25;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    bubble.style.left = Math.random() * 100 + '%';
                    bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                    bubble.style.animationDelay = '0s';
                    bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(bubble);
                }
                bubbles.forEach(b => {
                    if (parseFloat(b.style.animationDuration) > 0 && b.getAnimations().length === 0) {
                        b.remove();
                    }
                });
            }, 4000);
        })();

        // ========== AVATAR FUNCTION ==========
        function setAvatarWithPic(elementId, userObj) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (userObj && userObj.avatarUrl) {
                el.innerHTML = `<img src="${userObj.avatarUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius: inherit;">`;
            } else if (userObj && userObj.profilePicUrl) {
                el.innerHTML = `<img src="${userObj.profilePicUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius: inherit;">`;
            } else {
                el.textContent = (userObj && userObj.name) ? userObj.name.charAt(0).toUpperCase() : '⚡';
            }
        }

        // ========== DETECT REVIEW MODE ==========
        const urlParams = new URLSearchParams(window.location.search);
        const IS_REVIEW_MODE = urlParams.get('review') === 'true';

        // ========== 30 PHYSICS QUESTIONS: ELECTROSTATICS ==========
        const QUESTIONS = [{
            id: 0,
            en: "Two point charges +9e and +e are kept 16 cm apart. At what distance from the +9e charge is the net electric field zero?",
            hi: "दो बिंदु आवेश +9e और +e एक-दूसरे से 16 सेमी की दूरी पर रखे हैं। +9e आवेश से कितनी दूरी पर शुद्ध विद्युत क्षेत्र शून्य होगा?",
            oEn: ["4 cm", "8 cm", "12 cm", "10 cm"],
            oHi: ["4 सेमी", "8 सेमी", "12 सेमी", "10 सेमी"],
            c: 2,
            exp: "k(9e)/x² = k(e)/(16-x)² ⇒ 3/x = 1/(16-x) ⇒ 48-3x = x ⇒ x = 12 cm.",
            text: "Zero electric field location.",
            options: ["4 cm", "8 cm", "12 cm", "10 cm"],
            correct: 2,
            explanation: "Solving 9/x² = 1/(16-x)² gives x=12 cm."
        }, {
            id: 1,
            en: "The electric flux through a cube of side a which encloses an electric dipole is:",
            hi: "एक a भुजा वाले घन से गुजरने वाला विद्युत फ्लक्स, जिसके भीतर एक विद्युत द्विध्रुव (dipole) रखा है, होगा:",
            oEn: ["q/ε₀", "2q/ε₀", "Zero", "q/2ε₀"],
            oHi: ["q/ε₀", "2q/ε₀", "शून्य", "q/2ε₀"],
            c: 2,
            exp: "Net charge of a dipole is zero. By Gauss's law, Φ = q_net/ε₀ = 0.",
            text: "Flux due to dipole.",
            options: ["q/ε₀", "2q/ε₀", "Zero", "q/2ε₀"],
            correct: 2,
            explanation: "Net enclosed charge = 0 ⇒ flux = 0."
        }, {
            id: 2,
            en: "If the distance between two plates of a parallel plate capacitor is doubled and its area is halved, then its capacitance will:",
            hi: "यदि एक समांतर पट्टिका संधारित्र की दो प्लेटों के बीच की दूरी दोगुनी कर दी जाए और उसका क्षेत्रफल आधा कर दिया जाए, तो उसकी धारिता:",
            oEn: ["Remain same", "Become double", "Become half", "Become one-fourth"],
            oHi: ["समान रहेगी", "दोगुनी हो जाएगी", "आधी हो जाएगी", "एक-चौथाई हो जाएगी"],
            c: 3,
            exp: "C = ε₀A/d. New C' = ε₀(A/2)/(2d) = C/4.",
            text: "Capacitance change.",
            options: ["Remain same", "Become double", "Become half", "Become one-fourth"],
            correct: 3,
            explanation: "A halved, d doubled → capacitance 1/4."
        }, {
            id: 3,
            en: "A hollow metal sphere of radius R is charged to a potential V. The potential at the center of the sphere is:",
            hi: "R त्रिज्या के एक खोखले धातु के गोले को V विभव तक आवेशित किया जाता है। गोले के केंद्र पर विभव होगा:",
            oEn: ["V", "Zero", "V/R", "V/2"],
            oHi: ["V", "शून्य", "V/R", "V/2"],
            c: 0,
            exp: "Inside a hollow conducting sphere, E=0, potential is constant and equal to the surface potential.",
            text: "Potential inside hollow conductor.",
            options: ["V", "Zero", "V/R", "V/2"],
            correct: 0,
            explanation: "Potential everywhere inside equals V."
        }, {
            id: 4,
            en: "The work done in rotating an electric dipole of dipole moment p in an electric field E from stable equilibrium to unstable equilibrium is:",
            hi: "एक विद्युत क्षेत्र E में द्विध्रुव आघूर्ण p के एक विद्युत द्विध्रुव को स्थायी संतुलन से अस्थायी संतुलन तक घुमाने में किया गया कार्य है:",
            oEn: ["pE", "2pE", "Zero", "-pE"],
            oHi: ["pE", "2pE", "शून्य", "-pE"],
            c: 1,
            exp: "W = pE(cos0° - cos180°) = pE(1 - (-1)) = 2pE.",
            text: "Work to rotate dipole 180°.",
            options: ["pE", "2pE", "Zero", "-pE"],
            correct: 1,
            explanation: "From 0° to 180° requires 2pE work."
        }, {
            id: 5,
            en: "When a dielectric slab is introduced between the plates of an isolated charged capacitor, the energy stored:",
            hi: "जब एक अलग किए गए आवेशित संधारित्र की प्लेटों के बीच एक परावैद्युत (dielectric) स्लैब रखा जाता है, तो संचित ऊर्जा:",
            oEn: ["Increases", "Decreases", "Remains constant", "Becomes zero"],
            oHi: ["बढ़ती है", "घटती है", "स्थिर रहती है", "शून्य हो जाती है"],
            c: 1,
            exp: "For isolated capacitor Q constant, U = Q²/(2C). C increases with dielectric, so U decreases.",
            text: "Energy change with dielectric.",
            options: ["Increases", "Decreases", "Remains constant", "Becomes zero"],
            correct: 1,
            explanation: "C increases ⇒ U decreases."
        }, {
            id: 6,
            en: "The unit of electric permittivity of free space (ε₀) is:",
            hi: "निर्वात की विद्युतशीलता (ε₀) की इकाई है:",
            oEn: ["C² N⁻¹ m⁻²", "N m² C⁻²", "C N m⁻¹", "C² N m⁻²"],
            oHi: ["C² N⁻¹ m⁻²", "N m² C⁻²", "C N m⁻¹", "C² N m⁻²"],
            c: 0,
            exp: "From Coulomb's law: F = (1/(4πε₀)) q₁q₂/r² ⇒ ε₀ has units C² N⁻¹ m⁻².",
            text: "Unit of ε₀.",
            options: ["C² N⁻¹ m⁻²", "N m² C⁻²", "C N m⁻¹", "C² N m⁻²"],
            correct: 0,
            explanation: "ε₀ = C² N⁻¹ m⁻²."
        }, {
            id: 7,
            en: "Two capacitors of 3 μF and 6 μF are connected in series. The equivalent capacitance is:",
            hi: "3 μF और 6 μF के दो संधारित्र श्रेणीक्रम में जुड़े हैं। तुल्य धारिता है:",
            oEn: ["9 μF", "2 μF", "18 μF", "0.5 μF"],
            oHi: ["9 μF", "2 μF", "18 μF", "0.5 μF"],
            c: 1,
            exp: "1/C = 1/3 + 1/6 = 1/2 ⇒ C = 2 μF.",
            text: "Series capacitors.",
            options: ["9 μF", "2 μF", "18 μF", "0.5 μF"],
            correct: 1,
            explanation: "Series: 1/C = 1/3 + 1/6 ⇒ C = 2 μF."
        }, {
            id: 8,
            en: "The electric potential at a point on the equatorial line of an electric dipole is:",
            hi: "एक विद्युत द्विध्रुव की निरक्षीय रेखा (equatorial line) पर स्थित किसी बिंदु पर विद्युत विभव होता है:",
            oEn: ["Maximum", "Minimum", "Zero", "Infinity"],
            oHi: ["अधिकतम", "न्यूनतम", "शून्य", "अनंत"],
            c: 2,
            exp: "V = kp cos90°/r² = 0.",
            text: "Potential on equatorial line.",
            options: ["Maximum", "Minimum", "Zero", "Infinity"],
            correct: 2,
            explanation: "cos90°=0 ⇒ V=0."
        }, {
            id: 9,
            en: "Gauss's Law is valid for:",
            hi: "गॉस का नियम किसके लिए मान्य है?",
            oEn: ["Only point charges", "Only closed surfaces", "Any surface", "Only spherical surfaces"],
            oHi: ["केवल बिंदु आवेश", "केवल बंद सतहों", "किसी भी सतह", "केवल गोलाकार सतहों"],
            c: 1,
            exp: "Gauss's law relates flux through any closed surface to enclosed charge.",
            text: "Gauss's law applicability.",
            options: ["Point charges", "Closed surfaces", "Any surface", "Spherical surfaces"],
            correct: 1,
            explanation: "Valid for closed surfaces only."
        }, {
            id: 10,
            en: "A capacitor is charged by a battery and then disconnected. If the separation between plates is increased, the potential difference across it:",
            hi: "एक संधारित्र को बैटरी से आवेशित करके अलग कर दिया जाता है। यदि प्लेटों के बीच की दूरी बढ़ाई जाए, तो विभव (V):",
            oEn: ["Increases", "Decreases", "Remains same", "Becomes zero"],
            oHi: ["बढ़ता है", "घटता है", "समान रहता है", "शून्य हो जाता है"],
            c: 0,
            exp: "Q constant, C decreases as d increases, V = Q/C ⇒ V increases.",
            text: "Potential change with plate separation.",
            options: ["Increases", "Decreases", "Remains same", "Becomes zero"],
            correct: 0,
            explanation: "C ∝ 1/d, so V increases."
        }, {
            id: 11,
            en: "The electric field intensity inside a uniformly charged solid non-conducting sphere at a distance r from the center (r < R) is proportional to:",
            hi: "एक समान रूप से आवेशित ठोस कुचालक गोले के भीतर केंद्र से r दूरी पर (r < R) विद्युत क्षेत्र की तीव्रता किसके समानुपाती होती है?",
            oEn: ["1/r²", "1/r", "r", "r²"],
            oHi: ["1/r²", "1/r", "r", "r²"],
            c: 2,
            exp: "Inside sphere, E ∝ r (using Gauss's law with charge density).",
            text: "Field inside non-conducting sphere.",
            options: ["1/r²", "1/r", "r", "r²"],
            correct: 2,
            explanation: "E = (ρr)/(3ε₀) ∝ r."
        }, {
            id: 12,
            en: "Torque acting on a dipole in a uniform electric field is maximum when the angle between p and E is:",
            hi: "एक समान विद्युत क्षेत्र में द्विध्रुव पर लगने वाला बल आघूर्ण (torque) अधिकतम होता है जब p और E के बीच का कोण होता है:",
            oEn: ["0°", "90°", "180°", "45°"],
            oHi: ["0°", "90°", "180°", "45°"],
            c: 1,
            exp: "τ = pE sinθ, maximum at θ=90° (sin90°=1).",
            text: "Maximum torque condition.",
            options: ["0°", "90°", "180°", "45°"],
            correct: 1,
            explanation: "sinθ max at 90°."
        }, {
            id: 13,
            en: "The capacitance of a spherical conductor of radius 1 m is:",
            hi: "1 मीटर त्रिज्या वाले एक गोलाकार चालक की धारिता है:",
            oEn: ["1.1×10⁻¹⁰ F", "9×10⁹ F", "1.1×10⁻⁶ F", "1 F"],
            oHi: ["1.1×10⁻¹⁰ F", "9×10⁹ F", "1.1×10⁻⁶ F", "1 F"],
            c: 0,
            exp: "C = 4πε₀R = (1/(9×10⁹))×1 ≈ 1.1×10⁻¹⁰ F.",

        // ========== STATE MANAGEMENT ==========
        const TOTAL = QUESTIONS.length;
        const state = {
            currentIndex: 0,
            answers: {},
            markedQuestions: new Set(),
            timeLeft: 30 * 60,
            timerInterval: null,
            testSubmitted: false,
            darkMode: true,
            lang: 'en',
            score: null
        };

        // ========== THEME TOGGLE ==========
        function toggleTheme() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('light-mode', !state.darkMode);
            document.getElementById('themeIcon').className = state.darkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('phys_elec_theme', state.darkMode ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('phys_elec_theme');
        if (savedTheme === 'light') {
            state.darkMode = false;
            document.body.classList.add('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        } else {
            state.darkMode = true;
            document.body.classList.remove('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-sun';
        }

        // ========== LANGUAGE TOGGLE ==========
        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'hi' : 'en';
            const btn = document.getElementById('langBtn');
            document.getElementById('langText').textContent = state.lang === 'hi' ? 'English' : 'हिंदी';
            btn.classList.toggle('active', state.lang === 'hi');
            if (IS_REVIEW_MODE) {
                renderReviewMode();
            } else {
                renderQuestion();
            }
            localStorage.setItem('phys_elec_lang', state.lang);
            showToast(state.lang === 'hi' ? '🇮🇳 हिंदी में बदला' : '🇬🇧 Changed to English');
        }

        // ========== SCORE CALCULATION ==========
        function calculateScore() {
            let correct = 0,
                wrong = 0,
                score = 0;
            Object.keys(state.answers).forEach(idx => {
                const q = QUESTIONS[parseInt(idx)];
                if (q) {
                    if (state.answers[idx] === q.c) {
                        correct++;
                        score += 5;
                    } else {
                        wrong++;
                        score -= 1;
                    }
                }
            });
            const totalMarks = TOTAL * 5;
            const attempted = correct + wrong;
            const unanswered = TOTAL - attempted;
            return {
                score: Math.max(0, Math.round(score * 100) / 100),
                total: totalMarks,
                correct,
                wrong,
                attempted,
                unanswered
            };
        }

        // ========== RENDER QUESTION (NORMAL MODE) ==========
        function renderQuestion() {
            if (IS_REVIEW_MODE) return;
            const q = QUESTIONS[state.currentIndex];
            document.getElementById('qNumber').textContent = `Q ${state.currentIndex + 1}/${TOTAL}`;

            const qt = document.getElementById('questionText');
            if (state.lang === 'hi') {
                qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.hi}</div>`;
            } else {
                qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.en}</div>`;
            }

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const opts = state.lang === 'hi' ? q.oHi : q.oEn;
            const letters = ['A', 'B', 'C', 'D'];

            opts.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                if (state.testSubmitted) {
                    if (i === q.c) card.classList.add('correct');
                    else if (state.answers[state.currentIndex] === i && state.answers[state.currentIndex] !== q.c)
                        card.classList.add('wrong');
                    card.style.pointerEvents = 'none';
                } else {
                    if (state.answers[state.currentIndex] === i) card.classList.add('selected');
                    card.onclick = () => selectOption(i);
                }
                card.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
                grid.appendChild(card);
            });

            const expBox = document.getElementById('explanationBox');
            const expText = document.getElementById('explanationText');
            if (state.testSubmitted) {
                expBox.classList.add('show');
                expText.textContent = q.exp;
            } else {
                expBox.classList.remove('show');
            }

            document.getElementById('prevBtn').disabled = state.currentIndex === 0;
            document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
            document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
            document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';

            renderPalette();
            updateProgress();
        }

        function selectOption(index) {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            state.answers[state.currentIndex] = index;
            state.markedQuestions.delete(state.currentIndex);
            renderQuestion();
            showToast('✅ Answer saved!');
        }

        function navigate(dir) {
            if (IS_REVIEW_MODE) return;
            const idx = state.currentIndex + dir;
            if (idx >= 0 && idx < TOTAL) {
                state.currentIndex = idx;
                renderQuestion();
                document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function toggleMark() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            const idx = state.currentIndex;
            if (state.markedQuestions.has(idx)) {
                state.markedQuestions.delete(idx);
                showToast('🏷️ Unmarked');
            } else {
                state.markedQuestions.add(idx);
                showToast('🚩 Marked for review');
            }
            renderPalette();
        }

        function clearAnswer() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            if (state.answers[state.currentIndex] !== undefined) {
                delete state.answers[state.currentIndex];
                renderQuestion();
                showToast('🧹 Answer cleared');
            }
        }

        // ========== PALETTE ==========
        function renderPalette() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const num = document.createElement('div');
                num.className = 'palette-num';
                num.textContent = i + 1;
                if (state.testSubmitted) {
                    const q = QUESTIONS[i];
                    if (state.answers[i] === q.c) num.classList.add('answered');
                    else if (state.answers[i] !== undefined && state.answers[i] !== q.c) num.classList.add('wrong-num');
                } else {
                    if (state.answers[i] !== undefined) num.classList.add('answered');
                    if (state.markedQuestions.has(i)) num.classList.add('marked');
                }
                if (i === state.currentIndex) num.classList.add('current');
                num.onclick = () => {
                    if (IS_REVIEW_MODE) return;
                    state.currentIndex = i;
                    renderQuestion();
                    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                grid.appendChild(num);
            }
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            const percent = (answered / TOTAL) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
        }

        // ========== TIMER ==========
        function startTimer() {
            if (IS_REVIEW_MODE) return;
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                if (state.testSubmitted) {
                    clearInterval(state.timerInterval);
                    return;
                }
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    autoSubmit();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            document.getElementById('timerText').textContent =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (state.timeLeft < 300 && state.timeLeft > 0) {
                document.getElementById('timerPill').classList.add('warning');
            } else {
                document.getElementById('timerPill').classList.remove('warning');
            }
            if (!state.testSubmitted) {
                document.title =
                    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} - CUET Physics Mock`;
            }
        }

        function autoSubmit() {
            showToast('⏰ Time\'s up! Submitting...');
            setTimeout(() => submitTest(true), 1500);
        }

        // ========== SUBMIT TEST ==========
        function submitTest(skipConfirm = false) {
            if (state.testSubmitted) return;
            const answered = Object.keys(state.answers).length;
            const unanswered = TOTAL - answered;
            if (!skipConfirm) {
                let confirmMsg = 'Are you sure you want to submit?';
                if (unanswered > 0) {
                    confirmMsg = `${unanswered} question(s) unanswered. Submit anyway?`;
                }
                if (!confirm(confirmMsg)) return;
            }
            state.testSubmitted = true;
            clearInterval(state.timerInterval);
            state.score = calculateScore();

            const resultData = {
                score: state.score.score,
                total: state.score.total,
                accuracy: state.score.attempted > 0 ? Math.round((state.score.correct / state.score.attempted) * 100) : 0,
                correct: state.score.correct,
                wrong: state.score.wrong,
                attempted: state.score.attempted,
                unanswered: state.score.unanswered,
                timeTaken: (30 * 60) - state.timeLeft,
                testCode: 'CUET_PHYS_ELEC_MOCK',
                examType: 'CUET UG Physics'
            };

            localStorage.setItem('phys_elec_last_answers', JSON.stringify(state.answers));
            localStorage.setItem('phys_elec_last_mock_file', window.location.href.split('?')[0]);
            localStorage.setItem('phys_elec_last_result_data', JSON.stringify(resultData));

            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'TEST_SUBMITTED',
                    ...resultData,
                    answers: state.answers
                }, '*');
            }

            showReview();
            renderQuestion();
            renderPalette();
            showToast('✅ Test Submitted! Check review below.');
            setTimeout(() => {
                document.getElementById('reviewPanel').scrollIntoView({ behavior: 'smooth' });
            }, 300);
            document.title = 'Submitted - CUET Physics Mock';

            document.getElementById('swipeHint').style.display = 'none';
            document.getElementById('actionRow').style.display = 'none';
            document.getElementById('progressCard').style.display = 'none';
            document.getElementById('paletteCard').style.display = 'none';
        }

        // ========== REVIEW PANEL ==========
        function showReview() {
            const panel = document.getElementById('reviewPanel');
            panel.classList.add('show');
            const result = state.score;
            document.getElementById('resultSummary').innerHTML = `
            <div class="result-item">
                <div class="value">${result.score}/${result.total}</div>
                <div class="label">Score</div>
            </div>
            <div class="result-item">
                <div class="value" style="color:#10b981;">${result.correct}</div>
                <div class="label">✅ Correct (+5 each)</div>
            </div>
            <div class="result-item">
                <div class="value" style="color:#ef4444;">${result.wrong}</div>
                <div class="label">❌ Wrong (-1 each)</div>
            </div>
            <div class="result-item">
                <div class="value">${result.unanswered}</div>
                <div class="label">⬜ Unanswered</div>
            </div>
        `;
            const reviewQs = document.getElementById('reviewQuestions');
            reviewQs.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                const div = document.createElement('div');
                div.style.cssText = `
                padding: 12px; margin: 8px 0; border-radius: 10px;
                border: 1px solid var(--border); background: var(--option-bg);
            `;
                let statusIcon, statusColor;
                if (isUnanswered) { statusIcon = '⬜'; statusColor = 'var(--text-secondary)'; } else if (isCorrect) { statusIcon = '✅'; statusColor = '#10b981'; } else { statusIcon = '❌'; statusColor = '#ef4444'; }
                const opts = state.lang === 'hi' ? q.oHi : q.oEn;
                const userAnsText = isUnanswered ? 'Not answered' : opts[userAns];
                const correctAnsText = opts[q.c];
                const qDisplay = state.lang === 'hi' ? q.hi : q.en;
                div.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                    <span style="font-weight:700;">Q${i+1}.</span>
                    <span style="color:${statusColor};font-size:18px;">${statusIcon}</span>
                </div>
                <div style="font-size:13px;margin-bottom:4px;white-space:pre-line;">${qDisplay}</div>
                <div style="font-size:11px;color:var(--text-secondary);">
                    Your answer: <strong>${userAnsText}</strong><br>
                    Correct answer: <strong style="color:#10b981;">${correctAnsText}</strong>
                </div>
                <div style="font-size:11px;margin-top:4px;padding:8px;background:rgba(245,158,11,0.1);border-radius:6px;color:#fbbf24;">
                    💡 ${q.exp}
                </div>
                <button onclick="jumpToQuestion(${i})" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid #8b5cf6;background:transparent;color:#a78bfa;cursor:pointer;font-size:11px;transition:all 0.2s;">
                    Jump to Q${i+1}
                </button>
            `;
                reviewQs.appendChild(div);
            });
        }

        function jumpToQuestion(index) {
            state.currentIndex = index;
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('paletteCard').style.display = 'block';
            document.getElementById('swipeHint').style.display = 'block';
            document.getElementById('actionRow').style.display = 'flex';
            renderQuestion();
            document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
        }

        function closeReview() {
            document.getElementById('reviewPanel').classList.remove('show');
        }

        // ========== REVIEW MODE (when ?review=true) ==========
        function renderReviewMode() {
            const container = document.getElementById('reviewModeContainer');
            const letters = ['A', 'B', 'C', 'D'];
            const optsKey = state.lang === 'hi' ? 'oHi' : 'oEn';

            let html = '<div class="review-mode-badge">📝 Review Mode — All 30 Questions</div>';

            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let cardClass = 'review-mode-card';
                let statusHTML = '';
                if (isUnanswered) {
                    cardClass += ' unanswered-q';
                    statusHTML = '<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>';
                } else if (isCorrect) {
                    cardClass += ' correct-answer';
                    statusHTML = '<span class="review-mode-status status-correct">✅ Correct (+5)</span>';
                } else {
                    cardClass += ' wrong-answer';
                    statusHTML = '<span class="review-mode-status status-wrong">❌ Wrong (-1)</span>';
                }

                const opts = q[optsKey];
                const qDisplay = state.lang === 'hi' ? q.hi : q.en;
                const optionsHTML = opts.map((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = '';
                    if (j === q.c) label = ' ✅';
                    if (j === userAns && !isCorrect) label = ' ❌ (Your answer)';
                    if (j === userAns && isCorrect) label = ' ✅ (Your answer)';
                    return `
                    <div class="${optClass}" style="pointer-events:none;">
                        <div class="option-letter">${letters[j]}</div>
                        <span>${opt}${label}</span>
                    </div>`;
                }).join('');

                html += `
                <div class="${cardClass}">
                    <div class="review-mode-header">
                        <span class="q-badge">Q ${i+1}/${TOTAL}</span>
                        ${statusHTML}
                    </div>
                    <div class="question-text">
                        <div style="font-weight:600;white-space:pre-line;">${qDisplay}</div>
                    </div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div class="explanation-box show" style="margin-top:10px;">
                        <div class="exp-title">💡 Explanation</div>
                        <div>${q.exp}</div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            container.style.display = 'block';
        }

        // ========== SWIPE NAVIGATION ==========
        let touchStartX = 0,
            touchStartY = 0,
            touchMoved = false,
            swipeHandled = false;
        const card = document.getElementById('questionCard');

        card.addEventListener('touchstart', (e) => {
            if (IS_REVIEW_MODE) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchMoved = false;
            swipeHandled = false;
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
            if (IS_REVIEW_MODE || swipeHandled) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 15 && Math.abs(dx) > Math.abs(dy)) {
                touchMoved = true;
                card.style.transform = `translateX(${dx * 0.5}px)`;
                card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 800);
                card.classList.add('swiping');
                e.preventDefault();
            }
        }, { passive: false });

        card.addEventListener('touchend', (e) => {
            if (IS_REVIEW_MODE) return;
            card.classList.remove('swiping');
            card.style.transform = '';
            card.style.opacity = '';
            if (!touchMoved) return;
            const endX = e.changedTouches[0]?.clientX || touchStartX;
            const dx = endX - touchStartX;
            if (Math.abs(dx) > 80) {
                swipeHandled = true;
                if (dx > 0) navigate(-1);
                else navigate(1);
            }
            touchMoved = false;
        });

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (IS_REVIEW_MODE) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case 'arrowleft': e.preventDefault(); navigate(-1); break;
                case 'arrowright': e.preventDefault(); navigate(1); break;
                case 'a': case '1': e.preventDefault(); selectOption(0); break;
                case 'b': case '2': e.preventDefault(); selectOption(1); break;
                case 'c': case '3': e.preventDefault(); selectOption(2); break;
                case 'd': case '4': e.preventDefault(); selectOption(3); break;
                case 'm': e.preventDefault(); toggleMark(); break;
                case 'backspace': e.preventDefault(); clearAnswer(); break;
            }
        });

        // ========== TOAST ==========
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'flex';
            clearTimeout(t._t);
            t._t = setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        // ========== PREVENT ACCIDENTAL EXIT ==========
        window.addEventListener('beforeunload', (e) => {
            if (!state.testSubmitted && state.timeLeft > 0 && Object.keys(state.answers).length > 0 && !IS_REVIEW_MODE) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ========== INITIALIZATION ==========
        function init() {
            localStorage.setItem('phys_elec_last_mock_file', window.location.href.split('?')[0]);

            if (IS_REVIEW_MODE) {
                document.getElementById('questionCard').style.display = 'none';
                document.getElementById('progressCard').style.display = 'none';
                document.getElementById('paletteCard').style.display = 'none';
                document.getElementById('swipeHint').style.display = 'none';
                document.getElementById('infoRow').style.display = 'none';
                document.getElementById('timerPill').style.display = 'none';
                document.getElementById('actionRow').style.display = 'none';
                document.getElementById('reviewPanel').style.display = 'none';
                document.title = 'Review - CUET Physics Mock';

                const savedAnswers = JSON.parse(localStorage.getItem('phys_elec_last_answers') || '{}');
                state.answers = savedAnswers;
                state.testSubmitted = true;
                state.lang = localStorage.getItem('phys_elec_lang') || 'en';

                if (state.lang === 'hi') {
                    document.getElementById('langBtn').classList.add('active');
                    document.getElementById('langText').textContent = 'English';
                }

                renderReviewMode();
                console.log('Physics Review mode activated — all 30 questions displayed');
            } else {
                state.lang = localStorage.getItem('phys_elec_lang') || 'en';
                if (state.lang === 'hi') {
                    document.getElementById('langBtn').classList.add('active');
                    document.getElementById('langText').textContent = 'English';
                }
                startTimer();
                renderQuestion();
                renderPalette();
                console.log('CUET Physics Electrostatics Mock Initialized');
                console.log('Questions:', TOTAL, '| Duration: 30 min | Marking: +5/-1 | Auto-submit on timer');
            }
        }

        init();
    </script>
</body> 
</html>
