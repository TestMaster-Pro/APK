<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUET Math • Relations & Functions Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-glow: #3b82f6;
            --accent: #22d3ee;
            --accent-glow: #22d3ee;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #94a3b8;
            --light: #f1f5f9;
            --bg: #0f172a;
            --bg2: #1e293b;
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --option-bg: rgba(255, 255, 255, 0.04);
            --hover-bg: rgba(59, 130, 246, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --glow-sm: 0 0 12px rgba(59, 130, 246, 0.25);
            --glow-md: 0 0 20px rgba(59, 130, 246, 0.35);
            --glow-lg: 0 0 30px rgba(34, 211, 238, 0.3);
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg2: #e2e8f0;
            --card: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --hover-bg: #eef2ff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --glow-sm: 0 0 12px rgba(59, 130, 246, 0.15);
            --glow-md: 0 0 20px rgba(59, 130, 246, 0.2);
            --glow-lg: 0 0 30px rgba(34, 211, 238, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.6s ease-in-out;
            transition: background 0.5s ease, color 0.3s;
            z-index: 0;
            position: relative;
            overflow-x: hidden;
        }
        body.light-mode { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 40%, #f1f5f9 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .mock-container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }

        .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: blobFloat 20s ease-in-out infinite; opacity: 0.5; }
        .blob-1 { width: 350px; height: 350px; background: rgba(59, 130, 246, 0.2); top: -100px; right: -80px; animation-delay: 0s; }
        .blob-2 { width: 280px; height: 280px; background: rgba(34, 211, 238, 0.18); bottom: -80px; left: -60px; animation-delay: -7s; }
        .blob-3 { width: 220px; height: 220px; background: rgba(99, 102, 241, 0.16); top: 50%; left: 50%; animation-delay: -14s; }
        @keyframes blobFloat { 0%,100%{ transform:translate(0,0) scale(1); } 25%{ transform:translate(40px,-50px) scale(1.1); } 50%{ transform:translate(-30px,-20px) scale(0.9); } 75%{ transform:translate(20px,40px) scale(1.05); } }

        .bubbles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bubble { position: absolute; bottom: -100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.2), rgba(34,211,238,0.06)); box-shadow: 0 0 20px rgba(59,130,246,0.12); animation: floatUp linear infinite; }
        body.light-mode .bubble { background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), rgba(34,211,238,0.04)); box-shadow: 0 0 20px rgba(59,130,246,0.08); }
        @keyframes floatUp { 0%{ transform:translateY(0) translateX(0) scale(0.5); opacity:0.5; } 25%{ transform:translateY(-250px) translateX(30px) scale(0.8); opacity:0.7; } 50%{ transform:translateY(-500px) translateX(-20px) scale(1); opacity:0.6; } 75%{ transform:translateY(-750px) translateX(15px) scale(0.9); opacity:0.35; } 100%{ transform:translateY(-1000px) translateX(-10px) scale(0.3); opacity:0; } }

        .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 14px 20px; border-radius: var(--radius); border: 1px solid var(--glass-border); box-shadow: var(--shadow); transition: all 0.3s ease; }
        .top-bar:hover { box-shadow: var(--glow-sm); }
        .test-title { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
        .test-title .icon-dna { font-size: 20px; animation: pulseIcon 2s ease-in-out infinite; }
        @keyframes pulseIcon { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.15); opacity:0.75; } }
        .top-actions { display: flex; align-items: center; gap: 8px; }
        .lang-btn { padding: 8px 16px; border-radius: 25px; border: 2px solid #f97316; background: var(--card); color: #f97316; cursor: pointer; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease; backdrop-filter: blur(8px); }
        .lang-btn:hover { box-shadow: 0 0 14px rgba(249,115,22,0.35); transform: translateY(-1px); }
        .lang-btn.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; border-color: transparent; box-shadow: 0 0 16px rgba(249,115,22,0.4); }
        .theme-toggle { width: 40px; height: 40px; border-radius: 12px; border: 1.5px solid var(--glass-border); background: var(--glass-bg); color: var(--text); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; box-shadow: var(--shadow); backdrop-filter: blur(8px); }
        .theme-toggle:hover { border-color: var(--accent); box-shadow: var(--glow-sm); transform: translateY(-1px); }
        .theme-toggle:active { transform: scale(0.92); }
        .timer-pill { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1.5px solid var(--glass-border); color: var(--text); padding: 8px 16px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 7px; box-shadow: var(--shadow); transition: all 0.3s; }
        .timer-pill.warning { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5; animation: pulse 0.8s infinite; box-shadow: 0 0 18px rgba(239,68,68,0.3); }
        body.light-mode .timer-pill.warning { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
        @keyframes pulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.04); } }

        .info-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
        .info-chip { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); color: var(--text-secondary); transition: all 0.3s ease; }
        .info-chip i { font-size: 11px; }
        .info-chip.exam { color: #60a5fa; }
        .info-chip.subject { color: #22d3ee; }
        .info-chip.marks { color: #fbbf24; }
        body.light-mode .info-chip.exam { color: #3b82f6; }
        body.light-mode .info-chip.subject { color: #0891b2; }
        body.light-mode .info-chip.marks { color: #d97706; }

        .progress-card { background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); transition: all 0.3s ease; }
        .progress-card:hover { box-shadow: var(--glow-sm); }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #22d3ee); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(59,130,246,0.5); }

        .question-card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius); padding: 24px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); animation: slideIn 0.35s ease; transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease; }
        .question-card:hover { box-shadow: var(--glow-md); transform: translateY(-2px); }
        @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
        .question-card.swiping { transition: none; }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .q-badge { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 12px; box-shadow: 0 0 14px rgba(59,130,246,0.35); }
        .q-marks { font-weight: 600; font-size: 12px; color: #fbbf24; background: rgba(251,191,36,0.1); padding: 6px 14px; border-radius: 15px; border: 1px solid rgba(251,191,36,0.25); }
        body.light-mode .q-marks { color: #d97706; background: #fffbeb; border-color: #fde68a; }
        .question-text { font-size: 15px; font-weight: 500; line-height: 1.7; color: var(--text); background: var(--option-bg); padding: 18px; border-radius: 12px; border-left: 4px solid #3b82f6; margin-bottom: 18px; transition: all 0.3s ease; }
        .question-text .hindi-block { color: #fbbf24; font-size: 14px; line-height: 1.8; }
        body.light-mode .question-text .hindi-block { color: #d97706; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--option-bg); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.25s ease; font-size: 13px; font-weight: 500; color: var(--text); backdrop-filter: blur(4px); }
        .option-card:hover { border-color: #60a5fa; background: var(--hover-bg); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(59,130,246,0.2); }
        .option-card.selected { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-color: transparent; transform: scale(1.02); box-shadow: 0 6px 22px rgba(59,130,246,0.4); }
        .option-card.correct { background: #10b981 !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 16px rgba(16,185,129,0.4) !important; }
        .option-card.wrong { background: #ef4444 !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 16px rgba(239,68,68,0.4) !important; animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-4px); } 75%{ transform:translateX(4px); } }
        .option-letter { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); border-radius: 8px; font-weight: 800; font-size: 13px; color: #60a5fa; flex-shrink: 0; transition: all 0.25s ease; }
        .option-card.selected .option-letter { background: rgba(255,255,255,0.2); color: white; }
        .option-card.correct .option-letter, .option-card.wrong .option-letter { background: rgba(255,255,255,0.25); color: white; }

        .action-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border-radius: 10px; border: 1.5px solid var(--border); font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s ease; font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 5px; background: var(--glass-bg); backdrop-filter: blur(8px); color: var(--text); flex: 1; justify-content: center; min-width: 60px; }
        .btn:hover { box-shadow: var(--glow-sm); transform: translateY(-2px); border-color: #60a5fa; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .btn-mark { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #fbbf24; }
        .btn-mark:hover { box-shadow: 0 0 14px rgba(245,158,11,0.3); }
        .btn-clear { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #4ade80; }
        .btn-clear:hover { box-shadow: 0 0 14px rgba(16,185,129,0.3); }
        body.light-mode .btn-mark { background: #fef3c7; border-color: #fde68a; color: #92400e; }
        body.light-mode .btn-clear { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }

        .palette-card { background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); margin-top: 12px; transition: all 0.3s ease; }
        .palette-card:hover { box-shadow: var(--glow-sm); }
        .palette-title { font-weight: 700; margin-bottom: 12px; color: var(--text); font-size: 14px; display: flex; align-items: center; gap: 7px; }
        .palette-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 7px; margin-bottom: 12px; }
        .palette-num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--option-bg); border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; transition: all 0.25s ease; border: 2px solid transparent; color: var(--text); }
        .palette-num:hover { background: var(--hover-bg); transform: scale(1.1); box-shadow: var(--glow-sm); }
        .palette-num.answered { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 0 10px rgba(16,185,129,0.4); }
        .palette-num.marked { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; box-shadow: 0 0 10px rgba(245,158,11,0.4); }
        .palette-num.current { border-color: #3b82f6; background: rgba(59,130,246,0.2); transform: scale(1.08); box-shadow: 0 0 14px rgba(59,130,246,0.4); }
        .palette-num.wrong-num { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 0 10px rgba(239,68,68,0.4); }
        .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 10px; color: var(--text-secondary); }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

        .review-panel { display: none; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 20px; margin-top: 12px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); }
        .review-panel.show { display: block; animation: fadeIn 0.5s ease; }
        .result-summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
        .result-item { background: var(--option-bg); padding: 14px; border-radius: 12px; text-align: center; border: 1px solid var(--border); transition: all 0.3s ease; }
        .result-item:hover { box-shadow: var(--glow-sm); }
        .result-item .value { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .result-item .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .explanation-box { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); border-radius: 10px; padding: 14px; margin-top: 12px; display: none; transition: all 0.3s ease; }
        body.light-mode .explanation-box { background: #fef3c7; border-color: #fde68a; color: #92400e; }
        .explanation-box.show { display: block; animation: fadeIn 0.3s ease; }
        .explanation-box .exp-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #fbbf24; }
        body.light-mode .explanation-box .exp-title { color: #92400e; }

        .swipe-hint { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 8px; opacity: 0.7; letter-spacing: 0.5px; }
        .review-mode-card { background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: var(--radius); padding: 20px; margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); transition: all 0.3s ease; }
        .review-mode-card:hover { box-shadow: var(--glow-sm); transform: translateY(-1px); }
        .review-mode-card.correct-answer { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
        .review-mode-card.wrong-answer { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }
        .review-mode-card.unanswered-q { background: var(--glass-bg); border-color: var(--glass-border); }
        .review-mode-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
        .review-mode-status { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 15px; }
        .status-correct { background: rgba(16,185,129,0.2); color: #4ade80; }
        .status-wrong { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .status-unanswered { background: rgba(148,163,184,0.2); color: #94a3b8; }
        body.light-mode .status-correct { background: #d1fae5; color: #065f46; }
        body.light-mode .status-wrong { background: #fee2e2; color: #991b1b; }
        body.light-mode .status-unanswered { background: #e2e8f0; color: #475569; }

        .toast { position: fixed; top: 16px; right: 16px; background: var(--glass-bg); backdrop-filter: blur(20px); padding: 12px 18px; border-radius: 10px; box-shadow: var(--glow-md); z-index: 1000; font-weight: 600; font-size: 13px; display: none; border: 1px solid var(--glass-border); color: var(--text); animation: toastIn 0.35s ease; }
        @keyframes toastIn { from { opacity:0; transform:translateX(50px); } to { opacity:1; transform:translateX(0); } }
        .review-mode-badge { display: inline-block; background: linear-gradient(135deg, #3b82f6, #22d3ee); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 16px; box-shadow: 0 0 14px rgba(59,130,246,0.35); }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            .palette-grid { grid-template-columns: repeat(5, 1fr); }
            .test-title { font-size: 15px; }
            .question-text { font-size: 14px; padding: 14px; }
            .result-summary { grid-template-columns: 1fr 1fr; }
            .blob { display: none; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="bubbles-container" id="bubblesContainer"></div>

    <div class="mock-container">
        <div class="top-bar">
            <div class="test-title"><span class="icon-dna">🧮</span> CUET Math • Relations & Functions Mock</div>
            <div class="top-actions">
                <button class="lang-btn" id="langBtn" onclick="toggleLanguage()"><span>🇮🇳</span> <span id="langText">हिंदी</span></button>
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></button>
                <div class="timer-pill" id="timerPill"><i class="fas fa-hourglass-half"></i> <span id="timerText">45:00</span></div>
            </div>
        </div>

        <div class="info-row" id="infoRow">
            <span class="info-chip exam"><i class="fas fa-graduation-cap"></i> CUET UG</span>
            <span class="info-chip subject"><i class="fas fa-calculator"></i> Mathematics</span>
            <span class="info-chip"><i class="fas fa-project-diagram"></i> Relations & Functions</span>
            <span class="info-chip marks"><i class="fas fa-star"></i> +5 / -1</span>
            <span class="info-chip"><i class="fas fa-list"></i> 30 Questions</span>
        </div>

        <div class="progress-card" id="progressCard">
            <div class="progress-header"><span>📊 Progress</span><span id="progressText">0/30 answered</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>

        <div class="question-card" id="questionCard">
            <div class="q-header">
                <span class="q-badge" id="qNumber">Q 1/30</span>
                <span class="q-marks">⭐ +5 / -1</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="explanation-box" id="explanationBox">
                <div class="exp-title">💡 Explanation</div>
                <div id="explanationText"></div>
            </div>
            <div class="action-row" id="actionRow">
                <button class="btn" onclick="navigate(-1)" id="prevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
                <button class="btn" onclick="navigate(1)" id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
                <button class="btn btn-mark" onclick="toggleMark()" id="markBtn"><i class="fas fa-flag"></i> Mark</button>
                <button class="btn btn-clear" onclick="clearAnswer()" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
            </div>
            <button class="btn" onclick="submitTest()" id="submitBtn" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;font-size:14px;padding:12px;margin-top:12px;width:100%;display:none !important;">
                <i class="fas fa-check-double"></i> Submit Test
            </button>
        </div>

        <div id="reviewModeContainer" style="display:none;"></div>
        <div class="swipe-hint" id="swipeHint"><i class="fas fa-arrow-left"></i> Swipe to navigate <i class="fas fa-arrow-right"></i></div>

        <div class="review-panel" id="reviewPanel">
            <h3 style="margin-bottom:12px;">📋 Result Review</h3>
            <div class="result-summary" id="resultSummary"></div>
            <div id="reviewQuestions"></div>
            <button class="btn" onclick="closeReview()" style="margin-top:12px;display:inline-flex !important;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border:none;padding:12px 24px;border-radius:10px;font-weight:700;cursor:pointer;">
                <i class="fas fa-times"></i> Close Review
            </button>
        </div>

        <div class="palette-card" id="paletteCard">
            <div class="palette-title">📋 Question Palette</div>
            <div class="palette-grid" id="paletteGrid"></div>
            <div class="legend">
                <span><span class="legend-dot" style="background:#10b981;"></span>Correct</span>
                <span><span class="legend-dot" style="background:#ef4444;"></span>Wrong</span>
                <span><span class="legend-dot" style="background:#f59e0b;"></span>Marked</span>
                <span><span class="legend-dot" style="border:2px solid #3b82f6;"></span>Current</span>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        (function createBubbles() {
            const container = document.getElementById('bubblesContainer');
            const colors = [
                'radial-gradient(circle at 30% 30%, rgba(59,130,246,0.22), rgba(34,211,238,0.06))',
                'radial-gradient(circle at 30% 30%, rgba(16,185,129,0.2), rgba(52,211,153,0.06))',
                'radial-gradient(circle at 30% 30%, rgba(245,158,11,0.2), rgba(252,211,77,0.06))',
                'radial-gradient(circle at 30% 30%, rgba(239,68,68,0.16), rgba(248,113,113,0.04))',
                'radial-gradient(circle at 30% 30%, rgba(34,211,238,0.2), rgba(59,130,246,0.06))'
            ];
            for (let i = 0; i < 22; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.floor(Math.random() * 60) + 25;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                bubble.style.animationDelay = (Math.random() * 8) + 's';
                bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(bubble);
            }
            setInterval(() => {
                const bubbles = container.querySelectorAll('.bubble');
                if (bubbles.length < 28) {
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    const size = Math.floor(Math.random() * 50) + 25;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    bubble.style.left = Math.random() * 100 + '%';
                    bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                    bubble.style.animationDelay = '0s';
                    bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(bubble);
                }
                bubbles.forEach(b => {
                    if (parseFloat(b.style.animationDuration) > 0 && b.getAnimations().length === 0) {
                        b.remove();
                    }
                });
            }, 4000);
        })();

        const urlParams = new URLSearchParams(window.location.search);
        const IS_REVIEW_MODE = urlParams.get('review') === 'true';

        const QUESTIONS = [
            { id: 0, en: "Let R be a relation on the set L of all lines in a plane defined by R = {(L₁, L₂) : L₁ ⟂ L₂}. This relation is:", hi: "मान लीजिए R एक समतल की सभी रेखाओं के समुच्चय L पर परिभाषित एक संबंध है, जहाँ R = {(L₁, L₂) : L₁ ⟂ L₂} है। यह संबंध है:", oEn: ["Reflexive", "Symmetric", "Transitive", "Equivalence"], oHi: ["स्वतुल्य", "सममित", "संक्रामक", "तुल्यता"], c: 1, exp: "If L₁ ⟂ L₂, then L₂ ⟂ L₁. But L₁ cannot be perpendicular to itself, and L₁ ⟂ L₂, L₂ ⟂ L₃ ⟹ L₁ ∥ L₃." },
            { id: 1, en: "The relation R in the set {1, 2, 3} given by R = {(1, 1), (2, 2), (3, 3), (1, 2), (2, 3)} is:", hi: "समुच्चय {1, 2, 3} में संबंध R = {(1, 1), (2, 2), (3, 3), (1, 2), (2, 3)} है:", oEn: ["Reflexive but not symmetric", "Symmetric and transitive", "Only transitive", "Equivalence"], oHi: ["स्वतुल्य लेकिन सममित नहीं", "सममित और संक्रामक", "केवल संक्रामक", "तुल्यता"], c: 0, exp: "It contains (1,1),(2,2),(3,3) so reflexive. (1,2)∈R but (2,1)∉R (not symmetric). (1,2),(2,3)∈R but (1,3)∉R (not transitive)." },
            { id: 2, en: "Let A = {1, 2, 3}. The number of equivalence relations containing (1, 2) is:", hi: "मान लीजिए A = {1, 2, 3} है। (1, 2) को सम्मिलित करने वाले तुल्यता संबंधों की संख्या है:", oEn: ["1", "2", "3", "4"], oHi: ["1", "2", "3", "4"], c: 1, exp: "Smallest is R₁ = {(1,1),(2,2),(3,3),(1,2),(2,1)}. Largest is A×A." },
            { id: 3, en: "A function f: ℝ → ℝ defined by f(x) = x² is:", hi: "f(x) = x² द्वारा परिभाषित फलन f: ℝ → ℝ है:", oEn: ["One-to-one and onto", "One-to-one but not onto", "Onto but not one-to-one", "Neither one-to-one nor onto"], oHi: ["एकैकी और आच्छादक", "एकैकी लेकिन आच्छादक नहीं", "आच्छादक लेकिन एकैकी नहीं", "न तो एकैकी और न ही आच्छादक"], c: 3, exp: "f(1)=f(-1)=1 (not 1-1). Negative numbers have no pre-image (not onto)." },
            { id: 4, en: "Let f: A → B be a function. If f is surjective (onto), then the range of f is:", hi: "मान लीजिए f: A → B एक फलन है। यदि f आच्छादक (onto) है, तो f का परिसर होगा:", oEn: ["A", "B", "Subset of B", "Empty set"], oHi: ["A", "B", "B का उपसमुच्चय", "रिक्त समुच्चय"], c: 1, exp: "By definition of onto function, Range = Codomain." },
            { id: 5, en: "If f(x) = sin x, then the function f: [0, π] → [-1, 1] is:", hi: "यदि f(x) = sin x है, तो फलन f: [0, π] → [-1, 1] है:", oEn: ["Injective", "Surjective", "Bijective", "None of these"], oHi: ["एकैकी", "आच्छादक", "एकैकी आच्छादक", "इनमें से कोई नहीं"], c: 3, exp: "Not injective because f(π/6)=f(5π/6). Not surjective because negative values in [-1,1] aren't reached in [0,π]." },
            { id: 6, en: "The number of all one-to-one functions from set A = {1, 2, 3} to itself is:", hi: "समुच्चय A = {1, 2, 3} से स्वयं तक के सभी एकैकी फलनों की संख्या है:", oEn: ["3", "6", "9", "27"], oHi: ["3", "6", "9", "27"], c: 1, exp: "Number of 1-1 functions = n! = 3! = 6." },
            { id: 7, en: "Let R be a relation in ℕ defined by R = {(a, b) : a = b - 2, b > 6}. Which of the following belongs to R?", hi: "ℕ में संबंध R = {(a, b) : a = b - 2, b > 6} द्वारा परिभाषित है। निम्न में से कौन सा R से संबंधित है?", oEn: ["(2, 4)", "(3, 8)", "(6, 8)", "(8, 7)"], oHi: ["(2, 4)", "(3, 8)", "(6, 8)", "(8, 7)"], c: 2, exp: "For (6,8), a=6, b=8. b>6 and 6 = 8-2." },
            { id: 8, en: "If a set A has n elements, the number of reflexive relations on A is:", hi: "यदि एक समुच्चय A में n अवयव हैं, तो A पर स्वतुल्य संबंधों की संख्या है:", oEn: ["2ⁿ", "2^(n² - n)", "n²", "2^(n²)"], oHi: ["2ⁿ", "2^(n² - n)", "n²", "2^(n²)"], c: 1, exp: "Diagonal must be present, remaining n²-n arbitrary." },
            { id: 9, en: "Let f: ℝ → ℝ be defined by f(x) = 3x. The function f is:", hi: "f(x) = 3x द्वारा परिभाषित फलन f: ℝ → ℝ है:", oEn: ["One-to-one and onto", "Many-to-one and onto", "One-to-one but not onto", "Neither one-to-one nor onto"], oHi: ["एकैकी और आच्छादक", "बहु-एक और आच्छादक", "एकैकी लेकिन आच्छादक नहीं", "न तो एकैकी और न ही आच्छादक"], c: 0, exp: "Linear functions are bijective in ℝ." },
            { id: 10, en: "A relation R is defined on the set of integers ℤ by xRy if x - y is divisible by n. This relation is:", hi: "पूर्णांकों के समुच्चय ℤ पर एक संबंध R, xRy द्वारा परिभाषित है यदि x - y, n से विभाज्य है। यह संबंध है:", oEn: ["Reflexive and symmetric but not transitive", "Equivalence relation", "Only reflexive", "Not symmetric"], oHi: ["स्वतुल्य और सममित लेकिन संक्रामक नहीं", "तुल्यता संबंध", "केवल स्वतुल्य", "सममित नहीं"], c: 1, exp: "Congruence modulo n is always an equivalence relation." },
            { id: 11, en: "If f: A → B is such that n(A) = 5 and n(B) = 4, then the number of one-to-one functions is:", hi: "यदि f: A → B ऐसा है कि n(A) = 5 और n(B) = 4 है, तो एकैकी फलनों की संख्या होगी:", oEn: ["120", "20", "0", "5⁴"], oHi: ["120", "20", "0", "5⁴"], c: 2, exp: "If n(A) > n(B), no one-to-one function exists." },
            { id: 12, en: "The identity relation on any set A is always:", hi: "किसी भी समुच्चय A पर तत्समक संबंध हमेशा होता है:", oEn: ["Reflexive only", "Symmetric only", "Transitive only", "Equivalence"], oHi: ["केवल स्वतुल्य", "केवल सममित", "केवल संक्रामक", "तुल्यता"], c: 3, exp: "Identity relation is an equivalence relation." },
            { id: 13, en: "If R = {(1, 3), (4, 2), (2, 4), (2, 3), (3, 1)} is a relation on set A = {1, 2, 3, 4}, then R is:", hi: "यदि R समुच्चय A = {1, 2, 3, 4} पर एक संबंध है, तो R है:", oEn: ["Not symmetric", "Transitive", "Reflexive", "None of these"], oHi: ["सममित नहीं", "संक्रामक", "स्वतुल्य", "इनमें से कोई नहीं"], c: 0, exp: "(2,3)∈R but (3,2)∉R." },
            { id: 14, en: "Every constant function f: ℝ → ℝ is:", hi: "प्रत्येक अचर फलन f: ℝ → ℝ होता है:", oEn: ["One-to-one", "Onto", "Many-to-one", "Bijective"], oHi: ["एकैकी", "आच्छादक", "बहु-एक", "एकैकी आच्छादक"], c: 2, exp: "All elements map to a single value." },
            { id: 15, en: "The modulus function f: ℝ → ℝ, f(x) = |x| is:", hi: "मापांक फलन f: ℝ → ℝ, f(x) = |x| है:", oEn: ["1-1", "Onto", "Neither 1-1 nor onto", "Bijective"], oHi: ["एकैकी", "आच्छादक", "न तो एकैकी और न ही आच्छादक", "एकैकी आच्छादक"], c: 2, exp: "f(1)=f(-1) and range is [0,∞)≠ℝ." },
            { id: 16, en: "Total number of functions from set A to B where n(A) = m and n(B) = n is:", hi: "समुच्चय A से B तक फलनों की कुल संख्या, जहाँ n(A) = m और n(B) = n है:", oEn: ["mⁿ", "nᵐ", "mn", "m+n"], oHi: ["mⁿ", "nᵐ", "mn", "m+n"], c: 1, exp: "Each of the m elements can be mapped to any of the n elements." },
            { id: 17, en: "A relation R is symmetric if:", hi: "एक संबंध R सममित होता है यदि:", oEn: ["(a,a)∈R", "(a,b)∈R ⟹ (b,a)∈R", "(a,b)∈R, (b,c)∈R ⟹ (a,c)∈R", "a=b"], oHi: ["(a,a)∈R", "(a,b)∈R ⟹ (b,a)∈R", "(a,b)∈R, (b,c)∈R ⟹ (a,c)∈R", "a=b"], c: 1, exp: "Definition of symmetric relation." },
            { id: 18, en: "Let f: ℕ → ℕ given by f(x) = x+1. Then f is:", hi: "f(x) = x+1 द्वारा दिया गया फलन f: ℕ → ℕ है:", oEn: ["Onto but not 1-1", "1-1 but not onto", "Bijective", "Many-to-one"], oHi: ["आच्छादक लेकिन एकैकी नहीं", "एकैकी लेकिन आच्छादक नहीं", "एकैकी आच्छादक", "बहु-एक"], c: 1, exp: "1∈ℕ has no pre-image (x+1=1 ⟹ x=0∉ℕ)." },
            { id: 19, en: "If R is an equivalence relation on set A, then R⁻¹ is:", hi: "यदि R समुच्चय A पर एक तुल्यता संबंध है, तो R⁻¹ होगा:", oEn: ["Only reflexive", "Only symmetric", "An equivalence relation", "Not a relation"], oHi: ["केवल स्वतुल्य", "केवल सममित", "एक तुल्यता संबंध", "कोई संबंध नहीं"], c: 2, exp: "Inverse of an equivalence relation is also an equivalence relation." },
            { id: 20, en: "The empty relation on a non-empty set A is:", hi: "एक रिक्त समुच्चय नहीं A पर रिक्त संबंध होता है:", oEn: ["Symmetric and Transitive", "Reflexive", "Equivalence", "None of these"], oHi: ["सममित और संक्रामक", "स्वतुल्य", "तुल्यता", "इनमें से कोई नहीं"], c: 0, exp: "Vacuously symmetric and transitive but not reflexive." },
            { id: 21, en: "For a function to have an inverse, it must be:", hi: "एक फलन का प्रतिलोम होने के लिए, उसे होना चाहिए:", oEn: ["Onto", "One-to-one", "Bijective", "Constant"], oHi: ["आच्छादक", "एकैकी", "एकैकी आच्छादक", "अचर"], c: 2, exp: "A function must be bijective to have an inverse." },
            { id: 22, en: "Signum function f: ℝ → ℝ is:", hi: "सिग्नम फलन f: ℝ → ℝ है:", oEn: ["One-to-one", "Onto", "Many-to-one", "Bijective"], oHi: ["एकैकी", "आच्छादक", "बहु-एक", "एकैकी आच्छादक"], c: 2, exp: "All x>0 map to 1." },
            { id: 23, en: "Assertion (A): The relation R = {(1,1),(2,2),(3,3)} on A={1,2,3} is an equivalence relation. Reason (R): R is reflexive, symmetric, and transitive.", hi: "कथन (A): A={1,2,3} पर R={(1,1),(2,2),(3,3)} एक तुल्यता संबंध है। कारण (R): R स्वतुल्य, सममित और संक्रामक है।", oEn: ["Both A and R true, R explains A", "Both true, R does not explain A", "A true, R false", "A false, R true"], oHi: ["दोनों सत्य, R, A की व्याख्या करता है", "दोनों सत्य, R व्याख्या नहीं करता", "A सत्य, R असत्य", "A असत्य, R सत्य"], c: 0, exp: "R is indeed an equivalence relation (identity relation)." },
            { id: 24, en: "Number of onto functions from {1,2,...,n} to {1,2} is:", hi: "{1,2,...,n} से {1,2} तक आच्छादक फलनों की संख्या है:", oEn: ["2ⁿ", "2ⁿ - 2", "2ⁿ⁻¹", "n²"], oHi: ["2ⁿ", "2ⁿ - 2", "2ⁿ⁻¹", "n²"], c: 1, exp: "Total functions minus 2 constant functions." },
            { id: 25, en: "If f(x) = x³, then f: ℝ → ℝ is:", hi: "यदि f(x) = x³ है, तो फलन है:", oEn: ["1-1 and onto", "1-1 but not onto", "Onto but not 1-1", "Neither"], oHi: ["एकैकी और आच्छादक", "एकैकी लेकिन आच्छादक नहीं", "आच्छादक लेकिन एकैकी नहीं", "न तो एकैकी और न ही आच्छादक"], c: 0, exp: "f(x)=x³ is bijective on ℝ." },
            { id: 26, en: "A relation R on A is called universal if:", hi: "A पर एक संबंध R सार्वत्रिक कहलाता है यदि:", oEn: ["R = ∅", "R = A×A", "R = I", "None"], oHi: ["R = ∅", "R = A×A", "R = I", "कोई नहीं"], c: 1, exp: "Universal relation contains all ordered pairs." },
            { id: 27, en: "Let A = {a, b}. Number of binary operations on A is:", hi: "मान लीजिए A = {a, b} है। A पर द्विआधारी संक्रियाओं की संख्या है:", oEn: ["4", "16", "8", "2"], oHi: ["4", "16", "8", "2"], c: 1, exp: "Formula n^(n²) = 2^(4) = 16." },
            { id: 28, en: "The greatest integer function f(x) = [x] is:", hi: "महत्तम पूर्णांक फलन f(x) = [x] है:", oEn: ["One-to-one", "Onto", "Neither 1-1 nor onto", "Continuous"], oHi: ["एकैकी", "आच्छादक", "न तो एकैकी और न ही आच्छादक", "संतत"], c: 2, exp: "Not 1-1 because [1.2]=[1.3]=1, not onto because range is integers." },
            { id: 29, en: "If n(A) = 3, the number of symmetric relations on A is:", hi: "यदि n(A) = 3, तो A पर सममित संबंधों की संख्या है:", oEn: ["2³", "2⁶", "2⁹", "2^(3²)"], oHi: ["2³", "2⁶", "2⁹", "2^(3²)"], c: 1, exp: "Formula 2^(n(n+1)/2) = 2^(3·4/2) = 2⁶ = 64." }
        ];

        const TOTAL = QUESTIONS.length;
        const state = {
            currentIndex: 0,
            answers: {},
            markedQuestions: new Set(),
            timeLeft: 45 * 60,
            timerInterval: null,
            testSubmitted: false,
            darkMode: true,
            lang: 'en',
            score: null
        };

        function toggleTheme() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('light-mode', !state.darkMode);
            document.getElementById('themeIcon').className = state.darkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('math_rel_theme', state.darkMode ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('math_rel_theme');
        if (savedTheme === 'light') { state.darkMode = false; document.body.classList.add('light-mode'); document.getElementById('themeIcon').className = 'fas fa-moon'; }
        else { state.darkMode = true; document.body.classList.remove('light-mode'); document.getElementById('themeIcon').className = 'fas fa-sun'; }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'hi' : 'en';
            const btn = document.getElementById('langBtn');
            document.getElementById('langText').textContent = state.lang === 'hi' ? 'English' : 'हिंदी';
            btn.classList.toggle('active', state.lang === 'hi');
            if (IS_REVIEW_MODE) { renderReviewMode(); } else { renderQuestion(); }
            localStorage.setItem('math_rel_lang', state.lang);
            showToast(state.lang === 'hi' ? '🇮🇳 हिंदी में बदला' : '🇬🇧 Changed to English');
        }

        function calculateScore() {
            let correct = 0, wrong = 0, score = 0;
            Object.keys(state.answers).forEach(idx => {
                const q = QUESTIONS[parseInt(idx)];
                if (q) {
                    if (state.answers[idx] === q.c) { correct++; score += 5; }
                    else { wrong++; score -= 1; }
                }
            });
            const totalMarks = TOTAL * 5;
            const attempted = correct + wrong;
            const unanswered = TOTAL - attempted;
            return { score: Math.max(0, Math.round(score * 100) / 100), total: totalMarks, correct, wrong, attempted, unanswered };
        }

        function renderQuestion() {
            if (IS_REVIEW_MODE) return;
            const q = QUESTIONS[state.currentIndex];
            document.getElementById('qNumber').textContent = `Q ${state.currentIndex + 1}/${TOTAL}`;
            const qt = document.getElementById('questionText');
            if (state.lang === 'hi') {
                qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.hi}</div>`;
            } else {
                qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.en}</div>`;
            }
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const opts = state.lang === 'hi' ? q.oHi : q.oEn;
            const letters = ['A', 'B', 'C', 'D'];
            opts.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                if (state.testSubmitted) {
                    if (i === q.c) card.classList.add('correct');
                    else if (state.answers[state.currentIndex] === i && state.answers[state.currentIndex] !== q.c) card.classList.add('wrong');
                    card.style.pointerEvents = 'none';
                } else {
                    if (state.answers[state.currentIndex] === i) card.classList.add('selected');
                    card.onclick = () => selectOption(i);
                }
                card.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
                grid.appendChild(card);
            });
            const expBox = document.getElementById('explanationBox');
            const expText = document.getElementById('explanationText');
            if (state.testSubmitted) { expBox.classList.add('show'); expText.textContent = q.exp; }
            else { expBox.classList.remove('show'); }
            document.getElementById('prevBtn').disabled = state.currentIndex === 0;
            document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
            document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
            document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';
            renderPalette();
            updateProgress();
        }

        function selectOption(index) { if (state.testSubmitted || IS_REVIEW_MODE) return; state.answers[state.currentIndex] = index; state.markedQuestions.delete(state.currentIndex); renderQuestion(); showToast('✅ Answer saved!'); }
        function navigate(dir) { if (IS_REVIEW_MODE) return; const idx = state.currentIndex + dir; if (idx >= 0 && idx < TOTAL) { state.currentIndex = idx; renderQuestion(); document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' }); } }
        function toggleMark() { if (state.testSubmitted || IS_REVIEW_MODE) return; const idx = state.currentIndex; if (state.markedQuestions.has(idx)) { state.markedQuestions.delete(idx); showToast('🏷️ Unmarked'); } else { state.markedQuestions.add(idx); showToast('🚩 Marked for review'); } renderPalette(); }
        function clearAnswer() { if (state.testSubmitted || IS_REVIEW_MODE) return; if (state.answers[state.currentIndex] !== undefined) { delete state.answers[state.currentIndex]; renderQuestion(); showToast('🧹 Answer cleared'); } }

        function renderPalette() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const num = document.createElement('div');
                num.className = 'palette-num';
                num.textContent = i + 1;
                if (state.testSubmitted) {
                    const q = QUESTIONS[i];
                    if (state.answers[i] === q.c) num.classList.add('answered');
                    else if (state.answers[i] !== undefined && state.answers[i] !== q.c) num.classList.add('wrong-num');
                } else {
                    if (state.answers[i] !== undefined) num.classList.add('answered');
                    if (state.markedQuestions.has(i)) num.classList.add('marked');
                }
                if (i === state.currentIndex) num.classList.add('current');
                num.onclick = () => { if (IS_REVIEW_MODE) return; state.currentIndex = i; renderQuestion(); document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' }); };
                grid.appendChild(num);
            }
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            const percent = (answered / TOTAL) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
        }

        function startTimer() {
            if (IS_REVIEW_MODE) return;
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                if (state.testSubmitted) { clearInterval(state.timerInterval); return; }
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) { clearInterval(state.timerInterval); autoSubmit(); }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            document.getElementById('timerText').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (state.timeLeft < 300 && state.timeLeft > 0) { document.getElementById('timerPill').classList.add('warning'); }
            else { document.getElementById('timerPill').classList.remove('warning'); }
            if (!state.testSubmitted) { document.title = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} - CUET Math Relations & Functions Mock`; }
        }

        function autoSubmit() { showToast('⏰ Time\'s up! Submitting...'); setTimeout(() => submitTest(true), 1500); }

        function submitTest(skipConfirm = false) {
            if (state.testSubmitted) return;
            const answered = Object.keys(state.answers).length;
            const unanswered = TOTAL - answered;
            if (!skipConfirm) {
                let confirmMsg = 'Are you sure you want to submit?';
                if (unanswered > 0) { confirmMsg = `${unanswered} question(s) unanswered. Submit anyway?`; }
                if (!confirm(confirmMsg)) return;
            }
            state.testSubmitted = true;
            clearInterval(state.timerInterval);
            state.score = calculateScore();
            const resultData = {
                score: state.score.score, total: state.score.total,
                accuracy: state.score.attempted > 0 ? Math.round((state.score.correct / state.score.attempted) * 100) : 0,
                correct: state.score.correct, wrong: state.score.wrong,
                attempted: state.score.attempted, unanswered: state.score.unanswered,
                timeTaken: (45 * 60) - state.timeLeft,
                testCode: 'CUET_MATH_REL_MOCK', examType: 'CUET UG Mathematics'
            };
            localStorage.setItem('math_rel_last_answers', JSON.stringify(state.answers));
            localStorage.setItem('math_rel_last_mock_file', window.location.href.split('?')[0]);
            localStorage.setItem('math_rel_last_result_data', JSON.stringify(resultData));
            showReview();
            renderQuestion();
            renderPalette();
            showToast('✅ Test Submitted! Check review below.');
            setTimeout(() => { document.getElementById('reviewPanel').scrollIntoView({ behavior: 'smooth' }); }, 300);
            document.title = 'Submitted - CUET Math Relations & Functions Mock';
            document.getElementById('swipeHint').style.display = 'none';
            document.getElementById('actionRow').style.display = 'none';
            document.getElementById('progressCard').style.display = 'none';
            document.getElementById('paletteCard').style.display = 'none';
        }

        function showReview() {
            const panel = document.getElementById('reviewPanel');
            panel.classList.add('show');
            const result = state.score;
            document.getElementById('resultSummary').innerHTML = `
            <div class="result-item"><div class="value">${result.score}/${result.total}</div><div class="label">Score</div></div>
            <div class="result-item"><div class="value" style="color:#10b981;">${result.correct}</div><div class="label">✅ Correct (+5 each)</div></div>
            <div class="result-item"><div class="value" style="color:#ef4444;">${result.wrong}</div><div class="label">❌ Wrong (-1 each)</div></div>
            <div class="result-item"><div class="value">${result.unanswered}</div><div class="label">⬜ Unanswered</div></div>`;
            const reviewQs = document.getElementById('reviewQuestions');
            reviewQs.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                const div = document.createElement('div');
                div.style.cssText = `padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--option-bg);`;
                let statusIcon = '⬜', statusColor = 'var(--text-secondary)';
                if (!isUnanswered) { statusIcon = isCorrect ? '✅' : '❌'; statusColor = isCorrect ? '#10b981' : '#ef4444'; }
                const opts = state.lang === 'hi' ? q.oHi : q.oEn;
                const userAnsText = isUnanswered ? 'Not answered' : opts[userAns];
                const correctAnsText = opts[q.c];
                const qDisplay = state.lang === 'hi' ? q.hi : q.en;
                div.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-weight:700;">Q${i+1}.</span><span style="color:${statusColor};font-size:18px;">${statusIcon}</span></div>
                <div style="font-size:13px;margin-bottom:4px;white-space:pre-line;">${qDisplay}</div>
                <div style="font-size:11px;color:var(--text-secondary);">Your answer: <strong>${userAnsText}</strong><br>Correct answer: <strong style="color:#10b981;">${correctAnsText}</strong></div>
                <div style="font-size:11px;margin-top:4px;padding:8px;background:rgba(245,158,11,0.1);border-radius:6px;color:#fbbf24;">💡 ${q.exp}</div>
                <button onclick="jumpToQuestion(${i})" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid #3b82f6;background:transparent;color:#60a5fa;cursor:pointer;font-size:11px;">Jump to Q${i+1}</button>`;
                reviewQs.appendChild(div);
            });
        }

        function jumpToQuestion(index) {
            state.currentIndex = index;
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('paletteCard').style.display = 'block';
            document.getElementById('swipeHint').style.display = 'block';
            document.getElementById('actionRow').style.display = 'flex';
            renderQuestion();
            document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
        }

        function closeReview() { document.getElementById('reviewPanel').classList.remove('show'); }

        function renderReviewMode() {
            const container = document.getElementById('reviewModeContainer');
            const letters = ['A', 'B', 'C', 'D'];
            const optsKey = state.lang === 'hi' ? 'oHi' : 'oEn';
            let html = '<div class="review-mode-badge">📝 Review Mode — All 30 Questions</div>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let cardClass = 'review-mode-card';
                let statusHTML = '<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>';
                if (!isUnanswered) {
                    cardClass += isCorrect ? ' correct-answer' : ' wrong-answer';
                    statusHTML = isCorrect ? '<span class="review-mode-status status-correct">✅ Correct (+5)</span>' : '<span class="review-mode-status status-wrong">❌ Wrong (-1)</span>';
                }
                const opts = q[optsKey];
                const qDisplay = state.lang === 'hi' ? q.hi : q.en;
                const optionsHTML = opts.map((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = '';
                    if (j === q.c) label = ' ✅';
                    if (j === userAns && !isCorrect) label = ' ❌ (Your answer)';
                    if (j === userAns && isCorrect) label = ' ✅ (Your answer)';
                    return `<div class="${optClass}" style="pointer-events:none;"><div class="option-letter">${letters[j]}</div><span>${opt}${label}</span></div>`;
                }).join('');
                html += `
                <div class="${cardClass}">
                    <div class="review-mode-header"><span class="q-badge">Q ${i+1}/${TOTAL}</span>${statusHTML}</div>
                    <div class="question-text"><div style="font-weight:600;white-space:pre-line;">${qDisplay}</div></div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div class="explanation-box show" style="margin-top:10px;"><div class="exp-title">💡 Explanation</div><div>${q.exp}</div></div>
                </div>`;
            });
            container.innerHTML = html;
            container.style.display = 'block';
        }

        let touchStartX = 0, touchStartY = 0, touchMoved = false, swipeHandled = false;
        const card = document.getElementById('questionCard');
        card.addEventListener('touchstart', (e) => { if (IS_REVIEW_MODE) return; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchMoved = false; swipeHandled = false; }, { passive: true });
        card.addEventListener('touchmove', (e) => { if (IS_REVIEW_MODE || swipeHandled) return; const dx = e.touches[0].clientX - touchStartX; const dy = e.touches[0].clientY - touchStartY; if (Math.abs(dx) > 15 && Math.abs(dx) > Math.abs(dy)) { touchMoved = true; card.style.transform = `translateX(${dx * 0.5}px)`; card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 800); card.classList.add('swiping'); e.preventDefault(); } }, { passive: false });
        card.addEventListener('touchend', (e) => { if (IS_REVIEW_MODE) return; card.classList.remove('swiping'); card.style.transform = ''; card.style.opacity = ''; if (!touchMoved) return; const endX = e.changedTouches[0]?.clientX || touchStartX; const dx = endX - touchStartX; if (Math.abs(dx) > 80) { swipeHandled = true; if (dx > 0) navigate(-1); else navigate(1); } touchMoved = false; });

        document.addEventListener('keydown', (e) => {
            if (IS_REVIEW_MODE) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case 'arrowleft': e.preventDefault(); navigate(-1); break;
                case 'arrowright': e.preventDefault(); navigate(1); break;
                case 'a': case '1': e.preventDefault(); selectOption(0); break;
                case 'b': case '2': e.preventDefault(); selectOption(1); break;
                case 'c': case '3': e.preventDefault(); selectOption(2); break;
                case 'd': case '4': e.preventDefault(); selectOption(3); break;
                case 'm': e.preventDefault(); toggleMark(); break;
                case 'backspace': e.preventDefault(); clearAnswer(); break;
            }
        });

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'flex'; clearTimeout(t._t); t._t = setTimeout(() => { t.style.display = 'none'; }, 2000); }

        window.addEventListener('beforeunload', (e) => { if (!state.testSubmitted && state.timeLeft > 0 && Object.keys(state.answers).length > 0 && !IS_REVIEW_MODE) { e.preventDefault(); e.returnValue = ''; } });

        function init() {
            localStorage.setItem('math_rel_last_mock_file', window.location.href.split('?')[0]);
            if (IS_REVIEW_MODE) {
                document.getElementById('questionCard').style.display = 'none';
                document.getElementById('progressCard').style.display = 'none';
                document.getElementById('paletteCard').style.display = 'none';
                document.getElementById('swipeHint').style.display = 'none';
                document.getElementById('infoRow').style.display = 'none';
                document.getElementById('timerPill').style.display = 'none';
                document.getElementById('actionRow').style.display = 'none';
                document.getElementById('reviewPanel').style.display = 'none';
                document.title = 'Review - CUET Math Relations & Functions Mock';
                const savedAnswers = JSON.parse(localStorage.getItem('math_rel_last_answers') || '{}');
                state.answers = savedAnswers;
                state.testSubmitted = true;
                state.lang = localStorage.getItem('math_rel_lang') || 'en';
                if (state.lang === 'hi') { document.getElementById('langBtn').classList.add('active'); document.getElementById('langText').textContent = 'English'; }
                renderReviewMode();
            } else {
                state.lang = localStorage.getItem('math_rel_lang') || 'en';
                if (state.lang === 'hi') { document.getElementById('langBtn').classList.add('active'); document.getElementById('langText').textContent = 'English'; }
                startTimer();
                renderQuestion();
                renderPalette();
            }
        }
        init();
    </script>
</body>
</html>
