<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUET English Language Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-glow: #8b5cf6;
            --accent: #ec4899;
            --accent-glow: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #94a3b8;
            --light: #f1f5f9;
            --bg: #0f172a;
            --bg2: #1e1b4b;
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --option-bg: rgba(255, 255, 255, 0.04);
            --hover-bg: rgba(139, 92, 246, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --glow-sm: 0 0 12px rgba(139, 92, 246, 0.25);
            --glow-md: 0 0 20px rgba(139, 92, 246, 0.35);
            --glow-lg: 0 0 30px rgba(236, 72, 153, 0.3);
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg2: #ede9fe;
            --card: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --hover-bg: #f3f0ff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --glow-sm: 0 0 12px rgba(139, 92, 246, 0.15);
            --glow-md: 0 0 20px rgba(139, 92, 246, 0.2);
            --glow-lg: 0 0 30px rgba(236, 72, 153, 0.15);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #2e1065 40%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.6s ease-in-out;
            transition: background 0.5s ease, color 0.3s;
            z-index: 0;
            position: relative;
            overflow-x: hidden;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc 0%, #ede9fe 40%, #fdf2f8 100%);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mock-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 20s ease-in-out infinite;
            opacity: 0.5;
        }
        .blob-1 {
            width: 350px;
            height: 350px;
            background: rgba(139, 92, 246, 0.2);
            top: -100px;
            right: -80px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 280px;
            height: 280px;
            background: rgba(236, 72, 153, 0.18);
            bottom: -80px;
            left: -60px;
            animation-delay: -7s;
        }
        .blob-3 {
            width: 220px;
            height: 220px;
            background: rgba(168, 85, 247, 0.16);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }
        @keyframes blobFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(40px, -50px) scale(1.1);
            }
            50% {
                transform: translate(-30px, -20px) scale(0.9);
            }
            75% {
                transform: translate(20px, 40px) scale(1.05);
            }
        }
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.06));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.12);
            animation: floatUp linear infinite;
        }
        body.light-mode .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.04));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.08);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0.5;
            }
            25% {
                transform: translateY(-250px) translateX(30px) scale(0.8);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-500px) translateX(-20px) scale(1);
                opacity: 0.6;
            }
            75% {
                transform: translateY(-750px) translateX(15px) scale(0.9);
                opacity: 0.35;
            }
            100% {
                transform: translateY(-1000px) translateX(-10px) scale(0.3);
                opacity: 0;
            }
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        .top-bar:hover {
            box-shadow: var(--glow-sm);
        }
        .test-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }
        .test-title .icon-dna {
            font-size: 20px;
            animation: pulseIcon 2s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.75;
            }
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1.5px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-sm);
            transform: translateY(-1px);
        }
        .theme-toggle:active {
            transform: scale(0.92);
        }
        .timer-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .timer-pill.warning {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            animation: pulse 0.8s infinite;
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.3);
        }
        body.light-mode .timer-pill.warning {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }
        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        .info-chip i {
            font-size: 11px;
        }
        .info-chip.exam {
            color: #a78bfa;
        }
        .info-chip.subject {
            color: #ec4899;
        }
        .info-chip.marks {
            color: #fbbf24;
        }
        body.light-mode .info-chip.exam {
            color: #7c3aed;
        }
        body.light-mode .info-chip.subject {
            color: #be185d;
        }
        body.light-mode .info-chip.marks {
            color: #d97706;
        }
        .progress-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .progress-card:hover {
            box-shadow: var(--glow-sm);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            animation: slideIn 0.35s ease;
            transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
        }
        .question-card:hover {
            box-shadow: var(--glow-md);
            transform: translateY(-2px);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .question-card.swiping {
            transition: none;
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .q-badge {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.35);
        }
        .q-marks {
            font-weight: 600;
            font-size: 12px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }
        body.light-mode .q-marks {
            color: #d97706;
            background: #fffbeb;
            border-color: #fde68a;
        }
        .question-text {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.7;
            color: var(--text);
            background: var(--option-bg);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #8b5cf6;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--option-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            backdrop-filter: blur(4px);
        }
        .option-card:hover {
            border-color: #a78bfa;
            background: var(--hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.2);
        }
        .option-card.selected {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 0 6px 22px rgba(139, 92, 246, 0.4);
        }
        .option-card.correct {
            background: #10b981 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4) !important;
        }
        .option-card.wrong {
            background: #ef4444 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4) !important;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-4px);
            }
            75% {
                transform: translateX(4px);
            }
        }
        .option-letter {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-weight: 800;
            font-size: 13px;
            color: #a78bfa;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        .option-card.selected .option-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .option-card.correct .option-letter,
        .option-card.wrong .option-letter {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            color: var(--text);
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .btn:hover {
            box-shadow: var(--glow-sm);
            transform: translateY(-2px);
            border-color: #a78bfa;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-mark {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }
        .btn-mark:hover {
            box-shadow: 0 0 14px rgba(245, 158, 11, 0.3);
        }
        .btn-clear {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.25);
            color: #4ade80;
        }
        .btn-clear:hover {
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.3);
        }
        body.light-mode .btn-mark {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        body.light-mode .btn-clear {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }
        .palette-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            margin-top: 12px;
            transition: all 0.3s ease;
        }
        .palette-card:hover {
            box-shadow: var(--glow-sm);
        }
        .palette-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 7px;
            margin-bottom: 12px;
        }
        .palette-num {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--option-bg);
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            color: var(--text);
        }
        .palette-num:hover {
            background: var(--hover-bg);
            transform: scale(1.1);
            box-shadow: var(--glow-sm);
        }
        .palette-num.answered {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .palette-num.marked {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .palette-num.current {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.2);
            transform: scale(1.08);
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.4);
        }
        .palette-num.wrong-num {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 10px;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
        }
        .review-panel {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }
        .review-panel.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        .result-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .result-item {
            background: var(--option-bg);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .result-item:hover {
            box-shadow: var(--glow-sm);
        }
        .result-item .value {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-item .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .explanation-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            display: none;
            transition: all 0.3s ease;
        }
        body.light-mode .explanation-box {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        .explanation-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .explanation-box .exp-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
            color: #fbbf24;
        }
        body.light-mode .explanation-box .exp-title {
            color: #92400e;
        }
        .swipe-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
        .review-mode-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .review-mode-card:hover {
            box-shadow: var(--glow-sm);
            transform: translateY(-1px);
        }
        .review-mode-card.correct-answer {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .review-mode-card.wrong-answer {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .review-mode-card.unanswered-q {
            background: var(--glass-bg);
            border-color: var(--glass-border);
        }
        .review-mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .review-mode-status {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 15px;
        }
        .status-correct {
            background: rgba(16, 185, 129, 0.2);
            color: #4ade80;

                    bubble.style.left = Math.random() * 100 + '%';

                    bubble.style.animationDelay = '0s';
                    bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(bubble);

                bubbles.forEach(b => {

        const QUESTIONS = [
            { id: 0, en: "According to the passage (AI in Education), what is the primary benefit of AI in classrooms?", oEn: ["Replacing teachers", "Personalized learning paths", "Reducing school hours", "Increasing exam difficulty"],

                exp: "Abandon means to forsake or leave behind completely.", text: "Synonyms" }, { id: 3, en: "Choose the SYNONYM for 'METICULOUS':", oEn: ["Careless", "Detailed / Thorough", "Lazy", "Hasty"], c: 1,

                exp: "Fragile means easily broken; its opposite is robust or strong.", text: "Antonyms" }, { id: 5, en: "Choose the ANTONYM for 'OPTIMISTIC':", oEn: ["Hopeful", "Cheerful", "Pessimistic", "Radiant"], c: 2,
                exp: "Optimistic means hopeful; its opposite is pessimistic.", text: "Antonyms" }, { id: 6, en: "To 'Break the ice' means:", oEn: ["To start a fight", "To start a conversation", "To end a friendship",

                ], c: 1, exp: "Break the ice means to initiate conversation in a social setting.", text: "Idioms & Phrases" }, { id: 7, en: "'A piece of cake' means:", oEn: ["Something very difficult", "A sweet dish",

                ], c: 2, exp: "A piece of cake refers to something very easy to do.", text: "Idioms & Phrases" }, { id: 8, en: "'Under the weather' means:", oEn: ["To be caught in rain", "To feel unwell / sick",

                ], c: 1, exp: "Under the weather means feeling ill or unwell.", text: "Idioms & Phrases" }, { id: 9, en: "Identify the error: She (A) has (B) went to (C) the market (D) yesterday.", oEn: [
                    "She", "has went", "the market", "yesterday"
                ], c: 1, exp: "Error is 'has went'. Correct form: 'went' or 'has gone'.", text: "Error Spotting" }, { id: 10, en: "Choose the correct preposition: He is senior _____ me in office.", oEn: [
                    "than", "to", "from", "with"
                ], c: 1, exp: "Senior takes preposition 'to', not 'than'.", text: "Prepositions" }, { id: 11, en: "Fill in the blank: Neither the students nor the teacher _____ present.", oEn: ["were", "was",

            text: "Subject-Verb Agreement" }, { id: 12, en: "Choose the correct article: He is _____ honest man.", oEn: ["a", "an", "the", "No article"], c: 1,
                exp: "Honest begins with a vowel sound, so 'an' is used.", text: "Articles" }, { id: 13, en: "A person who hates mankind is a:", oEn: ["Philanthropist", "Misanthrope", "Optimist", "Polyglot"], c: 1,
                exp: "Misanthrope = one who hates mankind.", text: "One Word Substitution" }, { id: 14, en: "A place where birds are kept is an:", oEn: ["Apiary", "Aviary", "Zoo", "Aquarium"], c: 1,
                exp: "Aviary is a place for keeping birds.", text: "One Word Substitution" }, { id: 15, en: "Something that cannot be heard is:", oEn: ["Inaudible", "Invisible", "Illegible", "Inevitable"], c: 0,
                exp: "Inaudible = cannot be heard.", text: "One Word Substitution" }, { id: 16, en: "Rearrange (P, Q, R, S): P: is a great virtue Q: and we should R: honesty S: always practice it", oEn: ["PRQS",

            text: "Sentence Rearrangement" }, { id: 17, en: "Change to Passive: Rahul is flying a kite.", oEn: ["A kite is being flown by Rahul.", "A kite was flown by Rahul.",
                    "A kite is flown by Rahul.", "Rahul flies a kite."

                    "Questioner"
                ], c: 0, exp: "Correct spelling: Q-U-E-S-T-I-O-N-N-A-I-R-E.", text: "Spelling" }, { id: 22, en: "Fill in: I ____ my homework yet.", oEn: ["have not finished", "did not finish", "am not finishing",
                    "do not finish"
                ], c: 0, exp: "With 'yet', use present perfect: have not finished.", text: "Fill in the Blanks" }, { id: 23, en: "\"Kick the bucket\" is an idiom for:", oEn: ["To start a race", "To die",
                    "To get angry", "To clean the house"
                ], c: 1, exp: "Kick the bucket is a colloquial expression meaning to die.", text: "Idioms & Phrases" }, { id: 24, en: "A person who knows many languages is a:", oEn: ["Linguist", "Polyglot",
                    "Translator", "Phonetician"
                ], c: 1, exp: "Polyglot = one who knows many languages.", text: "One Word Substitution" }, { id: 25, en: "The meeting was ________ due to bad weather. (Phrasal Verb)", oEn: ["Put off", "Put out",
                    "Put up", "Put away"
                ], c: 0, exp: "Put off = postponed.", text: "Phrasal Verbs" }, { id: 26, en: "You must ________ your bad habits if you want to succeed. (Phrasal Verb)", oEn: ["Give in", "Give up", "Give away",
                    "Give out"
                ], c: 1, exp: "Give up = quit or abandon.", text: "Phrasal Verbs" }, { id: 27, en: "Our car ________ in the middle of the highway. (Phrasal Verb)", oEn: ["Broke down", "Broke up", "Broke into",
                    "Broke out"
                ], c: 0, exp: "Broke down = stopped functioning.", text: "Phrasal Verbs" }, { id: 28, en: "\"The stars danced playfully in the moonlit sky\" is an example of:", oEn: ["Simile", "Metaphor",
                    "Personification", "Hyperbole"
                ], c: 2, exp: "Personification: giving human qualities (danced) to non-human things (stars).",
            text: "Figures of Speech" }, { id: 29, en: "\"He is as brave as a lion\" is a:", oEn: ["Metaphor", "Simile", "Oxymoron", "Alliteration"], c: 1,
                exp: "Simile: comparison using 'as...as'.", text: "Figures of Speech" }, { id: 30, en: "\"Cruel kindness\" is an example of:", oEn: ["Pun", "Oxymoron", "Personification", "Metaphor"], c: 1,
                exp: "Oxymoron: two contradictory terms placed together.", text: "Figures of Speech" }, { id: 31, en: "In the sentence \"He runs fast\", what part of speech is 'fast'?", oEn: ["Noun", "Adjective",
                    "Adverb", "Pronoun"
                ], c: 2, exp: "Fast modifies the verb 'runs', so it is an adverb.", text: "Parts of Speech" }, { id: 32, en: "Which of these is a 'Collective Noun'?", oEn: ["Happiness", "Fleet", "Running",
                    "Beautiful"
                ], c: 1, exp: "Fleet is a collective noun (a group of ships).", text: "Parts of Speech" }, { id: 33, en: "A person who is indifferent to pleasure or pain is a:", oEn: ["Stoic", "Sadist", "Egoist",
                    "Altruist"
                ], c: 0, exp: "Stoic = one indifferent to pleasure or pain.", text: "One Word Substitution" }, { id: 34, en: "\"To cry wolf\" means:", oEn: ["To be very hungry", "To give a false alarm",
                    "To hunt animals", "To scream in fear"
                ], c: 1, exp: "To cry wolf = to raise a false alarm.", text: "Idioms & Phrases" }, { id: 35, en: "The scientific study of plants is called:", oEn: ["Zoology", "Biology", "Botany", "Geology"], c: 2,
                exp: "Botany is the scientific study of plants.", text: "General Knowledge" }, { id: 36, en: "I have been living here ________ 2010.", oEn: ["For", "Since", "From", "By"], c: 1,
                exp: "Since is used with a specific point in time (2010).", text: "Prepositions" }, { id: 37, en: "If I ________ a bird, I would fly to you.", oEn: ["am", "was", "were", "have been"], c: 2,
                exp: "Subjunctive mood: 'were' is used for hypothetical conditions.", text: "Conditional Sentences" }, { id: 38, en: "Bread and butter ________ my favourite breakfast.", oEn: ["is", "are", "were",
                    "am"
                ], c: 0, exp: "Bread and butter is considered a single unit → singular verb 'is'.",
            text: "Subject-Verb Agreement" }, { id: 39, en: "Library : Books :: Museum : ?", oEn: ["Statues", "Artifacts", "Flowers", "Clothes"], c: 1,
                exp: "A library houses books; a museum houses artifacts.", text: "Analogies" }, { id: 40, en: "Doctor : Patient :: Lawyer : ?", oEn: ["Customer", "Client", "Shopkeeper", "Teacher"], c: 1,

                ], c: 1, exp: "Nelson Mandela's quote: Education is the most powerful weapon.", text: "Cloze Test" }, { id: 42, en: "Hard work is the ________ to success.", oEn: ["Key", "Lock", "Door", "Way"],
                c: 0, exp: "Key to success is a common collocation.", text: "Cloze Test" }, { id: 43, en: "Which word means \"a piece of advice\"?", oEn: ["Council", "Counsel", "Console", "Cancel"], c: 1,
                exp: "Counsel = advice or guidance.", text: "Homophones" }, { id: 44, en: "The ________ of the school is very strict.", oEn: ["Principle", "Principal", "Prince", "Princi-pal"], c: 1,
                exp: "Principal = head of a school. Principle = fundamental rule.", text: "Confusing Words" }, { id: 45, en: "He is more taller than his brother. (Improve the bold part)", oEn: ["Taller",

                ], c: 0, exp: "With 'yet', use present perfect: haven't seen.", text: "Sentence Improvement" }, { id: 47, en: "What is the synonym of 'Candid'?", oEn: ["Secretive", "Frank", "Dishonest", "Shy"],
                c: 1, exp: "Candid = frank, straightforward, honest.", text: "Synonyms" }, { id: 48, en: "A person who collects stamps is a:", oEn: ["Numismatist", "Philatelist", "Optimist", "Artist"], c: 1,
                exp: "Philatelist = stamp collector.", text: "One Word Substitution" }, { id: 49, en: "\"Look before you leap\" means:", oEn: ["Run fast", "Think before you act", "Close your eyes", "Jump high"],
                c: 1, exp: "This proverb advises caution and forethought before taking action.", text: "Proverbs" }
        ];

        const TOTAL = QUESTIONS.length;
        const urlParams = new URLSearchParams(window.location.search);
        const IS_REVIEW_MODE = urlParams.get('review') === 'true';

        const state = {
            currentIndex: 0,
            answers: {},
            markedQuestions: new Set(),
            timeLeft: 50 * 60,
            timerInterval: null,
            testSubmitted: false,
            darkMode: true,
            score: null
        };

        function toggleTheme() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('light-mode', !state.darkMode);
            document.getElementById('themeIcon').className = state.darkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('eng_mock_theme', state.darkMode ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('eng_mock_theme');
        if (savedTheme === 'light') {
            state.darkMode = false;
            document.body.classList.add('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        } else {
            state.darkMode = true;
            document.body.classList.remove('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-sun';
        }

        function calculateScore() {
            let correct = 0,
                wrong = 0,
                score = 0;
            Object.keys(state.answers).forEach(idx => {
                const q = QUESTIONS[parseInt(idx)];
                if (q) {
                    if (state.answers[idx] === q.c) { correct++;
                        score += 5; } else { wrong++;
                        score -= 1; }
                }
            });
            const totalMarks = TOTAL * 5;
            const attempted = correct + wrong;
            const unanswered = TOTAL - attempted;
            return { score: Math.max(0, Math.round(score * 100) / 100), total: totalMarks, correct, wrong,
                attempted, unanswered };
        }

        function renderQuestion() {
            if (IS_REVIEW_MODE) return;
            const q = QUESTIONS[state.currentIndex];
            document.getElementById('qNumber').textContent = `Q ${state.currentIndex + 1}/${TOTAL}`;
            const qt = document.getElementById('questionText');
            qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.en}</div>`;
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];
            q.oEn.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                if (state.testSubmitted) {
                    if (i === q.c) card.classList.add('correct');
                    else if (state.answers[state.currentIndex] === i && state.answers[state
                            .currentIndex] !== q.c) card.classList.add('wrong');
                    card.style.pointerEvents = 'none';
                } else {
                    if (state.answers[state.currentIndex] === i) card.classList.add('selected');
                    card.onclick = () => selectOption(i);
                }
                card.innerHTML =
                    `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
                grid.appendChild(card);
            });
            const expBox = document.getElementById('explanationBox');
            const expText = document.getElementById('explanationText');
            if (state.testSubmitted) { expBox.classList.add('show');
                expText.textContent = q.exp; } else { expBox.classList.remove('show'); }
            document.getElementById('prevBtn').disabled = state.currentIndex === 0;
            document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
            document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
            document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';
            renderPalette();
            updateProgress();
        }

        function selectOption(index) {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            state.answers[state.currentIndex] = index;
            state.markedQuestions.delete(state.currentIndex);
            renderQuestion();
            showToast('✅ Answer saved!');
        }

        function navigate(dir) {
            if (IS_REVIEW_MODE) return;
            const idx = state.currentIndex + dir;
            if (idx >= 0 && idx < TOTAL) {
                state.currentIndex = idx;
                renderQuestion();
                document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function toggleMark() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            const idx = state.currentIndex;
            if (state.markedQuestions.has(idx)) { state.markedQuestions.delete(idx);
                showToast('🏷️ Unmarked'); } else { state.markedQuestions.add(idx);
                showToast('🚩 Marked for review'); }
            renderPalette();
        }

        function clearAnswer() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            if (state.answers[state.currentIndex] !== undefined) { delete state.answers[state.currentIndex];
                renderQuestion();
                showToast('🧹 Answer cleared'); }
        }

        function renderPalette() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const num = document.createElement('div');
                num.className = 'palette-num';
                num.textContent = i + 1;
                if (state.testSubmitted) {
                    const q = QUESTIONS[i];
                    if (state.answers[i] === q.c) num.classList.add('answered');
                    else if (state.answers[i] !== undefined && state.answers[i] !== q.c) num.classList.add(
                        'wrong-num');
                } else {
                    if (state.answers[i] !== undefined) num.classList.add('answered');
                    if (state.markedQuestions.has(i)) num.classList.add('marked');
                }
                if (i === state.currentIndex) num.classList.add('current');
                num.onclick = () => {
                    if (IS_REVIEW_MODE) return;
                    state.currentIndex = i;
                    renderQuestion();
                    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth',
                        block: 'start' });
                };
                grid.appendChild(num);
            }
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            const percent = (answered / TOTAL) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
        }

        function startTimer() {
            if (IS_REVIEW_MODE) return;
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                if (state.testSubmitted) { clearInterval(state.timerInterval); return; }
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) { clearInterval(state.timerInterval);
                    autoSubmit(); }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            document.getElementById('timerText').textContent =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (state.timeLeft < 600 && state.timeLeft > 0) { document.getElementById('timerPill').classList.add(
                    'warning'); } else { document.getElementById('timerPill').classList.remove('warning'); }
            if (!state.testSubmitted) { document.title =
                    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} - CUET English Mock`; }
        }

        function autoSubmit() { showToast('⏰ Time\'s up! Submitting...');
            setTimeout(() => submitTest(true), 1500); }

        function submitTest(skipConfirm = false) {
            if (state.testSubmitted) return;
            const answered = Object.keys(state.answers).length;
            const unanswered = TOTAL - answered;
            if (!skipConfirm) {
                let confirmMsg = 'Are you sure you want to submit?';
                if (unanswered > 0) { confirmMsg =
                    `${unanswered} question(s) unanswered. Submit anyway?`; }
                if (!confirm(confirmMsg)) return;
            }
            state.testSubmitted = true;
            clearInterval(state.timerInterval);
            state.score = calculateScore();
            const resultData = { score: state.score.score, total: state.score.total, accuracy: state.score
                    .attempted > 0 ? Math.round((state.score.correct / state.score.attempted) * 100) : 0,
                correct: state.score.correct, wrong: state.score.wrong, attempted: state.score.attempted,
                unanswered: state.score.unanswered, timeTaken: (50 * 60) - state.timeLeft,
                testCode: 'CUET_ENGLISH_MOCK', examType: 'CUET UG English Language' };
            localStorage.setItem('eng_mock_last_answers', JSON.stringify(state.answers));
            localStorage.setItem('eng_mock_last_result', JSON.stringify(resultData));
            if (window.parent !== window) { window.parent.postMessage({ type: 'TEST_SUBMITTED',
                ...resultData, answers: state.answers }, '*'); }
            showReview();
            renderQuestion();
            renderPalette();
            showToast('✅ Test Submitted! Check review below.');
            setTimeout(() => { document.getElementById('reviewPanel').scrollIntoView({ behavior: 'smooth' }); },
                300);
            document.title = 'Submitted - CUET English Mock';
            document.getElementById('swipeHint').style.display = 'none';
            document.getElementById('actionRow').style.display = 'none';
            document.getElementById('progressCard').style.display = 'none';
            document.getElementById('paletteCard').style.display = 'none';
        }

        function showReview() {
            const panel = document.getElementById('reviewPanel');
            panel.classList.add('show');
            const result = state.score;
            document.getElementById('resultSummary').innerHTML = `
            <div class="result-item"><div class="value">${result.score}/${result.total}</div><div class="label">Score</div></div>
            <div class="result-item"><div class="value" style="color:#10b981;">${result.correct}</div><div class="label">✅ Correct (+5 each)</div></div>
            <div class="result-item"><div class="value" style="color:#ef4444;">${result.wrong}</div><div class="label">❌ Wrong (-1 each)</div></div>
            <div class="result-item"><div class="value">${result.unanswered}</div><div class="label">⬜ Unanswered</div></div>`;
            const reviewQs = document.getElementById('reviewQuestions');
            reviewQs.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
            const letters = ['A', 'B', 'C', 'D'];
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let statusIcon, statusColor;
                if (isUnanswered) { statusIcon = '⬜';
                    statusColor = 'var(--text-secondary)'; } else if (isCorrect) { statusIcon = '✅';
                    statusColor = '#10b981'; } else { statusIcon = '❌';
                    statusColor = '#ef4444'; }
                let optionsHTML = '<div class="options-grid" style="margin:8px 0;">';
                q.oEn.forEach((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = '';
                    if (j === q.c && j !== userAns) label = ' ✅';
                    if (j === userAns && !isCorrect) label = ' ❌ (Your answer)';
                    if (j === userAns && isCorrect) label = ' ✅ (Your answer)';
                    optionsHTML +=
                        `<div class="${optClass}" style="pointer-events:none;font-size:12px;padding:10px 12px;"><div class="option-letter">${letters[j]}</div><span>${opt}${label}</span></div>`;
                });
                optionsHTML += '</div>';
                const div = document.createElement('div');
                div.style.cssText =
                    'padding:12px;margin:8px 0;border-radius:10px;border:1px solid var(--border);background:var(--option-bg);';
                div.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-weight:700;">Q${i+1}.</span><span style="color:${statusColor};font-size:18px;">${statusIcon}</span></div>
                <div style="font-size:13px;margin-bottom:4px;white-space:pre-line;">${q.en}</div>
                ${optionsHTML}
                <div style="font-size:11px;margin-top:4px;padding:8px;background:rgba(245,158,11,0.1);border-radius:6px;color:#fbbf24;">💡 ${q.exp}</div>
                <button onclick="jumpToQuestion(${i})" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid #8b5cf6;background:transparent;color:#a78bfa;cursor:pointer;font-size:11px;">Jump to Q${i+1}</button>`;
                reviewQs.appendChild(div);
            });
        }

        function jumpToQuestion(index) {
            state.currentIndex = index;
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('paletteCard').style.display = 'block';
            document.getElementById('swipeHint').style.display = 'block';
            document.getElementById('actionRow').style.display = 'flex';
            renderQuestion();
            document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
        }

        function closeReview() { document.getElementById('reviewPanel').classList.remove('show'); }

        function renderReviewMode() {
            const container = document.getElementById('reviewModeContainer');
            const letters = ['A', 'B', 'C', 'D'];
            let html = '<div class="review-mode-badge">📝 Review Mode — All 50 Questions</div>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let cardClass = 'review-mode-card';
                let statusHTML = '';
                if (isUnanswered) { cardClass += ' unanswered-q';
                    statusHTML =
                    '<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>'; } else if (
                    isCorrect) { cardClass += ' correct-answer';
                    statusHTML =
                    '<span class="review-mode-status status-correct">✅ Correct (+5)</span>'; } else { cardClass +=
                        ' wrong-answer';
                    statusHTML = '<span class="review-mode-status status-wrong">❌ Wrong (-1)</span>'; }
                const optionsHTML = q.oEn.map((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = '';
                    if (j === q.c && j !== userAns) label = ' ✅';
                    if (j === userAns && !isCorrect) label = ' ❌ (Your answer)';
                    if (j === userAns && isCorrect) label = ' ✅ (Your answer)';
                    return `<div class="${optClass}" style="pointer-events:none;"><div class="option-letter">${letters[j]}</div><span>${opt}${label}</span></div>`;
                }).join('');
                html += `
                <div class="${cardClass}">
                    <div class="review-mode-header"><span class="q-badge">Q ${i+1}/${TOTAL}</span>${statusHTML}</div>
                    <div class="question-text"><div style="font-weight:600;white-space:pre-line;">${q.en}</div></div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div class="explanation-box show" style="margin-top:10px;"><div class="exp-title">💡 Explanation</div><div>${q.exp}</div></div>
                </div>`;
            });
            container.innerHTML = html;
            container.style.display = 'block';
        }

        let touchStartX = 0,
            touchStartY = 0,
            touchMoved = false,
            swipeHandled = false;
        const card = document.getElementById('questionCard');
        card.addEventListener('touchstart', (e) => {
            if (IS_REVIEW_MODE) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchMoved = false;
            swipeHandled = false;
        }, { passive: true });
        card.addEventListener('touchmove', (e) => {
            if (IS_REVIEW_MODE || swipeHandled) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 15 && Math.abs(dx) > Math.abs(dy)) {
                touchMoved = true;
                card.style.transform = `translateX(${dx * 0.5}px)`;
                card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 800);
                card.classList.add('swiping');
                e.preventDefault();
            }
        }, { passive: false });
        card.addEventListener('touchend', (e) => {
            if (IS_REVIEW_MODE) return;
            card.classList.remove('swiping');
            card.style.transform = '';
            card.style.opacity = '';
            if (!touchMoved) return;
            const endX = e.changedTouches[0]?.clientX || touchStartX;
            const dx = endX - touchStartX;
            if (Math.abs(dx) > 80) { swipeHandled = true; if (dx > 0) navigate(-1);
            else navigate(1); }
            touchMoved = false;
        });

        document.addEventListener('keydown', (e) => {
            if (IS_REVIEW_MODE) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case 'arrowleft':
                    e.preventDefault();
                    navigate(-1);
                    break;
                case 'arrowright':
                    e.preventDefault();
                    navigate(1);
                    break;
                case 'a':
                case '1':
                    e.preventDefault();
                    selectOption(0);
                    break;
                case 'b':
                case '2':
                    e.preventDefault();
                    selectOption(1);
                    break;
                case 'c':
                case '3':
                    e.preventDefault();
                    selectOption(2);
                    break;
                case 'd':
                case '4':
                    e.preventDefault();
                    selectOption(3);
                    break;
                case 'm':
                    e.preventDefault();
                    toggleMark();
                    break;
                case 'backspace':
                    e.preventDefault();
                    clearAnswer();
                    break;
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'flex';
            clearTimeout(t._t);
            t._t = setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        window.addEventListener('beforeunload', (e) => {
            if (!state.testSubmitted && state.timeLeft > 0 && Object.keys(state.answers).length > 0 && !
                IS_REVIEW_MODE) { e.preventDefault();
                e.returnValue = ''; }
        });

        function init() {
            if (IS_REVIEW_MODE) {
                document.getElementById('questionCard').style.display = 'none';
                document.getElementById('progressCard').style.display = 'none';
                document.getElementById('paletteCard').style.display = 'none';
                document.getElementById('swipeHint').style.display = 'none';
                document.getElementById('infoRow').style.display = 'none';
                document.getElementById('timerPill').style.display = 'none';
                document.getElementById('actionRow').style.display = 'none';
                document.getElementById('reviewPanel').style.display = 'none';
                document.title = 'Review - CUET English Mock';
                const savedAnswers = JSON.parse(localStorage.getItem('eng_mock_last_answers') || '{}');
                state.answers = savedAnswers;
                state.testSubmitted = true;
                renderReviewMode();
                console.log('English Review mode activated — all 50 questions displayed');
            } else {
                startTimer();
                renderQuestion();
                renderPalette();
                console.log('CUET English Language Mock Initialized');
                console.log('Questions:', TOTAL, '| Duration: 50 min | Marking: +5/-1 | Auto-submit on timer');
            }
        }
        init();
    </script>
</body>
</html>
