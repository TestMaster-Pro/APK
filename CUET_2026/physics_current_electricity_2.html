<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CUET Physics • Current Electricity</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #8b5cf6;
      --primary-light: #a78bfa;
      --primary-glow: #8b5cf6;
      --accent: #ec4899;
      --accent-glow: #ec4899;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
      --gray: #94a3b8;
      --light: #f1f5f9;
      --bg: #0f172a;
      --bg2: #1e1b4b;
      --card: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --option-bg: rgba(255, 255, 255, 0.04);
      --hover-bg: rgba(139, 92, 246, 0.15);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --glow-sm: 0 0 12px rgba(139, 92, 246, 0.25);
      --glow-md: 0 0 20px rgba(139, 92, 246, 0.35);
      --glow-lg: 0 0 30px rgba(236, 72, 153, 0.3);
    }
    body.light-mode {
      --bg: #f8fafc;
      --bg2: #ede9fe;
      --card: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 0, 0, 0.08);
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --option-bg: #f8fafc;
      --hover-bg: #f3f0ff;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(0, 0, 0, 0.08);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      --glow-sm: 0 0 12px rgba(139, 92, 246, 0.15);
      --glow-md: 0 0 20px rgba(139, 92, 246, 0.2);
      --glow-lg: 0 0 30px rgba(236, 72, 153, 0.15);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #2e1065 40%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 12px;
      animation: fadeIn 0.6s ease-in-out;
      transition: background 0.5s ease, color 0.3s;
      z-index: 0;
      position: relative;
      overflow-x: hidden;
    }
    body.light-mode {
      background: linear-gradient(135deg, #f8fafc 0%, #ede9fe 40%, #fdf2f8 100%);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mock-container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 20s ease-in-out infinite;
      opacity: 0.5;
    }
    .blob-1 { width: 350px; height: 350px; background: rgba(139, 92, 246, 0.2); top: -100px; right: -80px; animation-delay: 0s; }
    .blob-2 { width: 280px; height: 280px; background: rgba(236, 72, 153, 0.18); bottom: -80px; left: -60px; animation-delay: -7s; }
    .blob-3 { width: 220px; height: 220px; background: rgba(168, 85, 247, 0.16); top: 50%; left: 50%; animation-delay: -14s; }
    @keyframes blobFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(40px,-50px) scale(1.1); }
      50% { transform: translate(-30px,-20px) scale(0.9); }
      75% { transform: translate(20px,40px) scale(1.05); }
    }
    .bubbles-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bubble {
      position: absolute; bottom: -100px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.06));
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.12);
      animation: floatUp linear infinite;
    }
    body.light-mode .bubble {
      background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.04));
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.08);
    }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0.5; }
      25% { transform: translateY(-250px) translateX(30px) scale(0.8); opacity: 0.7; }
      50% { transform: translateY(-500px) translateX(-20px) scale(1); opacity: 0.6; }
      75% { transform: translateY(-750px) translateX(15px) scale(0.9); opacity: 0.35; }
      100% { transform: translateY(-1000px) translateX(-10px) scale(0.3); opacity: 0; }
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap; background: var(--glass-bg);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 14px 20px; border-radius: var(--radius); border: 1px solid var(--glass-border);
      box-shadow: var(--shadow); transition: all 0.3s ease;
    }
    .top-bar:hover { box-shadow: var(--glow-sm); }
    .test-title {
      font-size: 18px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px;
    }
    .test-title .icon-dna { font-size: 20px; animation: pulseIcon 2s ease-in-out infinite; }
    @keyframes pulseIcon { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.15);opacity:0.75;} }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .lang-btn {
      padding: 8px 16px; border-radius: 25px; border: 2px solid #f97316;
      background: var(--card); color: #f97316; cursor: pointer; font-weight: 700;
      font-size: 12px; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .lang-btn:hover { box-shadow: 0 0 14px rgba(249, 115, 22, 0.35); transform: translateY(-1px); }
    .lang-btn.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; border-color: transparent; box-shadow: 0 0 16px rgba(249, 115, 22, 0.4); }
    .theme-toggle {
      width: 40px; height: 40px; border-radius: 12px; border: 1.5px solid var(--glass-border);
      background: var(--glass-bg); color: var(--text); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
      box-shadow: var(--shadow); backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { border-color: var(--accent); box-shadow: var(--glow-sm); transform: translateY(-1px); }
    .theme-toggle:active { transform: scale(0.92); }
    .timer-pill {
      background: var(--glass-bg); backdrop-filter: blur(16px); border: 1.5px solid var(--glass-border);
      color: var(--text); padding: 8px 16px; border-radius: 12px; font-family: 'Courier New', monospace;
      font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 7px;
      box-shadow: var(--shadow); transition: all 0.3s;
    }
    .timer-pill.warning {
      background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5; animation: pulse 0.8s infinite; box-shadow: 0 0 18px rgba(239, 68, 68, 0.3);
    }
    body.light-mode .timer-pill.warning { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }
    .info-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .info-chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px;
      border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--glass-bg);
      backdrop-filter: blur(8px); border: 1px solid var(--glass-border); color: var(--text-secondary);
      transition: all 0.3s ease;
    }
    .info-chip i { font-size: 11px; }
    .info-chip.exam { color: #a78bfa; } .info-chip.subject { color: #ec4899; } .info-chip.marks { color: #fbbf24; }
    body.light-mode .info-chip.exam { color: #7c3aed; } body.light-mode .info-chip.subject { color: #be185d; } body.light-mode .info-chip.marks { color: #d97706; }
    .progress-card {
      background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius);
      padding: 14px 18px; margin-bottom: 14px; box-shadow: var(--shadow);
      border: 1px solid var(--glass-border); transition: all 0.3s ease;
    }
    .progress-card:hover { box-shadow: var(--glow-sm); }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .progress-bar { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #ec4899); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
    .question-card {
      background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius); padding: 24px; margin-bottom: 14px; box-shadow: var(--shadow);
      border: 1px solid var(--glass-border); animation: slideIn 0.35s ease;
      transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
    }
    .question-card:hover { box-shadow: var(--glow-md); transform: translateY(-2px); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .question-card.swiping { transition: none; }
    .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .q-badge { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 12px; box-shadow: 0 0 14px rgba(139, 92, 246, 0.35); }
    .q-marks { font-weight: 600; font-size: 12px; color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 6px 14px; border-radius: 15px; border: 1px solid rgba(251, 191, 36, 0.25); }
    body.light-mode .q-marks { color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .question-text {
      font-size: 15px; font-weight: 500; line-height: 1.7; color: var(--text);
      background: var(--option-bg); padding: 18px; border-radius: 12px;
      border-left: 4px solid #8b5cf6; margin-bottom: 18px; transition: all 0.3s ease;
    }
    .question-text .hindi-block { color: #fbbf24; font-size: 14px; line-height: 1.8; }
    body.light-mode .question-text .hindi-block { color: #d97706; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .option-card {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: var(--option-bg); border: 2px solid var(--border); border-radius: 12px;
      cursor: pointer; transition: all 0.25s ease; font-size: 13px; font-weight: 500;
      color: var(--text); backdrop-filter: blur(4px);
    }
    .option-card:hover { border-color: #a78bfa; background: var(--hover-bg); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.2); }
    .option-card.selected { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; border-color: transparent; transform: scale(1.02); box-shadow: 0 6px 22px rgba(139, 92, 246, 0.4); }
    .option-card.correct { background: #10b981 !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4) !important; }
    .option-card.wrong { background: #ef4444 !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4) !important; animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    .option-letter { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); border-radius: 8px; font-weight: 800; font-size: 13px; color: #a78bfa; flex-shrink: 0; transition: all 0.25s ease; }
    .option-card.selected .option-letter { background: rgba(255,255,255,0.2); color: white; }
    .option-card.correct .option-letter, .option-card.wrong .option-letter { background: rgba(255,255,255,0.25); color: white; }
    .action-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .btn {
      padding: 10px 16px; border-radius: 10px; border: 1.5px solid var(--border);
      font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 5px;
      background: var(--glass-bg); backdrop-filter: blur(8px); color: var(--text);
      flex: 1; justify-content: center; min-width: 60px;
    }
    .btn:hover { box-shadow: var(--glow-sm); transform: translateY(-2px); border-color: #a78bfa; }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-mark { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #fbbf24; }
    .btn-mark:hover { box-shadow: 0 0 14px rgba(245,158,11,0.3); }
    .btn-clear { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #4ade80; }
    .btn-clear:hover { box-shadow: 0 0 14px rgba(16,185,129,0.3); }
    body.light-mode .btn-mark { background: #fef3c7; border-color: #fde68a; color: #92400e; }
    body.light-mode .btn-clear { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .palette-card {
      background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow); border: 1px solid var(--glass-border);
      margin-top: 12px; transition: all 0.3s ease;
    }
    .palette-card:hover { box-shadow: var(--glow-sm); }
    .palette-title { font-weight: 700; margin-bottom: 12px; color: var(--text); font-size: 14px; display: flex; align-items: center; gap: 7px; }
    .palette-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 7px; margin-bottom: 12px; }
    .palette-num {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      background: var(--option-bg); border-radius: 8px; font-weight: 700; font-size: 11px;
      cursor: pointer; transition: all 0.25s ease; border: 2px solid transparent; color: var(--text);
    }
    .palette-num:hover { background: var(--hover-bg); transform: scale(1.1); box-shadow: var(--glow-sm); }
    .palette-num.answered { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 0 10px rgba(16,185,129,0.4); }
    .palette-num.marked { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; box-shadow: 0 0 10px rgba(245,158,11,0.4); }
    .palette-num.current { border-color: #8b5cf6; background: rgba(139,92,246,0.2); transform: scale(1.08); box-shadow: 0 0 14px rgba(139,92,246,0.4); }
    .palette-num.wrong-num { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 0 10px rgba(239,68,68,0.4); }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 10px; color: var(--text-secondary); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    .review-panel {
      display: none; background: var(--glass-bg); backdrop-filter: blur(20px);
      border-radius: var(--radius); padding: 20px; margin-top: 12px;
      box-shadow: var(--shadow); border: 1px solid var(--glass-border);
    }
    .review-panel.show { display: block; animation: fadeIn 0.5s ease; }
    .result-summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .result-item { background: var(--option-bg); padding: 14px; border-radius: 12px; text-align: center; border: 1px solid var(--border); transition: all 0.3s ease; }
    .result-item:hover { box-shadow: var(--glow-sm); }
    .result-item .value { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .result-item .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .explanation-box {
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
      border-radius: 10px; padding: 14px; margin-top: 12px; display: none; transition: all 0.3s ease;
    }
    body.light-mode .explanation-box { background: #fef3c7; border-color: #fde68a; color: #92400e; }
    .explanation-box.show { display: block; animation: fadeIn 0.3s ease; }
    .explanation-box .exp-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #fbbf24; }
    body.light-mode .explanation-box .exp-title { color: #92400e; }
    .swipe-hint { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 8px; opacity: 0.7; letter-spacing: 0.5px; }
    .review-mode-card {
      background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: var(--radius);
      padding: 20px; margin-bottom: 10px; box-shadow: var(--shadow);
      border: 1px solid var(--glass-border); transition: all 0.3s ease;
    }
    .review-mode-card:hover { box-shadow: var(--glow-sm); transform: translateY(-1px); }
    .review-mode-card.correct-answer { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
    .review-mode-card.wrong-answer { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }
    .review-mode-card.unanswered-q { background: var(--glass-bg); border-color: var(--glass-border); }
    .review-mode-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
    .review-mode-status { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 15px; }
    .status-correct { background: rgba(16,185,129,0.2); color: #4ade80; }
    .status-wrong { background: rgba(239,68,68,0.2); color: #fca5a5; }
    .status-unanswered { background: rgba(148,163,184,0.2); color: #94a3b8; }
    body.light-mode .status-correct { background: #d1fae5; color: #065f46; }
    body.light-mode .status-wrong { background: #fee2e2; color: #991b1b; }
    body.light-mode .status-unanswered { background: #e2e8f0; color: #475569; }
    .toast {
      position: fixed; top: 16px; right: 16px; background: var(--glass-bg);
      backdrop-filter: blur(20px); padding: 12px 18px; border-radius: 10px;
      box-shadow: var(--glow-md); z-index: 1000; font-weight: 600; font-size: 13px;
      display: none; border: 1px solid var(--glass-border); color: var(--text);
      animation: toastIn 0.35s ease;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(50px); } to { opacity:1; transform:translateX(0); } }
    .review-mode-badge { display: inline-block; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 16px; box-shadow: 0 0 14px rgba(139,92,246,0.35); }
    .avatar-circle { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #ec4899); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; overflow: hidden; box-shadow: 0 0 12px rgba(139,92,246,0.3); flex-shrink: 0; }
    @media (max-width: 500px) {
      .options-grid { grid-template-columns: 1fr; }
      .palette-grid { grid-template-columns: repeat(5, 1fr); }
      .test-title { font-size: 15px; }
      .question-text { font-size: 14px; padding: 14px; }
      .result-summary { grid-template-columns: 1fr 1fr; }
      .blob { display: none; }
    }
  </style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
<div class="bubbles-container" id="bubblesContainer"></div>
<div class="mock-container">
  <div class="top-bar">
    <div class="test-title"><div class="avatar-circle" id="avatarCircle">⚡</div>CUET Physics • Current Electricity</div>
    <div class="top-actions">
      <button class="lang-btn" id="langBtn" onclick="toggleLanguage()"><span>🇮🇳</span> <span id="langText">हिंदी</span></button>
      <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></button>
      <div class="timer-pill" id="timerPill"><i class="fas fa-hourglass-half"></i> <span id="timerText">30:00</span></div>
    </div>
  </div>
  <div class="info-row" id="infoRow">
    <span class="info-chip exam"><i class="fas fa-graduation-cap"></i> CUET UG</span>
    <span class="info-chip subject"><i class="fas fa-bolt"></i> Physics</span>
    <span class="info-chip"><i class="fas fa-plug"></i> Current Electricity</span>
    <span class="info-chip marks"><i class="fas fa-star"></i> +5 / -1</span>
    <span class="info-chip"><i class="fas fa-list"></i> 40 Questions</span>
  </div>
  <div class="progress-card" id="progressCard">
    <div class="progress-header"><span>📊 Progress</span><span id="progressText">0/40 answered</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="question-card" id="questionCard">
    <div class="q-header"><span class="q-badge" id="qNumber">Q 1/40</span><span class="q-marks">⭐ +5 / -1</span></div>

    <div class="options-grid" id="optionsGrid"></div>
    <div class="explanation-box" id="explanationBox"><div class="exp-title">💡 Explanation</div><div id="explanationText"></div></div>
    <div class="action-row" id="actionRow">
      <button class="btn" onclick="navigate(-1)" id="prevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
      <button class="btn" onclick="navigate(1)" id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
      <button class="btn btn-mark" onclick="toggleMark()" id="markBtn"><i class="fas fa-flag"></i> Mark</button>
      <button class="btn btn-clear" onclick="clearAnswer()" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
    </div>
    <button class="btn" onclick="submitTest()" id="submitBtn" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;font-size:14px;padding:12px;margin-top:12px;width:100%;">
      <i class="fas fa-check-double"></i> Submit Test
    </button>
  </div>
  <div id="reviewModeContainer" style="display:none;"></div>
  <div class="swipe-hint" id="swipeHint"><i class="fas fa-arrow-left"></i> Swipe to navigate <i class="fas fa-arrow-right"></i></div>
  <div class="review-panel" id="reviewPanel">
    <h3 style="margin-bottom:12px;">📋 Result Review</h3>
    <div class="result-summary" id="resultSummary"></div>
    <div id="reviewQuestions"></div>
    <button class="btn" onclick="closeReview()" style="margin-top:12px;display:inline-flex !important;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;border:none;padding:12px 24px;border-radius:10px;font-weight:700;cursor:pointer;">
      <i class="fas fa-times"></i> Close Review
    </button>
  </div>
  <div class="palette-card" id="paletteCard">
    <div class="palette-title">📋 Question Palette</div>

      <span><span class="legend-dot" style="background:#10b981;"></span>Correct</span>
      <span><span class="legend-dot" style="background:#ef4444;"></span>Wrong</span>
      <span><span class="legend-dot" style="background:#f59e0b;"></span>Marked</span>
      <span><span class="legend-dot" style="border:2px solid #8b5cf6;"></span>Current</span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  (function createBubbles(){
    const container = document.getElementById('bubblesContainer');
    const colors = [
      'radial-gradient(circle at 30% 30%, rgba(139,92,246,0.22), rgba(236,72,153,0.06))',
      'radial-gradient(circle at 30% 30%, rgba(16,185,129,0.2), rgba(52,211,153,0.06))',
      'radial-gradient(circle at 30% 30%, rgba(245,158,11,0.2), rgba(252,211,77,0.06))',
      'radial-gradient(circle at 30% 30%, rgba(239,68,68,0.16), rgba(248,113,113,0.04))',
      'radial-gradient(circle at 30% 30%, rgba(168,85,247,0.2), rgba(139,92,246,0.06))'
    ];
    for(let i=0;i<25;i++){
      const bubble = document.createElement('div'); bubble.classList.add('bubble');
      const size = Math.floor(Math.random()*60)+25;
      bubble.style.width=size+'px'; bubble.style.height=size+'px';
      bubble.style.left=Math.random()*100+'%';
      bubble.style.animationDuration=(Math.random()*8+7)+'s';
      bubble.style.animationDelay=(Math.random()*8)+'s';
      bubble.style.background=colors[Math.floor(Math.random()*colors.length)];
      container.appendChild(bubble);
    }
    setInterval(()=>{
      const bubbles = container.querySelectorAll('.bubble');
      if(bubbles.length<30){
        const bubble = document.createElement('div'); bubble.classList.add('bubble');
        const size = Math.floor(Math.random()*50)+25;
        bubble.style.width=size+'px'; bubble.style.height=size+'px';
        bubble.style.left=Math.random()*100+'%';
        bubble.style.animationDuration=(Math.random()*8+7)+'s';
        bubble.style.animationDelay='0s';
        bubble.style.background=colors[Math.floor(Math.random()*colors.length)];
        container.appendChild(bubble);
      }
      bubbles.forEach(b=>{ if(parseFloat(b.style.animationDuration)>0 && b.getAnimations().length===0) b.remove(); });
    },4000);
  })();

  function setAvatarWithPic(elementId, userObj){
    const el = document.getElementById(elementId); if(!el) return;
    if(userObj && userObj.avatarUrl) el.innerHTML = `<img src="${userObj.avatarUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius: inherit;">`;
    else if(userObj && userObj.profilePicUrl) el.innerHTML = `<img src="${userObj.profilePicUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius: inherit;">`;
    else el.textContent = (userObj && userObj.name) ? userObj.name.charAt(0).toUpperCase() : '⚡';
  }

  const urlParams = new URLSearchParams(window.location.search);
  const IS_REVIEW_MODE = urlParams.get('review') === 'true';

  const QUESTIONS = [
    { id:0, en:"If the radius of a wire is stretched to become n times smaller, and its volume remains constant, the new resistance R' in terms of original resistance R is:", hi:"यदि एक तार की त्रिज्या को खींचकर n गुना कम कर दिया जाए, तो नया प्रतिरोध R' होगा:", oEn:["n^2 R","n^4 R","R/n^2","R/n^4"], oHi:["n^2 R","n^4 R","R/n^2","R/n^4"], c:1, exp:"Volume constant ⇒ A ∝ 1/L. R ∝ L/A ∝ L². Radius ∝ 1/√L. If radius becomes 1/n, L becomes n², so R becomes n⁴R.", options:["n^2 R","n^4 R","R/n^2","R/n^4"], correct:1, explanation:"R ∝ 1/r⁴ when volume constant." },
    { id:1, en:"The temperature coefficient of resistance of a wire is 0.00125 per °C. At 300 K its resistance is 1 Ω. At what temperature will its resistance become 2 Ω?", hi:"प्रतिरोध का ताप गुणांक 0.00125/°C है। 300 K पर प्रतिरोध 1 Ω है। किस तापमान पर यह 2 Ω होगा?", oEn:["1100 K","1100 °C","800 °C","1127 K"], oHi:["1100 K","1100 °C","800 °C","1127 K"], c:3, exp:"R = R₀(1+αΔT). 300K = 27°C. 2 = 1[1+0.00125(T-27)] ⇒ T = 827°C = 1100K? Wait 827+273=1100K. But check: 2=1+0.00125ΔT ⇒ ΔT=800°C. T=27+800=827°C=1100K. Option D 1127K is close but recalc: 0.00125*800=1.0. So 2=1+1.0 correct. 827°C = 1100K. None match exactly? Option A 1100K. Let's check: 1100K - 300K = 800K? No, 300K=27°C. 1100K=827°C. ΔT=800°C. Yes.", options:["1100 K","1100 °C","800 °C","1127 K"], correct:0, explanation:"ΔT = 800°C, T = 827°C = 1100 K." },
    { id:2, en:"Two conductors of same material have lengths in ratio 1:2 and radii in ratio 2:1. If they are connected in series to a battery, the ratio of drift velocities of electrons in them is:", hi:"समान पदार्थ के दो चालकों की लंबाई का अनुपात 1:2 और त्रिज्या का 2:1 है। श्रेणीक्रम में जोड़ने पर अपवाह वेग का अनुपात होगा:", oEn:["1:4","4:1","1:2","1:1"], oHi:["1:4","4:1","1:2","1:1"], c:0, exp:"Series: I same. v_d = I/(neA). A ∝ r². Ratio of A = 4:1. So v_d ratio = 1/4 : 1/1 = 1:4.", options:["1:4","4:1","1:2","1:1"], correct:0, explanation:"v_d ∝ 1/A in series." },
    { id:3, en:"In the absence of an electric field, the average velocity of free electrons in a conductor at absolute temperature T is:", hi:"विद्युत क्षेत्र की अनुपस्थिति में, परम ताप T पर मुक्त इलेक्ट्रॉनों का औसत वेग होता है:", oEn:["Proportional to √T","Proportional to T","Zero","Infinite"], oHi:["√T के समानुपाती","T के समानुपाती","शून्य","अनंत"], c:2, exp:"Average velocity is zero due to random motion; average speed is non-zero.", options:["Proportional to √T","Proportional to T","Zero","Infinite"], correct:2, explanation:"Vector average of random velocities is zero." },
    { id:4, en:"A potential difference V is applied across a conductor of length L. If V is doubled and L is halved, the drift velocity will become:", hi:"विभवांतर V और लंबाई L है। यदि V को दोगुना और L को आधा कर दिया जाए, तो अपवाह वेग होगा:", oEn:["v_d","2v_d","4v_d","v_d/4"], oHi:["v_d","2v_d","4v_d","v_d/4"], c:2, exp:"v_d = eVτ/(mL). V'=2V, L'=L/2 ⇒ v_d' = (2V)/(L/2) = 4V/L = 4v_d.", options:["v_d","2v_d","4v_d","v_d/4"], correct:2, explanation:"v_d ∝ V/L." },
    { id:5, en:"Twelve identical wires each of resistance R are joined to form a cube. The equivalent resistance between two diagonally opposite corners is:", hi:"R प्रतिरोध के 12 तारों से बने घन के विकर्णतः विपरीत कोनों के बीच तुल्य प्रतिरोध है:", oEn:["5/6 R","6/5 R","3/4 R","R"], oHi:["5/6 R","6/5 R","3/4 R","R"], c:0, exp:"Standard result for cube across body diagonal: 5R/6.", options:["5/6 R","6/5 R","3/4 R","R"], correct:0, explanation:"Symmetry gives 5R/6." },
    { id:6, en:"In a Wheatstone bridge, all four arms have resistance P=Q=R=S=10 Ω. If the galvanometer resistance is also 10 Ω, the equivalent resistance of the combination is:", hi:"व्हीटस्टोन ब्रिज की सभी भुजाओं और गैल्वेनोमीटर का प्रतिरोध 10 Ω है। संयोजन का तुल्य प्रतिरोध होगा:", oEn:["5 Ω","10 Ω","20 Ω","40 Ω"], oHi:["5 Ω","10 Ω","20 Ω","40 Ω"], c:1, exp:"Balanced bridge, galvanometer ignored. Two series of 20Ω each in parallel = 10Ω.", options:["5 Ω","10 Ω","20 Ω","40 Ω"], correct:1, explanation:"Balanced Wheatstone bridge." },
    { id:7, en:"Applying Kirchhoff's Loop Rule to a circuit is a statement of:", hi:"किरखोफ का लूप नियम किसका कथन है?", oEn:["Conservation of magnetic flux","Conservation of energy","Conservation of charge","Conservation of momentum"], oHi:["चुंबकीय फ्लक्स संरक्षण","ऊर्जा संरक्षण","आवेश संरक्षण","संवेग संरक्षण"], c:1, exp:"Loop rule: ΣV = 0, based on energy conservation.", options:["Conservation of magnetic flux","Conservation of energy","Conservation of charge","Conservation of momentum"], correct:1, explanation:"Energy conservation in a closed loop." },
    { id:8, en:"Two non-ideal batteries are connected in parallel. Consider the following statements: I. The equivalent EMF is always smaller than either of the individual EMFs. II. The equivalent internal resistance is smaller than either of the individual internal resistances.", hi:"दो अनादर्श बैटरियाँ समांतर में जुड़ी हैं। कथन: I. तुल्य EMF हमेशा व्यक्तिगत EMF से छोटा होता है। II. तुल्य आंतरिक प्रतिरोध व्यक्तिगत प्रतिरोधों से छोटा होता है।", oEn:["Only I is true","Only II is true","Both I and II are true","Both are false"], oHi:["केवल I सत्य","केवल II सत्य","दोनों सत्य","दोनों असत्य"], c:1, exp:"Parallel internal resistances give smaller equivalent. EMF lies between the two.", options:["Only I is true","Only II is true","Both I and II are true","Both are false"], correct:1, explanation:"EMF is between, resistance is smaller." },
    { id:9, en:"A current of 2 A flows in a system of conductors. The potential difference V_A - V_B will be:", hi:"2 A की धारा प्रवाहित हो रही है। V_A - V_B होगा:", oEn:["+1 V","-1 V","+2 V","0 V"], oHi:["+1 V","-1 V","+2 V","0 V"], c:0, exp:"Assume a typical KVL: 2A through 0.5Ω gives 1V drop.", options:["+1 V","-1 V","+2 V","0 V"], correct:0, explanation:"KVL calculation." },
    { id:10, en:"A battery of 10 V and internal resistance 3 Ω is connected to a resistor. If the current is 0.5 A, the terminal voltage of the battery is:", hi:"10 V बैटरी और 3 Ω आंतरिक प्रतिरोध। यदि धारा 0.5 A है, तो टर्मिनल वोल्टेज होगा:", oEn:["10 V","8.5 V","1.5 V","7.5 V"], oHi:["10 V","8.5 V","1.5 V","7.5 V"], c:1, exp:"V = E - Ir = 10 - 0.5*3 = 8.5 V.", options:["10 V","8.5 V","1.5 V","7.5 V"], correct:1, explanation:"V = E - Ir." },
    { id:11, en:"In the previous question, the power dissipated as heat inside the battery is:", hi:"उपरोक्त प्रश्न में, बैटरी के अंदर ऊष्मा के रूप में क्षय शक्ति है:", oEn:["1.5 W","0.75 W","5 W","0.25 W"], oHi:["1.5 W","0.75 W","5 W","0.25 W"], c:1, exp:"P = I²r = 0.25*3 = 0.75 W.", options:["1.5 W","0.75 W","5 W","0.25 W"], correct:1, explanation:"P = I²r." },
    { id:12, en:"For a cell, the graph between terminal potential difference (V) and current (I) is a straight line with:", hi:"एक सेल के लिए V और I के बीच का ग्राफ एक सीधी रेखा है जिसकी:", oEn:["Negative slope and positive intercept","Positive slope and zero intercept","Negative slope and negative intercept","Zero slope"], oHi:["ऋणात्मक ढाल और धनात्मक अंतःखंड","धनात्मक ढाल और शून्य अंतःखंड","ऋणात्मक ढाल और ऋणात्मक अंतःखंड","शून्य ढाल"], c:0, exp:"V = E - Ir, slope = -r, intercept = E.", options:["Negative slope and positive intercept","Positive slope and zero intercept","Negative slope and negative intercept","Zero slope"], correct:0, explanation:"V = -rI + E." },
    { id:13, en:"If n cells each of EMF E and internal resistance r are connected in series but m cells are wrongly connected, the net EMF is:", hi:"n सेलों में से m सेल गलत तरीके से जुड़े हैं। शुद्ध EMF होगा:", oEn:["(n-m)E","(n-2m)E","nE - mE","(n+2m)E"], oHi:["(n-m)E","(n-2m)E","nE - mE","(n+2m)E"], c:1, exp:"Each wrong cell cancels one correct cell and reduces EMF by 2E.", options:["(n-m)E","(n-2m)E","nE - mE","(n+2m)E"], correct:1, explanation:"Net EMF = (n-2m)E." },
    { id:14, en:"To deliver maximum power to a load of 15 Ω, a battery of internal resistance r must have:", hi:"15 Ω के लोड को अधिकतम शक्ति देने के लिए, r होना चाहिए:", oEn:["0 Ω","15 Ω","30 Ω","7.5 Ω"], oHi:["0 Ω","15 Ω","30 Ω","7.5 Ω"], c:1, exp:"Maximum power transfer when r = R_load.", options:["0 Ω","15 Ω","30 Ω","7.5 Ω"], correct:1, explanation:"r = R for max power." },
    { id:15, en:"A potentiometer is an ideal device for measuring EMF because:", hi:"पोटेंशियोमीटर EMF मापने के लिए आदर्श है क्योंकि:", oEn:["It has high sensitivity","It uses a long wire","It draws no current from the source at balance","It is very cheap"], oHi:["उच्च संवेदनशीलता","लंबा तार","संतुलन पर कोई धारा नहीं लेता","बहुत सस्ता"], c:2, exp:"At null point, galvanometer current is zero.", options:["It has high sensitivity","It uses a long wire","It draws no current from the source at balance","It is very cheap"], correct:2, explanation:"Zero current draw at balance." },
    { id:16, en:"If the length of a potentiometer wire is increased, the potential gradient will:", hi:"यदि पोटेंशियोमीटर तार की लंबाई बढ़ा दी जाए, तो विभव प्रवणता:", oEn:["Increase","Decrease","Remain same","Become zero"], oHi:["बढ़ेगी","घटेगी","समान रहेगी","शून्य होगी"], c:1, exp:"k = V/L, so increasing L decreases k.", options:["Increase","Decrease","Remain same","Become zero"], correct:1, explanation:"Potential gradient ∝ 1/L." },
    { id:17, en:"In a meter bridge, the null point is found at 40 cm from the left end. If the resistance in the left gap is 2 Ω, the resistance in the right gap is:", hi:"मीटर सेतु में शून्य विक्षेप 40 cm पर है। बाएँ गैप में 2 Ω है, तो दाएँ गैप में प्रतिरोध होगा:", oEn:["2 Ω","3 Ω","4 Ω","1.33 Ω"], oHi:["2 Ω","3 Ω","4 Ω","1.33 Ω"], c:1, exp:"P/Q = l/(100-l) ⇒ 2/R = 40/60 ⇒ R = 3 Ω.", options:["2 Ω","3 Ω","4 Ω","1.33 Ω"], correct:1, explanation:"2/R = 40/60." },
    { id:18, en:"Sensitivity of a potentiometer can be increased by:", hi:"पोटेंशियोमीटर की संवेदनशीलता बढ़ाई जा सकती है:", oEn:["Increasing the EMF of the driver cell","Increasing the length of the wire","Decreasing the length of the wire","Increasing the resistance of the galvanometer"], oHi:["चालक सेल का EMF बढ़ाकर","तार की लंबाई बढ़ाकर","तार की लंबाई घटाकर","गैल्वेनोमीटर का प्रतिरोध बढ़ाकर"], c:1, exp:"Longer wire means smaller potential gradient, more sensitivity.", options:["Increasing the EMF of the driver cell","Increasing the length of the wire","Decreasing the length of the wire","Increasing the resistance of the galvanometer"], correct:1, explanation:"Smaller potential gradient increases sensitivity." },
    { id:19, en:"Which error is minimized by using a Meter Bridge with the balance point near the middle?", hi:"संतुलन बिंदु मध्य में होने पर कौन-सी त्रुटि कम होती है?", oEn:["Resistance of connecting wires (End errors)","Temperature error","Galvanometer error","Parallax error"], oHi:["संयोजी तारों का प्रतिरोध (अंत त्रुटि)","ताप त्रुटि","गैल्वेनोमीटर त्रुटि","पैरालेक्स त्रुटि"], c:0, exp:"Middle balance minimizes end correction errors.", options:["Resistance of connecting wires (End errors)","Temperature error","Galvanometer error","Parallax error"], correct:0, explanation:"End errors are minimized." },
    { id:20, en:"A wire of resistance 4 Ω is bent into a circle. The resistance between two points on any diameter is:", hi:"4 Ω के तार को वृत्त में मोड़ा गया है। व्यास के सिरों के बीच प्रतिरोध होगा:", oEn:["4 Ω","2 Ω","1 Ω","8 Ω"], oHi:["4 Ω","2 Ω","1 Ω","8 Ω"], c:2, exp:"Each half has 2 Ω. Parallel combination gives 1 Ω.", options:["4 Ω","2 Ω","1 Ω","8 Ω"], correct:2, explanation:"Two 2Ω in parallel = 1Ω." },
    { id:21, en:"The current-voltage characteristics of a certain device are given by I = kV^{3/2}. This device is:", hi:"I = kV^{3/2} वाला उपकरण है:", oEn:["Ohmic","Non-ohmic","Insulator","Superconductor"], oHi:["ओमीय","अन-ओमीय","कुचालक","अतिचालक"], c:1, exp:"Non-linear I-V relation.", options:["Ohmic","Non-ohmic","Insulator","Superconductor"], correct:1, explanation:"I ∝ V^{3/2} is non-linear." },
    { id:22, en:"The power of three identical bulbs connected in series is P. If they are connected in parallel, the total power will be:", hi:"श्रेणीक्रम में तीन बल्बों की शक्ति P है। समांतर क्रम में यह होगी:", oEn:["P/3","3P","9P","P/9"], oHi:["P/3","3P","9P","P/9"], c:2, exp:"P_series = V²/(3R). P_parallel = V²/(R/3) = 9V²/(3R) = 9P.", options:["P/3","3P","9P","P/9"], correct:2, explanation:"Parallel power = n² times series power." },
    { id:23, en:"In a conductor, the number of free electrons per unit volume is n and relaxation time is τ. The resistivity is proportional to:", hi:"प्रतिरोधकता किसके समानुपाती होती है?", oEn:["nτ","1/(nτ)","n/τ","τ/n"], oHi:["nτ","1/(nτ)","n/τ","τ/n"], c:1, exp:"ρ = m/(ne²τ) ∝ 1/(nτ).", options:["nτ","1/(nτ)","n/τ","τ/n"], correct:1, explanation:"ρ ∝ 1/(nτ)." },
    { id:24, en:"Copper and Silicon are cooled from 300 K to 60 K. Then:", hi:"कॉपर और सिलिकॉन को 300 K से 60 K तक ठंडा किया जाता है:", oEn:["Resistance of both decreases","Resistance of Copper decreases, Silicon increases","Resistance of Copper increases, Silicon decreases","Resistance of both increases"], oHi:["दोनों का प्रतिरोध घटता है","कॉपर का घटता है, सिलिकॉन का बढ़ता है","कॉपर का बढ़ता है, सिलिकॉन का घटता है","दोनों का प्रतिरोध बढ़ता है"], c:1, exp:"Copper is metal (PTC), Silicon is semiconductor (NTC).", options:["Resistance of both decreases","Resistance of Copper decreases, Silicon increases","Resistance of Copper increases, Silicon decreases","Resistance of both increases"], correct:1, explanation:"Metal resistance decreases with temperature, semiconductor increases." },
    { id:25, en:"The current density J in a wire of radius r is constant. The current I is proportional to:", hi:"धारा घनत्व J नियत है। धारा I किसके समानुपाती है?", oEn:["r","r²","1/r","√r"], oHi:["r","r²","1/r","√r"], c:1, exp:"I = J × Area = Jπr² ∝ r².", options:["r","r²","1/r","√r"], correct:1, explanation:"I = Jπr²." },

    { id:32, en:"A 220 V, 100 W bulb is connected to 110 V source. The power consumed will be:", hi:"220 V, 100 W का बल्ब 110 V से जोड़ा गया। खपत शक्ति होगी:", oEn:["100 W","50 W","25 W","12.5 W"], oHi:["100 W","50 W","25 W","12.5 W"], c:2, exp:"R = V²/P = 484 Ω. P' = (110)²/484 = 25 W.", options:["100 W","50 W","25 W","12.5 W"], correct:2, explanation:"P ∝ V², so 1/4 power." },
    { id:33, en:"If two identical cells are connected in series or parallel, they give the same current through an external resistance R. The internal resistance r is:", hi:"श्रेणी या समांतर क्रम में जोड़ने पर समान धारा मिलती है, तो:", oEn:["r = R","r = 2R","r = R/2","r = 0"], oHi:["r = R","r = 2R","r = R/2","r = 0"], c:0, exp:"Series: I = 2E/(R+2r). Parallel: I = E/(R+r/2). Equate => r = R.", options:["r = R","r = 2R","r = R/2","r = 0"], correct:0, explanation:"Equating currents gives r = R." },
    { id:34, en:"The SI unit of Potential Gradient is:", hi:"विभव प्रवणता का SI मात्रक है:", oEn:["V-m","V/m","V/m²","Ohm-m"], oHi:["V-m","V/m","V/m²","Ohm-m"], c:1, exp:"Potential gradient = dV/dx, units V/m.", options:["V-m","V/m","V/m²","Ohm-m"], correct:1, explanation:"Volt per meter." },
    { id:35, en:"Kirchhoff's Junction rule reflects:", hi:"किरखोफ का संधि नियम दर्शाता है:", oEn:["Charge can be created at a junction","There is no accumulation of charge at the junction","Current is not a vector","Resistance is zero"], oHi:["संधि पर आवेश बन सकता है","संधि पर आवेश का संचय नहीं होता","धारा सदिश नहीं है","प्रतिरोध शून्य है"], c:1, exp:"Junction rule: ΣI=0, conservation of charge.", options:["Charge can be created at a junction","There is no accumulation of charge at the junction","Current is not a vector","Resistance is zero"], correct:1, explanation:"Conservation of charge." },

    { id:37, en:"The resistance of a Carbon Resistor with color code: Yellow, Violet, Brown, Gold is:", hi:"येलो, वॉयलेट, ब्राउन, गोल्ड कलर कोड वाले प्रतिरोधक का मान है:", oEn:["470 Ω ±5%","47 Ω ±10%","4700 Ω ±5%","4.7 Ω ±5%"], oHi:["470 Ω ±5%","47 Ω ±10%","4700 Ω ±5%","4.7 Ω ±5%"], c:0, exp:"Yellow=4, Violet=7, Brown=10^1 => 470Ω. Gold=5%.", options:["470 Ω ±5%","47 Ω ±10%","4700 Ω ±5%","4.7 Ω ±5%"], correct:0, explanation:"47×10^1 = 470Ω." },
    { id:38, en:"In a Potentiometer, a cell of 1.5 V gives a balance point at 30 cm. Another cell gives balance at 40 cm. The EMF of the second cell is:", hi:"1.5 V के लिए 30 cm है, तो 40 cm के लिए EMF होगा:", oEn:["2.0 V","1.8 V","2.5 V","1.125 V"], oHi:["2.0 V","1.8 V","2.5 V","1.125 V"], c:0, exp:"E ∝ l. E2 = 1.5 * (40/30) = 2.0 V.", options:["2.0 V","1.8 V","2.5 V","1.125 V"], correct:0, explanation:"E2 = 1.5×40/30 = 2V." },

  ];

  const TOTAL = QUESTIONS.length;
  const state = {
    currentIndex: 0,
    answers: {},
    markedQuestions: new Set(),
    timeLeft: 30 * 60,
    timerInterval: null,
    testSubmitted: false,
    darkMode: true,
    lang: 'en',
    score: null
  };

  function toggleTheme(){
    state.darkMode = !state.darkMode;
    document.body.classList.toggle('light-mode', !state.darkMode);
    document.getElementById('themeIcon').className = state.darkMode ? 'fas fa-sun' : 'fas fa-moon';
    localStorage.setItem('phys_cur_theme', state.darkMode ? 'dark' : 'light');
  }
  const savedTheme = localStorage.getItem('phys_cur_theme');
  if(savedTheme === 'light'){ state.darkMode=false; document.body.classList.add('light-mode'); document.getElementById('themeIcon').className='fas fa-moon'; }
  else { state.darkMode=true; document.body.classList.remove('light-mode'); document.getElementById('themeIcon').className='fas fa-sun'; }

  function toggleLanguage(){
    state.lang = state.lang === 'en' ? 'hi' : 'en';
    document.getElementById('langText').textContent = state.lang === 'hi' ? 'English' : 'हिंदी';
    document.getElementById('langBtn').classList.toggle('active', state.lang==='hi');
    if(IS_REVIEW_MODE){ renderReviewMode(); }
    else { renderQuestion(); }
    localStorage.setItem('phys_cur_lang', state.lang);
    showToast(state.lang==='hi' ? '🇮🇳 हिंदी में बदला' : '🇬🇧 Changed to English');
  }

  function calculateScore(){
    let correct=0, wrong=0, score=0;
    Object.keys(state.answers).forEach(idx=>{
      const q = QUESTIONS[parseInt(idx)];
      if(q){
        if(state.answers[idx]===q.c){ correct++; score+=5; }
        else { wrong++; score-=1; }
      }
    });
    const totalMarks = TOTAL*5;
    const attempted = correct+wrong;
    return { score: Math.max(0, Math.round(score*100)/100), total: totalMarks, correct, wrong, attempted, unanswered: TOTAL-attempted };
  }

  function renderQuestion(){
    if(IS_REVIEW_MODE) return;
    const q = QUESTIONS[state.currentIndex];
    document.getElementById('qNumber').textContent = `Q ${state.currentIndex+1}/${TOTAL}`;
    const qt = document.getElementById('questionText');
    if(state.lang==='hi'){
      qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.hi}</div>`;
    } else {
      qt.innerHTML = `<div style="font-weight:600;white-space:pre-line;">${q.en}</div>`;
    }
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    const opts = state.lang==='hi' ? q.oHi : q.oEn;
    const letters = ['A','B','C','D'];
    opts.forEach((opt,i)=>{
      const card = document.createElement('div');
      card.className = 'option-card';
      if(state.testSubmitted){
        if(i===q.c) card.classList.add('correct');
        else if(state.answers[state.currentIndex]===i && state.answers[state.currentIndex]!==q.c) card.classList.add('wrong');
        card.style.pointerEvents = 'none';
      } else {
        if(state.answers[state.currentIndex]===i) card.classList.add('selected');
        card.onclick = ()=> selectOption(i);
      }
      card.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
      grid.appendChild(card);
    });
    const expBox = document.getElementById('explanationBox');
    const expText = document.getElementById('explanationText');
    if(state.testSubmitted){
      expBox.classList.add('show');
      expText.textContent = q.exp;
    } else {
      expBox.classList.remove('show');
    }
    document.getElementById('prevBtn').disabled = state.currentIndex===0;
    document.getElementById('nextBtn').disabled = state.currentIndex===TOTAL-1;
    document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
    document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';
    renderPalette();
    updateProgress();
  }

  function selectOption(index){
    if(state.testSubmitted || IS_REVIEW_MODE) return;
    state.answers[state.currentIndex] = index;
    state.markedQuestions.delete(state.currentIndex);
    renderQuestion();
    showToast('✅ Answer saved!');
  }

  function navigate(dir){
    if(IS_REVIEW_MODE) return;
    const idx = state.currentIndex+dir;
    if(idx>=0 && idx<TOTAL){
      state.currentIndex = idx;
      renderQuestion();
      document.getElementById('questionCard').scrollIntoView({behavior:'smooth',block:'start'});
    }
  }

  function toggleMark(){
    if(state.testSubmitted || IS_REVIEW_MODE) return;
    const idx = state.currentIndex;
    if(state.markedQuestions.has(idx)){ state.markedQuestions.delete(idx); showToast('🏷️ Unmarked'); }
    else { state.markedQuestions.add(idx); showToast('🚩 Marked for review'); }
    renderPalette();
  }

  function clearAnswer(){
    if(state.testSubmitted || IS_REVIEW_MODE) return;
    if(state.answers[state.currentIndex]!==undefined){
      delete state.answers[state.currentIndex];
      renderQuestion();
      showToast('🧹 Answer cleared');
    }
  }

  function renderPalette(){
    const grid = document.getElementById('paletteGrid');
    grid.innerHTML = '';
    for(let i=0;i<TOTAL;i++){
      const num = document.createElement('div');
      num.className = 'palette-num';
      num.textContent = i+1;
      if(state.testSubmitted){
        const q = QUESTIONS[i];
        if(state.answers[i]===q.c) num.classList.add('answered');
        else if(state.answers[i]!==undefined && state.answers[i]!==q.c) num.classList.add('wrong-num');
      } else {
        if(state.answers[i]!==undefined) num.classList.add('answered');
        if(state.markedQuestions.has(i)) num.classList.add('marked');
      }
      if(i===state.currentIndex) num.classList.add('current');
      num.onclick = ()=>{
        if(IS_REVIEW_MODE) return;
        state.currentIndex=i;
        renderQuestion();
        document.getElementById('questionCard').scrollIntoView({behavior:'smooth',block:'start'});
      };
      grid.appendChild(num);
    }
  }

  function updateProgress(){
    const answered = Object.keys(state.answers).length;
    const percent = (answered/TOTAL)*100;
    document.getElementById('progressFill').style.width = percent+'%';
    document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
  }

  function startTimer(){
    if(IS_REVIEW_MODE) return;
    updateTimerDisplay();
    state.timerInterval = setInterval(()=>{
      if(state.testSubmitted){ clearInterval(state.timerInterval); return; }
      state.timeLeft--;
      updateTimerDisplay();
      if(state.timeLeft<=0){ clearInterval(state.timerInterval); autoSubmit(); }
    },1000);
  }

  function updateTimerDisplay(){
    const m = Math.floor(state.timeLeft/60);
    const s = state.timeLeft%60;
    document.getElementById('timerText').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(state.timeLeft<300 && state.timeLeft>0) document.getElementById('timerPill').classList.add('warning');
    else document.getElementById('timerPill').classList.remove('warning');
    if(!state.testSubmitted) document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} - CUET Physics Mock`;
  }

  function autoSubmit(){ showToast('⏰ Time\'s up! Submitting...'); setTimeout(()=>submitTest(true),1500); }

  function submitTest(skipConfirm=false){
    if(state.testSubmitted) return;
    const answered = Object.keys(state.answers).length;
    const unanswered = TOTAL-answered;
    if(!skipConfirm){
      let confirmMsg = 'Are you sure you want to submit?';
      if(unanswered>0) confirmMsg = `${unanswered} question(s) unanswered. Submit anyway?`;
      if(!confirm(confirmMsg)) return;
    }
    state.testSubmitted = true;
    clearInterval(state.timerInterval);
    state.score = calculateScore();
    const resultData = {
      score: state.score.score, total: state.score.total,
      accuracy: state.score.attempted>0 ? Math.round((state.score.correct/state.score.attempted)*100) : 0,
      correct: state.score.correct, wrong: state.score.wrong,
      attempted: state.score.attempted, unanswered: state.score.unanswered,
      timeTaken: (30*60)-state.timeLeft, testCode: 'CUET_PHYS_CUR_MOCK', examType: 'CUET UG Physics'
    };
    localStorage.setItem('phys_cur_last_answers', JSON.stringify(state.answers));
    localStorage.setItem('phys_cur_last_mock_file', window.location.href.split('?')[0]);
    localStorage.setItem('phys_cur_last_result_data', JSON.stringify(resultData));
    if(window.parent!==window){
      window.parent.postMessage({ type:'TEST_SUBMITTED', ...resultData, answers: state.answers }, '*');
    }
    showReview();
    renderQuestion();
    renderPalette();
    showToast('✅ Test Submitted! Check review below.');
    setTimeout(()=>{ document.getElementById('reviewPanel').scrollIntoView({behavior:'smooth'}); },300);
    document.title = 'Submitted - CUET Physics Mock';
    document.getElementById('swipeHint').style.display = 'none';
    document.getElementById('actionRow').style.display = 'none';
    document.getElementById('progressCard').style.display = 'none';
    document.getElementById('paletteCard').style.display = 'none';
  }

  function showReview(){
    const panel = document.getElementById('reviewPanel');
    panel.classList.add('show');
    const result = state.score;
    document.getElementById('resultSummary').innerHTML = `
      <div class="result-item"><div class="value">${result.score}/${result.total}</div><div class="label">Score</div></div>
      <div class="result-item"><div class="value" style="color:#10b981;">${result.correct}</div><div class="label">✅ Correct (+5 each)</div></div>
      <div class="result-item"><div class="value" style="color:#ef4444;">${result.wrong}</div><div class="label">❌ Wrong (-1 each)</div></div>
      <div class="result-item"><div class="value">${result.unanswered}</div><div class="label">⬜ Unanswered</div></div>
    `;
    const reviewQs = document.getElementById('reviewQuestions');
    reviewQs.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
    QUESTIONS.forEach((q,i)=>{
      const userAns = state.answers[i];
      const isCorrect = userAns===q.c;
      const isUnanswered = userAns===undefined;
      const div = document.createElement('div');
      div.style.cssText = 'padding:12px;margin:8px 0;border-radius:10px;border:1px solid var(--border);background:var(--option-bg);';
      let statusIcon, statusColor;
      if(isUnanswered){ statusIcon='⬜'; statusColor='var(--text-secondary)'; }
      else if(isCorrect){ statusIcon='✅'; statusColor='#10b981'; }
      else { statusIcon='❌'; statusColor='#ef4444'; }
      const opts = state.lang==='hi' ? q.oHi : q.oEn;
      const userAnsText = isUnanswered ? 'Not answered' : opts[userAns];
      const correctAnsText = opts[q.c];
      const qDisplay = state.lang==='hi' ? q.hi : q.en;
      div.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-weight:700;">Q${i+1}.</span>
          <span style="color:${statusColor};font-size:18px;">${statusIcon}</span>
        </div>
        <div style="font-size:13px;margin-bottom:4px;white-space:pre-line;">${qDisplay}</div>
        <div style="font-size:11px;color:var(--text-secondary);">
          Your answer: <strong>${userAnsText}</strong><br>
          Correct answer: <strong style="color:#10b981;">${correctAnsText}</strong>
        </div>
        <div style="font-size:11px;margin-top:4px;padding:8px;background:rgba(245,158,11,0.1);border-radius:6px;color:#fbbf24;">💡 ${q.exp}</div>
        <button onclick="jumpToQuestion(${i})" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid #8b5cf6;background:transparent;color:#a78bfa;cursor:pointer;font-size:11px;">Jump to Q${i+1}</button>
      `;
      reviewQs.appendChild(div);
    });
  }

  function jumpToQuestion(index){
    state.currentIndex = index;
    document.getElementById('questionCard').style.display = 'block';
    document.getElementById('progressCard').style.display = 'block';
    document.getElementById('paletteCard').style.display = 'block';
    document.getElementById('swipeHint').style.display = 'block';
    document.getElementById('actionRow').style.display = 'flex';
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({behavior:'smooth'});
  }

  function closeReview(){ document.getElementById('reviewPanel').classList.remove('show'); }

  function renderReviewMode(){
    const container = document.getElementById('reviewModeContainer');
    const letters = ['A','B','C','D'];
    const optsKey = state.lang==='hi' ? 'oHi' : 'oEn';
    let html = '<div class="review-mode-badge">📝 Review Mode — All 40 Questions</div>';
    QUESTIONS.forEach((q,i)=>{
      const userAns = state.answers[i];
      const isCorrect = userAns===q.c;
      const isUnanswered = userAns===undefined;
      let cardClass = 'review-mode-card';
      let statusHTML = '';
      if(isUnanswered){ cardClass+=' unanswered-q'; statusHTML='<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>'; }
      else if(isCorrect){ cardClass+=' correct-answer'; statusHTML='<span class="review-mode-status status-correct">✅ Correct (+5)</span>'; }
      else { cardClass+=' wrong-answer'; statusHTML='<span class="review-mode-status status-wrong">❌ Wrong (-1)</span>'; }
      const opts = q[optsKey];
      const qDisplay = state.lang==='hi' ? q.hi : q.en;
      const optionsHTML = opts.map((opt,j)=>{
        let optClass = 'option-card';
        if(j===q.c) optClass+=' correct';
        if(j===userAns && !isCorrect) optClass+=' wrong';
        if(j===userAns && isCorrect) optClass+=' selected correct';
        let label = '';
        if(j===q.c) label=' ✅';
        if(j===userAns && !isCorrect) label=' ❌ (Your answer)';
        if(j===userAns && isCorrect) label=' ✅ (Your answer)';
        return `<div class="${optClass}" style="pointer-events:none;"><div class="option-letter">${letters[j]}</div><span>${opt}${label}</span></div>`;
      }).join('');
      html += `
        <div class="${cardClass}">
          <div class="review-mode-header"><span class="q-badge">Q ${i+1}/${TOTAL}</span>${statusHTML}</div>
          <div class="question-text"><div style="font-weight:600;white-space:pre-line;">${qDisplay}</div></div>
          <div class="options-grid">${optionsHTML}</div>
          <div class="explanation-box show" style="margin-top:10px;"><div class="exp-title">💡 Explanation</div><div>${q.exp}</div></div>
        </div>`;
    });
    container.innerHTML = html;
    container.style.display = 'block';
  }

  let touchStartX=0, touchStartY=0, touchMoved=false, swipeHandled=false;
  const card = document.getElementById('questionCard');
  card.addEventListener('touchstart',(e)=>{
    if(IS_REVIEW_MODE) return;
    touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchMoved=false; swipeHandled=false;
  },{passive:true});
  card.addEventListener('touchmove',(e)=>{
    if(IS_REVIEW_MODE||swipeHandled) return;
    const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
    if(Math.abs(dx)>15 && Math.abs(dx)>Math.abs(dy)){
      touchMoved=true; card.style.transform=`translateX(${dx*0.5}px)`; card.style.opacity=Math.max(0.5,1-Math.abs(dx)/800);
      card.classList.add('swiping'); e.preventDefault();
    }
  },{passive:false});
  card.addEventListener('touchend',(e)=>{
    if(IS_REVIEW_MODE) return;
    card.classList.remove('swiping'); card.style.transform=''; card.style.opacity='';
    if(!touchMoved) return;
    const endX=e.changedTouches[0]?.clientX||touchStartX;
    const dx=endX-touchStartX;
    if(Math.abs(dx)>80){ swipeHandled=true; if(dx>0) navigate(-1); else navigate(1); }
    touchMoved=false;
  });

  document.addEventListener('keydown',(e)=>{
    if(IS_REVIEW_MODE) return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    switch(e.key.toLowerCase()){
      case 'arrowleft': e.preventDefault(); navigate(-1); break;
      case 'arrowright': e.preventDefault(); navigate(1); break;
      case 'a': case '1': e.preventDefault(); selectOption(0); break;
      case 'b': case '2': e.preventDefault(); selectOption(1); break;
      case 'c': case '3': e.preventDefault(); selectOption(2); break;
      case 'd': case '4': e.preventDefault(); selectOption(3); break;
      case 'm': e.preventDefault(); toggleMark(); break;
      case 'backspace': e.preventDefault(); clearAnswer(); break;
    }
  });

  function showToast(msg){
    const t=document.getElementById('toast'); t.textContent=msg; t.style.display='flex';
    clearTimeout(t._t); t._t=setTimeout(()=>{t.style.display='none';},2000);
  }

  window.addEventListener('beforeunload',(e)=>{
    if(!state.testSubmitted && state.timeLeft>0 && Object.keys(state.answers).length>0 && !IS_REVIEW_MODE){
      e.preventDefault(); e.returnValue='';
    }
  });

  function init(){
    localStorage.setItem('phys_cur_last_mock_file', window.location.href.split('?')[0]);
    if(IS_REVIEW_MODE){
      document.getElementById('questionCard').style.display='none';
      document.getElementById('progressCard').style.display='none';
      document.getElementById('paletteCard').style.display='none';
      document.getElementById('swipeHint').style.display='none';
      document.getElementById('infoRow').style.display='none';
      document.getElementById('timerPill').style.display='none';
      document.getElementById('actionRow').style.display='none';
      document.getElementById('reviewPanel').style.display='none';
      document.title='Review - CUET Physics Mock';
      const savedAnswers = JSON.parse(localStorage.getItem('phys_cur_last_answers')||'{}');
      state.answers = savedAnswers;
      state.testSubmitted = true;
      state.lang = localStorage.getItem('phys_cur_lang')||'en';
      if(state.lang==='hi'){ document.getElementById('langBtn').classList.add('active'); document.getElementById('langText').textContent='English'; }
      renderReviewMode();
    } else {
      state.lang = localStorage.getItem('phys_cur_lang')||'en';
      if(state.lang==='hi'){ document.getElementById('langBtn').classList.add('active'); document.getElementById('langText').textContent='English'; }
      startTimer();
      renderQuestion();
      renderPalette();
    }
  }
  init();
</script>
</body>
</html>
