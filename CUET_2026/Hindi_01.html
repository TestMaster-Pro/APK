<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUET Hindi • Full Syllabus Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f97316;
            --primary-light: #fb923c;
            --primary-glow: #f97316;
            --accent: #fbbf24;
            --accent-glow: #fbbf24;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #94a3b8;
            --light: #f1f5f9;
            --bg: #0f172a;
            --bg2: #1e293b;
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --option-bg: rgba(255, 255, 255, 0.04);
            --hover-bg: rgba(249, 115, 22, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --glow-sm: 0 0 12px rgba(249, 115, 22, 0.25);
            --glow-md: 0 0 20px rgba(249, 115, 22, 0.35);
            --glow-lg: 0 0 30px rgba(251, 191, 36, 0.3);
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg2: #e2e8f0;
            --card: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --hover-bg: #fff7ed;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --glow-sm: 0 0 12px rgba(249, 115, 22, 0.15);
            --glow-md: 0 0 20px rgba(249, 115, 22, 0.2);
            --glow-lg: 0 0 30px rgba(251, 191, 36, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #431407 40%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.6s ease-in-out;
            transition: background 0.5s ease, color 0.3s;
            z-index: 0;
            position: relative;
            overflow-x: hidden;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc 0%, #fff7ed 40%, #f1f5f9 100%);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mock-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Floating gradient blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 20s ease-in-out infinite;
            opacity: 0.5;
        }
        .blob-1 {
            width: 350px;
            height: 350px;
            background: rgba(249, 115, 22, 0.2);
            top: -100px;
            right: -80px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 280px;
            height: 280px;
            background: rgba(251, 191, 36, 0.18);
            bottom: -80px;
            left: -60px;
            animation-delay: -7s;
        }
        .blob-3 {
            width: 220px;
            height: 220px;
            background: rgba(239, 68, 68, 0.16);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }
        @keyframes blobFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(40px, -50px) scale(1.1);
            }
            50% {
                transform: translate(-30px, -20px) scale(0.9);
            }
            75% {
                transform: translate(20px, 40px) scale(1.05);
            }
        }

        /* BUBBLES BACKGROUND */
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.2), rgba(251, 191, 36, 0.06));
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.12);
            animation: floatUp linear infinite;
        }
        body.light-mode .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.15), rgba(251, 191, 36, 0.04));
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.08);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0.5;
            }
            25% {
                transform: translateY(-250px) translateX(30px) scale(0.8);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-500px) translateX(-20px) scale(1);
                opacity: 0.6;
            }
            75% {
                transform: translateY(-750px) translateX(15px) scale(0.9);
                opacity: 0.35;
            }
            100% {
                transform: translateY(-1000px) translateX(-10px) scale(0.3);
                opacity: 0;
            }
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        .top-bar:hover {
            box-shadow: var(--glow-sm);
        }
        .test-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }
        .test-title .icon-dna {
            font-size: 20px;
            animation: pulseIcon 2s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.75;
            }
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lang-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: 2px solid #f97316;
            background: var(--card);
            color: #f97316;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .lang-btn:hover {
            box-shadow: 0 0 14px rgba(249, 115, 22, 0.35);
            transform: translateY(-1px);
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 16px rgba(249, 115, 22, 0.4);
        }
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1.5px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-sm);
            transform: translateY(-1px);
        }
        .theme-toggle:active {
            transform: scale(0.92);
        }
        .timer-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .timer-pill.warning {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            animation: pulse 0.8s infinite;
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.3);
        }
        body.light-mode .timer-pill.warning {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }

        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        .info-chip i {
            font-size: 11px;
        }
        .info-chip.exam {
            color: #fb923c;
        }
        .info-chip.subject {
            color: #fbbf24;
        }
        .info-chip.marks {
            color: #fbbf24;
        }
        body.light-mode .info-chip.exam {
            color: #ea580c;
        }
        body.light-mode .info-chip.subject {
            color: #d97706;
        }
        body.light-mode .info-chip.marks {
            color: #d97706;
        }

        .progress-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .progress-card:hover {
            box-shadow: var(--glow-sm);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fbbf24);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            animation: slideIn 0.35s ease;
            transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
        }
        .question-card:hover {
            box-shadow: var(--glow-md);
            transform: translateY(-2px);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .question-card.swiping {
            transition: none;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .q-badge {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            box-shadow: 0 0 14px rgba(249, 115, 22, 0.35);
        }
        .q-marks {
            font-weight: 600;
            font-size: 12px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }
        body.light-mode .q-marks {
            color: #d97706;
            background: #fffbeb;
            border-color: #fde68a;
        }

        .question-text {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.7;
            color: var(--text);
            background: var(--option-bg);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #f97316;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }
        .question-text .hindi-block {
            color: #fbbf24;
            font-size: 14px;
            line-height: 1.8;
        }
        body.light-mode .question-text .hindi-block {
            color: #d97706;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--option-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            backdrop-filter: blur(4px);
        }
        .option-card:hover {
            border-color: #fb923c;
            background: var(--hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.2);
        }
        .option-card.selected {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 0 6px 22px rgba(249, 115, 22, 0.4);
        }
        .option-card.correct {
            background: #10b981 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4) !important;
        }
        .option-card.wrong {
            background: #ef4444 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4) !important;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-4px);
            }
            75% {
                transform: translateX(4px);
            }
        }
        .option-letter {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-weight: 800;
            font-size: 13px;
            color: #fb923c;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        .option-card.selected .option-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .option-card.correct .option-letter,
        .option-card.wrong .option-letter {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            color: var(--text);
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .btn:hover {
            box-shadow: var(--glow-sm);
            transform: translateY(-2px);
            border-color: #fb923c;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-mark {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }
        .btn-mark:hover {
            box-shadow: 0 0 14px rgba(245, 158, 11, 0.3);
        }
        .btn-clear {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.25);
            color: #4ade80;
        }
        .btn-clear:hover {
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.3);
        }
        body.light-mode .btn-mark {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        body.light-mode .btn-clear {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }

        .palette-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            margin-top: 12px;
            transition: all 0.3s ease;
        }
        .palette-card:hover {
            box-shadow: var(--glow-sm);
        }
        .palette-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 7px;
            margin-bottom: 12px;
        }
        .palette-num {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--option-bg);
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            color: var(--text);
        }
        .palette-num:hover {
            background: var(--hover-bg);
            transform: scale(1.1);
            box-shadow: var(--glow-sm);
        }
        .palette-num.answered {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .palette-num.marked {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .palette-num.current {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.2);
            transform: scale(1.08);
            box-shadow: 0 0 14px rgba(249, 115, 22, 0.4);
        }
        .palette-num.wrong-num {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 10px;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
        }

        .review-panel {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }
        .review-panel.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .result-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .result-item {
            background: var(--option-bg);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .result-item:hover {
            box-shadow: var(--glow-sm);
        }
        .result-item .value {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-item .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .explanation-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            display: none;
            transition: all 0.3s ease;
        }
        body.light-mode .explanation-box {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        .explanation-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .explanation-box .exp-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
            color: #fbbf24;
        }
        body.light-mode .explanation-box .exp-title {
            color: #92400e;
        }

        .swipe-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .review-mode-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 10px;

        .review-mode-card.unanswered-q {

        }

            align-items: center;

            border-radius: 15px;
        }
        .status-correct {
            background: rgba(16, 185, 129, 0.2);
            color: #4ade80;
        }
        .status-wrong {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .status-unanswered {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        body.light-mode .status-correct {
            background: #d1fae5;
            color: #065f46;
        }
        body.light-mode .status-wrong {
            background: #fee2e2;
            color: #991b1b;
        }
        body.light-mode .status-unanswered {
            background: #e2e8f0;
            color: #475569;
        }

        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: var(--glow-md);
            z-index: 1000;
            font-weight: 600;
            font-size: 13px;
            display: none;
            border: 1px solid var(--glass-border);
            color: var(--text);
            animation: toastIn 0.35s ease;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .review-mode-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f97316, #fbbf24);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 16px;
            box-shadow: 0 0 14px rgba(249, 115, 22, 0.35);
        }

        .avatar-circle {
            width: 40px;

            border-radius: 50%;

            display: flex;

            .options-grid {

            }
            .blob {

            const colors = [
                'radial-gradient(circle at 30% 30%, rgba(249, 115, 22, 0.22), rgba(251, 191, 36, 0.06))',
                'radial-gradient(circle at 30% 30%, rgba(16, 185, 129, 0.2), rgba(52, 211, 153, 0.06))',

                'radial-gradient(circle at 30% 30%, rgba(251, 191, 36, 0.2), rgba(249, 115, 22, 0.06))'
            ];
            for (let i = 0; i < 22; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.floor(Math.random() * 60) + 25;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                bubble.style.animationDelay = (Math.random() * 8) + 's';
                bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(bubble);
            }
            setInterval(() => {
                const bubbles = container.querySelectorAll('.bubble');
                if (bubbles.length < 28) {
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    const size = Math.floor(Math.random() * 50) + 25;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    bubble.style.left = Math.random() * 100 + '%';
                    bubble.style.animationDuration = (Math.random() * 8 + 7) + 's';
                    bubble.style.animationDelay = '0s';
                    bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(bubble);
                }
                bubbles.forEach(b => {
                    if (parseFloat(b.style.animationDuration) > 0 && b.getAnimations().length === 0) {
                        b.remove();
                    }
                });
            }, 4000);
        })();

        // ========== STATE MANAGEMENT ==========
        const TOTAL = QUESTIONS.length;
        const state = {
            currentIndex: 0,
            answers: {},
            markedQuestions: new Set(),
            timeLeft: 45 * 60,
            timerInterval: null,
            testSubmitted: false,
            darkMode: true,
            lang: 'hi',
            score: null
        };

        // ========== THEME TOGGLE ==========
        function toggleTheme() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('light-mode', !state.darkMode);
            document.getElementById('themeIcon').className = state.darkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('hindi_mock_theme', state.darkMode ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('hindi_mock_theme');
        if (savedTheme === 'light') {
            state.darkMode = false;
            document.body.classList.add('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        } else {
            state.darkMode = true;
            document.body.classList.remove('light-mode');
            document.getElementById('themeIcon').className = 'fas fa-sun';
        }

        // ========== LANGUAGE TOGGLE (Hindi only) ==========
        function toggleLanguage() {
            showToast('🇮🇳 यह टेस्ट हिंदी भाषा में है');
        }

        // ========== SCORE CALCULATION ==========
        function calculateScore() {
            let correct = 0,
                wrong = 0,
                score = 0;
            Object.keys(state.answers).forEach(idx => {
                const q = QUESTIONS[parseInt(idx)];
                if (q) {
                    if (state.answers[idx] === q.c) {
                        correct++;
                        score += 5;
                    } else {
                        wrong++;
                        score -= 1;
                    }
                }
            });
            const totalMarks = TOTAL * 5;
            const attempted = correct + wrong;
            const unanswered = TOTAL - attempted;
            return {
                score: Math.max(0, Math.round(score * 100) / 100),
                total: totalMarks,
                correct,
                wrong,
                attempted,
                unanswered
            };
        }

        // ========== RENDER QUESTION (NORMAL MODE) ==========
        function renderQuestion() {
            if (IS_REVIEW_MODE) return;
            const q = QUESTIONS[state.currentIndex];
            document.getElementById('qNumber').textContent = `Q ${state.currentIndex + 1}/${TOTAL}`;

            const qt = document.getElementById('questionText');
            qt.innerHTML = `<div style="font-weight:600;font-size:16px;white-space:pre-line;">${q.hi}</div>`;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const opts = q.oHi;
            const letters = ['A', 'B', 'C', 'D'];

            opts.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                if (state.testSubmitted) {
                    if (i === q.c) card.classList.add('correct');
                    else if (state.answers[state.currentIndex] === i && state.answers[state.currentIndex] !== q.c)
                        card.classList.add('wrong');
                    card.style.pointerEvents = 'none';
                } else {
                    if (state.answers[state.currentIndex] === i) card.classList.add('selected');
                    card.onclick = () => selectOption(i);
                }
                card.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
                grid.appendChild(card);
            });

            const expBox = document.getElementById('explanationBox');
            const expText = document.getElementById('explanationText');
            if (state.testSubmitted) {
                expBox.classList.add('show');
                expText.textContent = q.exp;
            } else {
                expBox.classList.remove('show');
            }

            document.getElementById('prevBtn').disabled = state.currentIndex === 0;
            document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
            document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
            document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';

            renderPalette();
            updateProgress();
        }

        function selectOption(index) {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            state.answers[state.currentIndex] = index;
            state.markedQuestions.delete(state.currentIndex);
            renderQuestion();
            showToast('✅ उत्तर सहेजा गया!');
        }

        function navigate(dir) {
            if (IS_REVIEW_MODE) return;
            const idx = state.currentIndex + dir;
            if (idx >= 0 && idx < TOTAL) {
                state.currentIndex = idx;
                renderQuestion();
                document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function toggleMark() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            const idx = state.currentIndex;
            if (state.markedQuestions.has(idx)) {
                state.markedQuestions.delete(idx);
                showToast('🏷️ अनमार्क किया');
            } else {
                state.markedQuestions.add(idx);
                showToast('🚩 समीक्षा के लिए चिह्नित');
            }
            renderPalette();
        }

        function clearAnswer() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            if (state.answers[state.currentIndex] !== undefined) {
                delete state.answers[state.currentIndex];
                renderQuestion();
                showToast('🧹 उत्तर हटाया गया');
            }
        }

        // ========== PALETTE ==========
        function renderPalette() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const num = document.createElement('div');
                num.className = 'palette-num';
                num.textContent = i + 1;
                if (state.testSubmitted) {
                    const q = QUESTIONS[i];
                    if (state.answers[i] === q.c) num.classList.add('answered');
                    else if (state.answers[i] !== undefined && state.answers[i] !== q.c) num.classList.add('wrong-num');
                } else {
                    if (state.answers[i] !== undefined) num.classList.add('answered');
                    if (state.markedQuestions.has(i)) num.classList.add('marked');
                }
                if (i === state.currentIndex) num.classList.add('current');
                num.onclick = () => {
                    if (IS_REVIEW_MODE) return;
                    state.currentIndex = i;
                    renderQuestion();
                    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                grid.appendChild(num);
            }
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            const percent = (answered / TOTAL) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
        }

        // ========== TIMER ==========
        function startTimer() {
            if (IS_REVIEW_MODE) return;
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                if (state.testSubmitted) {
                    clearInterval(state.timerInterval);
                    return;
                }
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    autoSubmit();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            document.getElementById('timerText').textContent =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (state.timeLeft < 300 && state.timeLeft > 0) {
                document.getElementById('timerPill').classList.add('warning');
            } else {
                document.getElementById('timerPill').classList.remove('warning');
            }
            if (!state.testSubmitted) {
                document.title = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} - CUET Hindi Mock`;
            }
        }

        function autoSubmit() {
            showToast('⏰ समय समाप्त! कृपया टेस्ट सबमिट करें।');
            document.getElementById('timerPill').style.background = 'rgba(239, 68, 68, 0.25)';
            document.getElementById('timerPill').style.borderColor = '#ef4444';
            document.getElementById('timerPill').style.color = '#fca5a5';
            alert('⏰ समय समाप्त हो गया है!\nकृपया "Submit Test" बटन पर क्लिक करके टेस्ट सबमिट करें।');
        }

        // ========== SUBMIT TEST ==========
        function submitTest(skipConfirm = false) {
            if (state.testSubmitted) return;
            const answered = Object.keys(state.answers).length;
            const unanswered = TOTAL - answered;
            if (!skipConfirm) {
                let confirmMsg = 'क्या आप वाकई टेस्ट सबमिट करना चाहते हैं?';
                if (unanswered > 0) {
                    confirmMsg = `${unanswered} प्रश्न अनुत्तरित हैं। फिर भी सबमिट करें?`;
                }
                if (!confirm(confirmMsg)) return;
            }
            state.testSubmitted = true;
            clearInterval(state.timerInterval);
            state.score = calculateScore();

            const resultData = {
                score: state.score.score,
                total: state.score.total,
                accuracy: state.score.attempted > 0 ? Math.round((state.score.correct / state.score.attempted) * 100) : 0,
                correct: state.score.correct,
                wrong: state.score.wrong,
                attempted: state.score.attempted,
                unanswered: state.score.unanswered,
                timeTaken: (45 * 60) - state.timeLeft,
                testCode: 'CUET_HINDI_FULL_MOCK',
                examType: 'CUET UG Hindi'
            };

            localStorage.setItem('hindi_last_answers', JSON.stringify(state.answers));
            localStorage.setItem('hindi_last_mock_file', window.location.href.split('?')[0]);
            localStorage.setItem('hindi_last_result_data', JSON.stringify(resultData));

            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'TEST_SUBMITTED',
                    ...resultData,
                    answers: state.answers
                }, '*');
            }

            showReview();
            renderQuestion();
            renderPalette();
            showToast('✅ टेस्ट सबमिट हो गया! नीचे रिजल्ट देखें।');
            setTimeout(() => {
                document.getElementById('reviewPanel').scrollIntoView({ behavior: 'smooth' });
            }, 300);
            document.title = 'Submitted - CUET Hindi Mock';

            document.getElementById('swipeHint').style.display = 'none';
            document.getElementById('actionRow').style.display = 'none';
            document.getElementById('progressCard').style.display = 'none';
            document.getElementById('paletteCard').style.display = 'none';
        }

        // ========== REVIEW PANEL ==========
        function showReview() {
            const panel = document.getElementById('reviewPanel');
            panel.classList.add('show');
            const result = state.score;
            document.getElementById('resultSummary').innerHTML = `
            <div class="result-item">
                <div class="value">${result.score}/${result.total}</div>
                <div class="label">Score</div>
            </div>
            <div class="result-item">
                <div class="value" style="color:#10b981;">${result.correct}</div>
                <div class="label">✅ Correct (+5 each)</div>
            </div>
            <div class="result-item">
                <div class="value" style="color:#ef4444;">${result.wrong}</div>
                <div class="label">❌ Wrong (-1 each)</div>
            </div>
            <div class="result-item">
                <div class="value">${result.unanswered}</div>
                <div class="label">⬜ Unanswered</div>
            </div>
        `;
            const reviewQs = document.getElementById('reviewQuestions');
            reviewQs.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                const div = document.createElement('div');
                div.style.cssText = `padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--option-bg);`;
                let statusIcon, statusColor;
                if (isUnanswered) { statusIcon = '⬜'; statusColor = 'var(--text-secondary)'; } else if (isCorrect) { statusIcon = '✅'; statusColor = '#10b981'; } else { statusIcon = '❌'; statusColor = '#ef4444'; }
                const opts = q.oHi;
                const userAnsText = isUnanswered ? 'उत्तर नहीं दिया' : opts[userAns];
                const correctAnsText = opts[q.c];
                const qDisplay = q.hi;
                div.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                    <span style="font-weight:700;">Q${i+1}.</span>
                    <span style="color:${statusColor};font-size:18px;">${statusIcon}</span>
                </div>
                <div style="font-size:14px;margin-bottom:4px;white-space:pre-line;">${qDisplay}</div>
                <div style="font-size:11px;color:var(--text-secondary);">
                    आपका उत्तर: <strong>${userAnsText}</strong><br>
                    सही उत्तर: <strong style="color:#10b981;">${correctAnsText}</strong>
                </div>
                <div style="font-size:11px;margin-top:4px;padding:8px;background:rgba(245,158,11,0.1);border-radius:6px;color:#fbbf24;">
                    💡 ${q.exp}
                </div>
                <button onclick="jumpToQuestion(${i})" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid #f97316;background:transparent;color:#fb923c;cursor:pointer;font-size:11px;transition:all 0.2s;">
                    Jump to Q${i+1}
                </button>
            `;
                reviewQs.appendChild(div);
            });
        }

        function jumpToQuestion(index) {
            state.currentIndex = index;
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('paletteCard').style.display = 'block';
            document.getElementById('swipeHint').style.display = 'block';
            document.getElementById('actionRow').style.display = 'flex';
            renderQuestion();
            document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
        }

        function closeReview() {
            document.getElementById('reviewPanel').classList.remove('show');
        }

        // ========== REVIEW MODE (when ?review=true) ==========
        function renderReviewMode() {
            const container = document.getElementById('reviewModeContainer');
            const letters = ['A', 'B', 'C', 'D'];

            let html = '<div class="review-mode-badge">📝 Review Mode — All 50 Questions</div>';

            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let cardClass = 'review-mode-card';
                let statusHTML = '';
                if (isUnanswered) {
                    cardClass += ' unanswered-q';
                    statusHTML = '<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>';
                } else if (isCorrect) {
                    cardClass += ' correct-answer';
                    statusHTML = '<span class="review-mode-status status-correct">✅ Correct (+5)</span>';
                } else {
                    cardClass += ' wrong-answer';
                    statusHTML = '<span class="review-mode-status status-wrong">❌ Wrong (-1)</span>';
                }

                const opts = q.oHi;
                const qDisplay = q.hi;
                const optionsHTML = opts.map((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = '';
                    if (j === q.c) label = ' ✅';
                    if (j === userAns && !isCorrect) label = ' ❌ (आपका उत्तर)';
                    if (j === userAns && isCorrect) label = ' ✅ (आपका उत्तर)';
                    return `<div class="${optClass}" style="pointer-events:none;"><div class="option-letter">${letters[j]}</div><span>${opt}${label}</span></div>`;
                }).join('');

                html += `
                <div class="${cardClass}">
                    <div class="review-mode-header">
                        <span class="q-badge">Q ${i+1}/${TOTAL}</span>
                        ${statusHTML}
                    </div>
                    <div class="question-text">
                        <div style="font-weight:600;font-size:15px;white-space:pre-line;">${qDisplay}</div>
                    </div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div class="explanation-box show" style="margin-top:10px;">
                        <div class="exp-title">💡 Explanation</div>
                        <div>${q.exp}</div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            container.style.display = 'block';
        }

        // ========== SWIPE NAVIGATION ==========
        let touchStartX = 0,
            touchStartY = 0,
            touchMoved = false,
            swipeHandled = false;
        const card = document.getElementById('questionCard');

        card.addEventListener('touchstart', (e) => {
            if (IS_REVIEW_MODE) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchMoved = false;
            swipeHandled = false;
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
            if (IS_REVIEW_MODE || swipeHandled) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 15 && Math.abs(dx) > Math.abs(dy)) {
                touchMoved = true;
                card.style.transform = `translateX(${dx * 0.5}px)`;
                card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 800);
                card.classList.add('swiping');
                e.preventDefault();
            }
        }, { passive: false });

        card.addEventListener('touchend', (e) => {
            if (IS_REVIEW_MODE) return;
            card.classList.remove('swiping');
            card.style.transform = '';
            card.style.opacity = '';
            if (!touchMoved) return;
            const endX = e.changedTouches[0]?.clientX || touchStartX;
            const dx = endX - touchStartX;
            if (Math.abs(dx) > 80) {
                swipeHandled = true;
                if (dx > 0) navigate(-1);
                else navigate(1);
            }
            touchMoved = false;
        });

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (IS_REVIEW_MODE) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case 'arrowleft': e.preventDefault(); navigate(-1); break;
                case 'arrowright': e.preventDefault(); navigate(1); break;
                case 'a': case '1': e.preventDefault(); selectOption(0); break;
                case 'b': case '2': e.preventDefault(); selectOption(1); break;
                case 'c': case '3': e.preventDefault(); selectOption(2); break;
                case 'd': case '4': e.preventDefault(); selectOption(3); break;
                case 'm': e.preventDefault(); toggleMark(); break;
                case 'backspace': e.preventDefault(); clearAnswer(); break;
            }
        });

        // ========== TOAST ==========
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'flex';
            clearTimeout(t._t);
            t._t = setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        // ========== PREVENT ACCIDENTAL EXIT ==========
        window.addEventListener('beforeunload', (e) => {
            if (!state.testSubmitted && state.timeLeft > 0 && Object.keys(state.answers).length > 0 && !IS_REVIEW_MODE) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ========== INITIALIZATION ==========
        function init() {
            localStorage.setItem('hindi_last_mock_file', window.location.href.split('?')[0]);

            if (IS_REVIEW_MODE) {
                document.getElementById('questionCard').style.display = 'none';
                document.getElementById('progressCard').style.display = 'none';
                document.getElementById('paletteCard').style.display = 'none';
                document.getElementById('swipeHint').style.display = 'none';
                document.getElementById('infoRow').style.display = 'none';
                document.getElementById('timerPill').style.display = 'none';
                document.getElementById('actionRow').style.display = 'none';
                document.getElementById('reviewPanel').style.display = 'none';
                document.title = 'Review - CUET Hindi Mock';

                const savedAnswers = JSON.parse(localStorage.getItem('hindi_last_answers') || '{}');
                state.answers = savedAnswers;
                state.testSubmitted = true;
                state.lang = 'hi';

                renderReviewMode();
                console.log('Hindi Review mode activated — all 50 questions displayed');
            } else {
                state.lang = 'hi';
                document.getElementById('langBtn').classList.add('active');
                document.getElementById('langText').textContent = 'English';
                startTimer();
                renderQuestion();
                renderPalette();
                console.log('CUET Hindi Full Syllabus Mock Initialized');
                console.log('Questions:', TOTAL, '| Duration: 45 min | Marking: +5/-1 | Time over = submit test alert');
            }
        }

        init();
    </script>
</body> 
</html>
