<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUET GAT • Hard Mock (Bilingual)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --hover-bg: #eef2ff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --option-bg: #1e293b;
            --hover-bg: #1e3a5f;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.4s ease;
            transition: background 0.3s, color 0.3s;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mock-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            background: var(--card);
            padding: 12px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .test-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: 2px solid #f97316;
            background: var(--card);
            color: #f97316;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border-color: transparent;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            box-shadow: var(--shadow);
        }
        .theme-toggle:active {
            transform: scale(0.92);
        }
        .theme-toggle:hover {
            border-color: var(--primary);
        }

        .timer-pill {
            background: var(--card);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .timer-pill.warning {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
            animation: pulse 0.8s infinite;
        }
        body.dark .timer-pill.warning {
            background: #3b0a0a;
            border-color: #7f1d1d;
            color: #fca5a5;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }

        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .info-chip i {
            font-size: 11px;
        }
        .info-chip.exam {
            color: #4f46e5;
        }
        .info-chip.subject {
            color: #7c3aed;
        }
        .info-chip.marks {
            color: #d97706;
        }
        body.dark .info-chip.exam {
            color: #818cf8;
        }
        body.dark .info-chip.subject {
            color: #a78bfa;
        }
        body.dark .info-chip.marks {
            color: #fbbf24;
        }

        .progress-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #818cf8);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .question-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: slideIn 0.25s ease;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .question-card.swiping {
            transition: none;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .q-badge {
            background: #6366f1;
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
        }
        .q-marks {
            font-weight: 600;
            font-size: 12px;
            color: #d97706;
            background: #fffbeb;
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid #fde68a;
        }
        body.dark .q-marks {
            color: #fbbf24;
            background: #3b2f00;
            border-color: #78350f;
        }

        .question-text {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.7;
            color: var(--text);
            background: var(--option-bg);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #6366f1;
            margin-bottom: 18px;
        }
        .question-text .hindi-block {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
            color: #d97706;
            font-size: 14px;
            line-height: 1.8;
        }
        body.dark .question-text .hindi-block {
            color: #fbbf24;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--option-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }
        .option-card:hover {
            border-color: #818cf8;
            background: var(--hover-bg);
            transform: translateY(-1px);
        }
        .option-card.selected {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-color: transparent;
            transform: scale(1.01);
            box-shadow: 0 6px 18px rgba(99, 102, 241, 0.3);
        }
        .option-card.correct {
            background: #10b981 !important;
            color: white !important;
            border-color: transparent !important;
        }
        .option-card.wrong {
            background: #ef4444 !important;
            color: white !important;
            border-color: transparent !important;
        }
        .option-letter {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 8px;
            font-weight: 800;
            font-size: 13px;
            color: #6366f1;
            flex-shrink: 0;
        }
        .option-card.selected .option-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .option-card.correct .option-letter,
        .option-card.wrong .option-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--card);
            color: var(--text);
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-mark {
            background: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }
        .btn-clear {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }
        body.dark .btn-mark {
            background: #422006;
            border-color: #78350f;
            color: #fbbf24;
        }
        body.dark .btn-clear {
            background: #022c22;
            border-color: #14532d;
            color: #4ade80;
        }
        .btn-submit {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            font-size: 14px;
            padding: 12px;
            margin-top: 12px;
            width: 100%;
            display: none !important;
        }

        .palette-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-top: 12px;
        }
        .palette-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 7px;
            margin-bottom: 12px;
        }
        .palette-num {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--option-bg);
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            color: var(--text);
        }
        .palette-num:hover {
            background: var(--hover-bg);
            transform: scale(1.08);
        }
        .palette-num.answered {
            background: #10b981;
            color: white;
        }
        .palette-num.marked {
            background: #f59e0b;
            color: white;
        }
        .palette-num.current {
            border-color: #6366f1;
            background: #eef2ff;
            transform: scale(1.06);
        }
        .palette-num.wrong-num {
            background: #ef4444;
            color: white;
        }
        body.dark .palette-num.current {
            background: #1e3a5f;
        }

        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 10px;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
        }

        .submit-confirm {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 14px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        body.dark .submit-confirm {
            background: #3b0a0a;
            border-color: #7f1d1d;
        }
        .submit-confirm span {
            font-size: 12px;
            color: #991b1b;
            font-weight: 500;
        }
        body.dark .submit-confirm span {
            color: #fca5a5;
        }
        .btn-submit-final {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit-final:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        .review-panel {
            display: none;
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .review-panel.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .result-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .result-item {
            background: var(--option-bg);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .result-item .value {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }
        .result-item .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .explanation-box {
            background: #fef3c7;
            border: 1px solid #fde68a;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            display: none;
        }
        body.dark .explanation-box {
            background: #422006;
            border-color: #78350f;
            color: #fbbf24;
        }
        .explanation-box.show {
            display: block;
        }
        .explanation-box .exp-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
            color: #92400e;
        }
        body.dark .explanation-box .exp-title {
            color: #fbbf24;
        }

        .swipe-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Review mode stacked questions */
        .review-mode-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .review-mode-card.correct-answer {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }
        .review-mode-card.wrong-answer {
            background: #fef2f2;
            border-color: #fecaca;
        }
        .review-mode-card.unanswered-q {
            background: var(--card);
            border-color: var(--border);
        }
        body.dark .review-mode-card.correct-answer {
            background: #022c22;
            border-color: #14532d;
        }
        body.dark .review-mode-card.wrong-answer {
            background: #3b0a0a;
            border-color: #7f1d1d;
        }
        .review-mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .review-mode-status {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 15px;
        }
        .status-correct {
            background: #d1fae5;
            color: #065f46;
        }
        .status-wrong {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-unanswered {
            background: #e2e8f0;
            color: #475569;
        }
        body.dark .status-correct {
            background: #064e3b;
            color: #6ee7b7;
        }
        body.dark .status-wrong {
            background: #7f1d1d;
            color: #fca5a5;
        }
        body.dark .status-unanswered {
            background: #334155;
            color: #94a3b8;
        }

        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--card);
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            font-weight: 600;
            font-size: 13px;
            display: none;
            border: 1px solid var(--border);
            color: var(--text);
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .review-mode-badge {
            display: inline-block;
            background: #6366f1;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 16px;
        }

        @media (max-width: 500px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .palette-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            .test-title {
                font-size: 15px;
            }
            .question-text {
                font-size: 14px;
                padding: 14px;
            }
            .result-summary {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="mock-container">
        <div class="top-bar">
            <div class="test-title">🧠 CUET GAT • Hard Mock</div>
            <div class="top-actions">
                <button class="lang-btn" id="langBtn" onclick="toggleLanguage()"><span>🇮🇳</span> <span id="langText">हिंदी</span></button>
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                <div class="timer-pill" id="timerPill"><i class="fas fa-hourglass-half"></i> <span id="timerText">45:00</span></div>
            </div>
        </div>

        <div class="info-row" id="infoRow">
            <span class="info-chip exam"><i class="fas fa-graduation-cap"></i> CUET UG</span>
            <span class="info-chip subject"><i class="fas fa-brain"></i> GAT</span>
            <span class="info-chip"><i class="fas fa-calculator"></i> Quantitative + Reasoning</span>
            <span class="info-chip marks"><i class="fas fa-star"></i> +4 / -1</span>
            <span class="info-chip"><i class="fas fa-list"></i> 20 Questions</span>
        </div>

        <div class="progress-card" id="progressCard">
            <div class="progress-header"><span>📊 Progress</span><span id="progressText">0/20 answered</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>

        <!-- Single question card (used in normal mode) -->
        <div class="question-card" id="questionCard">
            <div class="q-header">
                <span class="q-badge" id="qNumber">Q 1/20</span>
                <span class="q-marks">⭐ +4 / -1</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="explanation-box" id="explanationBox">
                <div class="exp-title">💡 Explanation</div>
                <div id="explanationText"></div>
            </div>
            <div class="action-row" id="actionRow">
                <button class="btn" onclick="navigate(-1)" id="prevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
                <button class="btn" onclick="navigate(1)" id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
                <button class="btn btn-mark" onclick="toggleMark()" id="markBtn"><i class="fas fa-flag"></i> Mark</button>
                <button class="btn btn-clear" onclick="clearAnswer()" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
            </div>
            <!-- Submit button hidden - auto-submit on timer expiry only -->
            <button class="btn btn-submit" onclick="submitTest()" id="submitBtn">
                <i class="fas fa-check-double"></i> Submit Test
            </button>
        </div>

        <!-- Review mode container (used when ?review=true) -->
        <div id="reviewModeContainer" style="display:none;"></div>

        <div class="swipe-hint" id="swipeHint"><i class="fas fa-arrow-left"></i> Swipe to navigate <i class="fas fa-arrow-right"></i></div>

        <div class="review-panel" id="reviewPanel">
            <h3 style="margin-bottom:12px;">📋 Result Review</h3>
            <div class="result-summary" id="resultSummary"></div>
            <div id="reviewQuestions"></div>
            <button class="btn btn-submit" onclick="closeReview()" style="margin-top:12px;display:inline-flex !important;">
                <i class="fas fa-times"></i> Close Review
            </button>
        </div>

        <div class="palette-card" id="paletteCard">
            <div class="palette-title">📋 Question Palette</div>
            <div class="palette-grid" id="paletteGrid"></div>
            <div class="legend">
                <span><span class="legend-dot" style="background:#10b981;"></span>Correct</span>
                <span><span class="legend-dot" style="background:#ef4444;"></span>Wrong</span>

        }

        // ========== SCORE CALCULATION ==========
        function calculateScore() {
            let correct = 0,
                wrong = 0,
                score = 0;
            Object.keys(state.answers).forEach(idx => {
                const q = QUESTIONS[parseInt(idx)];
                if (q) {
                    if (state.answers[idx] === q.c) {
                        correct++;
                        score += 4;
                    } else {
                        wrong++;
                        score -= 1;
                    }
                }
            });
            const totalMarks = TOTAL * 4;
            const attempted = correct + wrong;
            const unanswered = TOTAL - attempted;
            return {
                score: Math.max(0, Math.round(score * 100) / 100),
                total: totalMarks,
                correct,
                wrong,
                attempted,
                unanswered
            };
        }

            const letters = ['A', 'B', 'C', 'D'];

            opts.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                if (state.testSubmitted) {
                    if (i === q.c) card.classList.add('correct');
                    else if (state.answers[state.currentIndex] === i && state.answers[state
                            .currentIndex] !== q.c)
                        card.classList.add('wrong');
                    card.style.pointerEvents = 'none';
                } else {
                    if (state.answers[state.currentIndex] === i) card.classList.add('selected');
                    card.onclick = () => selectOption(i);
                }
                card.innerHTML =
                    `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
                grid.appendChild(card);
            });

            const expBox = document.getElementById('explanationBox');
            const expText = document.getElementById('explanationText');
            if (state.testSubmitted) {
                expBox.classList.add('show');
                expText.textContent = q.exp;
            } else {
                expBox.classList.remove('show');
            }

            document.getElementById('prevBtn').disabled = state.currentIndex === 0;
            document.getElementById('nextBtn').disabled = state.currentIndex === TOTAL - 1;
            document.getElementById('swipeHint').style.display = state.testSubmitted ? 'none' : 'block';
            document.getElementById('actionRow').style.display = state.testSubmitted ? 'none' : 'flex';

            renderPalette();
            updateProgress();
        }

        function selectOption(index) {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            state.answers[state.currentIndex] = index;
            state.markedQuestions.delete(state.currentIndex);
            renderQuestion();
            showToast('✅ Answer saved!');
        }

        function navigate(dir) {
            if (IS_REVIEW_MODE) return;
            const idx = state.currentIndex + dir;
            if (idx >= 0 && idx < TOTAL) {
                state.currentIndex = idx;
                renderQuestion();
                document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth',
                block: 'start' });
            }
        }

        function toggleMark() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            const idx = state.currentIndex;
            if (state.markedQuestions.has(idx)) {
                state.markedQuestions.delete(idx);
                showToast('🏷️ Unmarked');
            } else {
                state.markedQuestions.add(idx);
                showToast('🚩 Marked for review');
            }
            renderPalette();
        }

        function clearAnswer() {
            if (state.testSubmitted || IS_REVIEW_MODE) return;
            if (state.answers[state.currentIndex] !== undefined) {
                delete state.answers[state.currentIndex];
                renderQuestion();
                showToast('🧹 Answer cleared');
            }
        }

        // ========== PALETTE ==========
        function renderPalette() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const num = document.createElement('div');
                num.className = 'palette-num';
                num.textContent = i + 1;
                if (state.testSubmitted) {
                    const q = QUESTIONS[i];
                    if (state.answers[i] === q.c) num.classList.add('answered');
                    else if (state.answers[i] !== undefined && state.answers[i] !== q.c) num.classList.add(
                        'wrong-num');
                } else {
                    if (state.answers[i] !== undefined) num.classList.add('answered');
                    if (state.markedQuestions.has(i)) num.classList.add('marked');
                }
                if (i === state.currentIndex) num.classList.add('current');
                num.onclick = () => {
                    if (IS_REVIEW_MODE) return;
                    state.currentIndex = i;
                    renderQuestion();
                    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth',
                    block: 'start' });
                };
                grid.appendChild(num);
            }
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            const percent = (answered / TOTAL) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${answered}/${TOTAL} answered`;
        }

        // ========== TIMER ==========
        function startTimer() {
            if (IS_REVIEW_MODE) return;
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                if (state.testSubmitted) {
                    clearInterval(state.timerInterval);
                    return;
                }
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    autoSubmit();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            document.getElementById('timerText').textContent =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (state.timeLeft < 300 && state.timeLeft > 0) {
                document.getElementById('timerPill').classList.add('warning');
            } else {
                document.getElementById('timerPill').classList.remove('warning');
            }
            if (!state.testSubmitted) {
                document.title =
                    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} - CUET GAT Mock`;
            }
        }

        function autoSubmit() {
            showToast('⏰ Time\'s up! Submitting...');
            setTimeout(() => submitTest(true), 1500);
        }

        // ========== SUBMIT TEST ==========
        function submitTest(skipConfirm = false) {
            if (state.testSubmitted) return;
            const answered = Object.keys(state.answers).length;
            const unanswered = TOTAL - answered;
            if (!skipConfirm) {
                let confirmMsg = 'Are you sure you want to submit?';
                if (unanswered > 0) {
                    confirmMsg = `${unanswered} question(s) unanswered. Submit anyway?`;
                }
                if (!confirm(confirmMsg)) return;
            }
            state.testSubmitted = true;
            clearInterval(state.timerInterval);
            state.score = calculateScore();

            // Store in localStorage for result panel
            const resultData = {
                score: state.score.score,
                total: state.score.total,
                accuracy: state.score.attempted > 0 ? Math.round((state.score.correct / state.score
                    .attempted) * 100) : 0,
                correct: state.score.correct,
                wrong: state.score.wrong,
                attempted: state.score.attempted,
                unanswered: state.score.unanswered,
                timeTaken: (45 * 60) - state.timeLeft,
                testCode: 'CUET_GAT_HARD_MOCK',
                examType: 'CUET UG GAT'
            };

            localStorage.setItem('last_answers', JSON.stringify(state.answers));
            localStorage.setItem('last_mock_file', window.location.href.split('?')[0]);
            localStorage.setItem('last_result_data', JSON.stringify(resultData));

            // Send to parent window via postMessage
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'TEST_SUBMITTED',
                    ...resultData,
                    answers: state.answers
                }, '*');
            }

            showReview();
            renderQuestion();
            renderPalette();
            showToast('✅ Test Submitted! Check review below.');
            setTimeout(() => {
                document.getElementById('reviewPanel').scrollIntoView({ behavior: 'smooth' });
            }, 300);
            document.title = 'Submitted - CUET GAT Mock';

            // Hide normal mode elements
            document.getElementById('swipeHint').style.display = 'none';
            document.getElementById('actionRow').style.display = 'none';
            document.getElementById('progressCard').style.display = 'none';
            document.getElementById('paletteCard').style.display = 'none';
        }

        // ========== REVIEW PANEL ==========
        function showReview() {
            const panel = document.getElementById('reviewPanel');
            panel.classList.add('show');
            const result = state.score;
            document.getElementById('resultSummary').innerHTML = `
                <div class="result-item">
                    <div class="value">${result.score}/${result.total}</div>
                    <div class="label">Score</div>
                </div>
                <div class="result-item">
                    <div class="value" style="color:#10b981;">${result.correct}</div>
                    <div class="label">✅ Correct</div>
                </div>
                <div class="result-item">
                    <div class="value" style="color:#ef4444;">${result.wrong}</div>
                    <div class="label">❌ Wrong</div>
                </div>
                <div class="result-item">
                    <div class="value">${result.unanswered}</div>
                    <div class="label">⬜ Unanswered</div>
                </div>
            `;
            const reviewQs = document.getElementById('reviewQuestions');
            reviewQs.innerHTML = '<h4 style="margin:12px 0;">📝 Question-wise Review</h4>';
            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                const div = document.createElement('div');
                div.style.cssText = `
                    padding: 12px; margin: 8px 0; border-radius: 10px;
                    border: 1px solid var(--border); background: var(--option-bg);
                `;
                let statusIcon, statusColor;
                if (isUnanswered) { statusIcon = '⬜';
                    statusColor = 'var(--text-secondary)'; } else if (isCorrect) { statusIcon = '✅';
                    statusColor = '#10b981'; } else { statusIcon = '❌';
                    statusColor = '#ef4444'; }
                const opts = state.lang === 'hi' ? q.oHi : q.oEn;
                const userAnsText = isUnanswered ? 'Not answered' : opts[userAns];
                const correctAnsText = opts[q.c];
                div.innerHTML = `
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                        <span style="font-weight:700;">Q${i+1}.</span>
                        <span style="color:${statusColor};font-size:18px;">${statusIcon}</span>
                    </div>
                    <div style="font-size:13px;margin-bottom:4px;">${q.en}</div>
                    <div style="font-size:11px;color:var(--text-secondary);">
                        Your answer: <strong>${userAnsText}</strong><br>
                        Correct answer: <strong style="color:#10b981;">${correctAnsText}</strong>
                    </div>
                    <div style="font-size:11px;margin-top:4px;padding:8px;background:#fef3c7;border-radius:6px;color:#92400e;">
                        💡 ${q.exp}
                    </div>
                    <button onclick="jumpToQuestion(${i})" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid var(--primary);background:transparent;color:var(--primary);cursor:pointer;font-size:11px;">
                        Jump to Q${i+1}
                    </button>
                `;
                reviewQs.appendChild(div);
            });
        }

        function jumpToQuestion(index) {
            state.currentIndex = index;
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('paletteCard').style.display = 'block';
            document.getElementById('swipeHint').style.display = 'block';
            document.getElementById('actionRow').style.display = 'flex';
            renderQuestion();
            document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
        }

        function closeReview() {
            document.getElementById('reviewPanel').classList.remove('show');
        }

        // ========== REVIEW MODE (when ?review=true) ==========
        function renderReviewMode() {
            const container = document.getElementById('reviewModeContainer');
            const letters = ['A', 'B', 'C', 'D'];
            const optsKey = state.lang === 'hi' ? 'oHi' : 'oEn';

            let html = '<div class="review-mode-badge">📝 Review Mode — All Questions</div>';

            QUESTIONS.forEach((q, i) => {
                const userAns = state.answers[i];
                const isCorrect = userAns === q.c;
                const isUnanswered = userAns === undefined;
                let cardClass = 'review-mode-card';
                let statusHTML = '';
                if (isUnanswered) {
                    cardClass += ' unanswered-q';
                    statusHTML = '<span class="review-mode-status status-unanswered">⏭️ Unanswered</span>';
                } else if (isCorrect) {
                    cardClass += ' correct-answer';
                    statusHTML = '<span class="review-mode-status status-correct">✅ Correct (+4)</span>';
                } else {
                    cardClass += ' wrong-answer';
                    statusHTML = '<span class="review-mode-status status-wrong">❌ Wrong (-1)</span>';
                }

                const opts = q[optsKey];
                const optionsHTML = opts.map((opt, j) => {
                    let optClass = 'option-card';
                    if (j === q.c) optClass += ' correct';
                    if (j === userAns && !isCorrect) optClass += ' wrong';
                    if (j === userAns && isCorrect) optClass += ' selected correct';
                    let label = '';
                    if (j === q.c) label = ' ✅';
                    if (j === userAns && !isCorrect) label = ' ❌ (Your answer)';
                    if (j === userAns && isCorrect) label = ' ✅ (Your answer)';
                    return `
                        <div class="${optClass}" style="pointer-events:none;">
                            <div class="option-letter">${letters[j]}</div>
                            <span>${opt}${label}</span>
                        </div>`;
                }).join('');

                html += `
                <div class="${cardClass}">
                    <div class="review-mode-header">
                        <span class="q-badge">Q ${i+1}/${TOTAL}</span>
                        ${statusHTML}
                    </div>
                    <div class="question-text">
                        <div style="font-weight:600;margin-bottom:6px;">${q.en}</div>
                        <div class="hindi-block">${q.hi}</div>
                    </div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div class="explanation-box show" style="margin-top:10px;">
                        <div class="exp-title">💡 Explanation</div>
                        <div>${q.exp}</div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            container.style.display = 'block';
        }

        // ========== SWIPE NAVIGATION ==========
        let touchStartX = 0,
            touchStartY = 0,
            touchMoved = false,
            swipeHandled = false;
        const card = document.getElementById('questionCard');

        card.addEventListener('touchstart', (e) => {
            if (IS_REVIEW_MODE) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchMoved = false;
            swipeHandled = false;
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
            if (IS_REVIEW_MODE || swipeHandled) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 15 && Math.abs(dx) > Math.abs(dy)) {
                touchMoved = true;
                card.style.transform = `translateX(${dx * 0.5}px)`;
                card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 800);
                card.classList.add('swiping');
                e.preventDefault();
            }
        }, { passive: false });

        card.addEventListener('touchend', (e) => {
            if (IS_REVIEW_MODE) return;
            card.classList.remove('swiping');
            card.style.transform = '';
            card.style.opacity = '';
            if (!touchMoved) return;
            const endX = e.changedTouches[0]?.clientX || touchStartX;
            const dx = endX - touchStartX;
            if (Math.abs(dx) > 80) {
                swipeHandled = true;
                if (dx > 0) navigate(-1);
                else navigate(1);
            }
            touchMoved = false;
        });

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (IS_REVIEW_MODE) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case 'arrowleft':
                    e.preventDefault();
                    navigate(-1);
                    break;
                case 'arrowright':
                    e.preventDefault();
                    navigate(1);
                    break;
                case 'a':
                case '1':
                    e.preventDefault();
                    selectOption(0);
                    break;
                case 'b':
                case '2':
                    e.preventDefault();
                    selectOption(1);
                    break;
                case 'c':
                case '3':
                    e.preventDefault();
                    selectOption(2);
                    break;
                case 'd':
                case '4':
                    e.preventDefault();
                    selectOption(3);
                    break;
                case 'm':
                    e.preventDefault();
                    toggleMark();
                    break;
                case 'backspace':
                    e.preventDefault();
                    clearAnswer();
                    break;
            }
        });

        // ========== TOAST ==========
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'flex';
            clearTimeout(t._t);
            t._t = setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        // ========== PREVENT ACCIDENTAL EXIT ==========
        window.addEventListener('beforeunload', (e) => {
            if (!state.testSubmitted && state.timeLeft > 0 && Object.keys(state.answers).length > 0 && !IS_REVIEW_MODE) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ========== INITIALIZATION ==========
        function init() {
            // Set last_mock_file in localStorage for result panel
            localStorage.setItem('last_mock_file', window.location.href.split('?')[0]);

            if (IS_REVIEW_MODE) {
                // Review mode: hide normal UI, show review
                document.getElementById('questionCard').style.display = 'none';
                document.getElementById('progressCard').style.display = 'none';
                document.getElementById('paletteCard').style.display = 'none';
                document.getElementById('swipeHint').style.display = 'none';
                document.getElementById('infoRow').style.display = 'none';
                document.getElementById('timerPill').style.display = 'none';
                document.getElementById('actionRow').style.display = 'none';
                document.getElementById('reviewPanel').style.display = 'none';
                document.title = 'Review - CUET GAT Mock';

                // Load saved answers from localStorage
                const savedAnswers = JSON.parse(localStorage.getItem('last_answers') || '{}');
                state.answers = savedAnswers;
                state.testSubmitted = true;
                state.lang = localStorage.getItem('mock_lang') || 'en';

                if (state.lang === 'hi') {
                    document.getElementById('langBtn').classList.add('active');
                    document.getElementById('langText').textContent = 'English';
                }

                renderReviewMode();
                console.log('Review mode activated — all questions displayed');
            } else {
                // Normal test mode
                state.lang = localStorage.getItem('mock_lang') || 'en';
                if (state.lang === 'hi') {
                    document.getElementById('langBtn').classList.add('active');
                    document.getElementById('langText').textContent = 'English';
                }
                startTimer();
                renderQuestion();
                renderPalette();
                console.log('CUET GAT Hard Mock Initialized');
                console.log('Questions:', TOTAL, '| Duration: 45 min | Marking: +4/-1 | Auto-submit on timer');
            }
        }

        // Save language preference
        const origToggleLang = toggleLanguage;
        toggleLanguage = function() {
            origToggleLang();
            localStorage.setItem('mock_lang', state.lang);
        };

        init();
    </script>
</body>
</html>
